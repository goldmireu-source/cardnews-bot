<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cardnews Studio v3 · AI-Powered</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
/* 제목용 디스플레이 폰트 — Gmarket Sans (상업용 무료, 카드뉴스 제목 트렌드) */
@font-face {
  font-family: 'Gmarket Sans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
  font-weight: 700 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Gmarket Sans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
  font-weight: 400 600; font-style: normal; font-display: swap;
}
:root {
  --bg: #0c0d12;
  --panel: #14161f;
  --panel-2: #1c1f2c;
  --line: #2a2e3e;
  --text: #ebeef5;
  --text-dim: #8b91a6;
  --text-faint: #5a607a;
  --accent: #6ee7ff;
  --accent-warm: #ffb86b;
  --ai: #c89bff;
  --danger: #ff6b86;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: "Pretendard Variable", Pretendard, -apple-system, "Apple SD Gothic Neo", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* 프로젝트(카드뉴스) 탭바 */
.tabbar {
  flex: 0 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  padding: 6px 10px 0;
  background: #08090d;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
}
.tabbar::-webkit-scrollbar { height: 6px; }
.tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px 8px 14px;
  border: 1px solid var(--line);
  border-bottom: none;
  border-radius: 9px 9px 0 0;
  background: var(--panel);
  color: var(--text-dim);
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
  max-width: 220px;
  transition: background 0.12s, color 0.12s;
}
.tab:hover { background: var(--panel-2); color: var(--text); }
.tab.active {
  background: var(--panel-2);
  color: var(--text);
  border-color: var(--accent);
  box-shadow: inset 0 2px 0 var(--accent);
}
.tab .tab-name {
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}
.tab .tab-count {
  font-size: 10px;
  color: var(--text-faint);
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  padding: 1px 7px;
  font-variant-numeric: tabular-nums;
}
.tab .tab-close {
  font-size: 11px;
  color: var(--text-faint);
  opacity: 0;
  padding: 0 2px;
  border-radius: 3px;
  transition: opacity 0.12s, color 0.12s, background 0.12s;
}
.tab:hover .tab-close, .tab.active .tab-close { opacity: 0.7; }
.tab .tab-close:hover { opacity: 1; color: var(--danger); background: rgba(255,107,134,0.12); }
.tab-add {
  flex: 0 0 auto;
  margin: 0 0 4px 4px;
  padding: 7px 12px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  white-space: nowrap;
}
.tab-add:hover { border-color: var(--accent); color: var(--accent); }

.app {
  display: grid;
  grid-template-columns: 280px 380px 1fr;
  flex: 1;
  min-height: 0;
}
.sidebar, .editor {
  background: var(--panel);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.preview-pane {
  background: #08090d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.brand {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand h1 {
  font-size: 14px;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand h1::before {
  content: "";
  width: 6px; height: 14px;
  background: linear-gradient(180deg, var(--accent), var(--ai));
  border-radius: 2px;
}
.brand .ver {
  font-size: 9.5px;
  color: var(--ai);
  padding: 2px 8px;
  border: 1px solid rgba(200,155,255,0.3);
  border-radius: 100px;
  background: rgba(200,155,255,0.06);
  letter-spacing: 0.05em;
}

.section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.section h3 {
  margin: 0 0 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  justify-content: space-between;
}
.section h3 .help {
  font-weight: 400; text-transform: none;
  letter-spacing: 0; color: var(--text-faint); font-size: 10px;
}

/* 메인 AI 버튼 */
.ai-hero {
  padding: 14px;
  background: linear-gradient(135deg, rgba(200,155,255,0.12), rgba(110,231,255,0.08));
  border-bottom: 1px solid var(--line);
}
.ai-hero-btn {
  width: 100%;
  padding: 14px 14px;
  border: 0;
  background: linear-gradient(135deg, var(--ai), var(--accent));
  color: #1a0d3a;
  border-radius: 10px;
  font-size: 13.5px;
  font-weight: 700;
  letter-spacing: -0.01em;
  transition: all 0.2s;
  position: relative;
}
.ai-hero-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(200,155,255,0.25);
}
.ai-hero-btn:disabled {
  opacity: 0.6;
  cursor: progress;
  transform: none;
}
.ai-hero-desc {
  font-size: 10.5px;
  color: var(--text-dim);
  text-align: center;
  margin: 8px 0 0;
  line-height: 1.5;
}

/* 테마 그리드 */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}
.theme-chip {
  height: 32px;
  border-radius: 6px;
  border: 1.5px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  font-size: 9.5px;
  transition: all 0.1s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 4px 2px;
  position: relative;
}
.theme-chip:hover { border-color: var(--text-dim); }
.theme-chip.active { border-color: var(--accent); }
.theme-chip.active::after {
  content: "✓";
  position: absolute;
  top: 1px; right: 3px;
  font-size: 9px; color: var(--accent);
}
.theme-swatch {
  display: flex; width: 100%; height: 11px;
  border-radius: 2px; overflow: hidden;
}
.theme-swatch span { flex: 1; }

/* 카드 목록 */
.card-list-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
}
.card-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 9px;
  margin-bottom: 3px;
  background: var(--panel-2);
  border: 1.5px solid transparent;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.1s;
  position: relative;
}
.card-item:hover { border-color: var(--line); }
.card-item.active {
  border-color: var(--accent);
  background: rgba(110, 231, 255, 0.06);
}
.card-item.dragging { opacity: 0.4; }
.card-item.drag-over { border-top: 2px solid var(--accent); }
.drag-handle {
  color: var(--text-faint);
  font-size: 13px; cursor: grab; user-select: none; padding: 0 1px;
}
.card-num {
  width: 20px; height: 20px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 700;
  color: var(--text-dim);
  flex-shrink: 0;
}
.card-item.active .card-num { background: var(--accent); color: #000; }
.card-meta { flex: 1; min-width: 0; }
.card-label {
  font-size: 11.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.card-type-mini {
  font-size: 9px; color: var(--text-faint);
  margin-top: 1px; text-transform: uppercase; letter-spacing: 0.05em;
}
.card-actions {
  display: flex; gap: 1px;
  opacity: 0; transition: opacity 0.1s;
}
.card-item:hover .card-actions, .card-item.active .card-actions { opacity: 1; }
.card-act-btn {
  border: 0; background: transparent;
  color: var(--text-faint);
  padding: 3px 4px; border-radius: 3px;
  font-size: 11px; line-height: 1;
}
.card-act-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.card-act-btn.del:hover { color: var(--danger); background: rgba(255,107,134,0.1); }

/* 카드 추가 */
.add-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}
.add-btn {
  padding: 8px 7px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  font-size: 10.5px;
  text-align: left;
  line-height: 1.25;
  transition: all 0.1s;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); }
.add-btn b { display: block; font-size: 11.5px; margin-bottom: 1px; }
.add-btn span { color: var(--text-faint); font-size: 9.5px; }

/* 푸터 액션 */
.actions {
  padding: 10px 14px;
  border-top: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 5px;
}
.btn {
  padding: 9px 11px;
  border: 0;
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
  transition: all 0.12s;
}
.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover { background: #8aeeff; }
.btn-primary:disabled { opacity: 0.6; cursor: progress; }
.btn-ghost {
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--text-dim); }
.btn-ai {
  background: linear-gradient(135deg, rgba(200,155,255,0.18), rgba(110,231,255,0.12));
  color: var(--ai);
  border: 1px solid rgba(200,155,255,0.3);
}
.btn-ai:hover { border-color: var(--ai); }
.btn-ai:disabled { opacity: 0.6; cursor: progress; }
.btn-row { display: flex; gap: 5px; }
.btn-row .btn { flex: 1; font-size: 11px; padding: 8px 6px; }

/* 에디터 */
.editor-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}
.editor-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.editor-header h2 { margin: 0; font-size: 13px; }
.editor-header .ec { font-size: 10px; color: var(--text-faint); }
.editor-header p { margin: 0; color: var(--text-dim); font-size: 10.5px; }

.layout-chips {
  display: flex; gap: 4px;
  margin-top: 10px; flex-wrap: wrap;
}
.layout-chip {
  padding: 5px 9px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--text-dim);
  font-size: 10.5px;
  border-radius: 100px;
  transition: all 0.1s;
}
.layout-chip:hover { color: var(--text); border-color: var(--text-dim); }
.layout-chip.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}
.layout-chip.loading {
  background: linear-gradient(135deg, var(--ai), var(--accent));
  color: #1a0d3a;
  border-color: transparent;
}

.card-action-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.card-action-row .btn { flex: 1; padding: 7px 10px; font-size: 11px; }

.editor-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px;
}
.empty {
  padding: 30px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.6;
}
.empty-emoji { font-size: 32px; margin-bottom: 8px; }

.field { margin-bottom: 14px; }
.field-label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.field label {
  font-size: 10.5px; color: var(--text-dim);
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
.field .counter {
  font-size: 10px; color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.field .counter.warn { color: var(--accent-warm); }
.field .counter.over { color: var(--danger); }
.field input, .field textarea, .field select {
  width: 100%;
  padding: 9px 11px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  resize: vertical;
}
.field textarea { min-height: 56px; line-height: 1.5; }
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--accent);
}

.list-items { display: flex; flex-direction: column; gap: 5px; }
.list-item-row { display: flex; gap: 5px; align-items: center; }
.list-item-row input { flex: 1; }
.icon-btn {
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text-dim);
  width: 28px; height: 28px;
  border-radius: 5px;
  font-size: 13px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--danger); border-color: var(--danger); }
.add-item-btn {
  margin-top: 5px;
  border: 1px dashed var(--line);
  background: transparent;
  color: var(--text-dim);
  padding: 7px;
  width: 100%;
  border-radius: 6px;
  font-size: 11px;
}
.add-item-btn:hover { color: var(--accent); border-color: var(--accent); }

/* 미리보기 */
.preview-header {
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.preview-header h2 {
  margin: 0; font-size: 12px;
  color: var(--text-dim); font-weight: 500;
}
.preview-header .meta {
  font-size: 10.5px; color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.preview-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: auto;
  position: relative;
}
.preview-scaler {
  width: 432px;
  height: 540px;
  position: relative;
}
.preview-scaler::before {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  border-radius: 4px;
  pointer-events: none;
  z-index: -1;
}
.preview-loading {
  position: absolute; inset: 0;
  background: rgba(8,9,13,0.85);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  flex-direction: column;
  gap: 14px;
}
.preview-loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--line);
  border-top-color: var(--ai);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.preview-loading .label {
  color: var(--ai);
  font-size: 12px;
  font-weight: 600;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === 카드 본체 === */
.card {
  width: 1080px;
  height: 1350px;
  position: absolute;
  top: 0;
  left: 0;
  transform: scale(0.4);
  transform-origin: top left;
  background: var(--c-bg);
  color: var(--c-text);
  --font-body: "Pretendard Variable", Pretendard, sans-serif;
  --font-head: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-family: var(--font-body);
  overflow: hidden;
  --c-bg: #eef0f4;
  --c-text: #0e1422;
  --c-sub: #5b6275;
  --c-accent: #1e3fa8;
  --c-line: #dde1e9;
}
/* 제목·대형 숫자 등 헤드라인 요소에만 디스플레이 폰트 적용 (본문은 Pretendard 유지) */
.card .title, .card .term, .card .compare-title, .card .compare-h,
.card .big-num, .card .stat, .card .stat-unit, .card .q-mark, .card .quote,
.card .emphasis, .card .idx, .card .qa-tag, .card .bullet, .card .tl-dot {
  font-family: var(--font-head);
}
.card-inner {
  position: absolute;
  inset: 0;
  padding: 96px;
  display: flex;
  flex-direction: column;
}
.page-num {
  position: absolute;
  bottom: 60px; right: 96px;
  font-size: 24px; color: var(--c-sub);
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
  font-weight: 500; z-index: 2;
}
.footer-mark {
  position: absolute;
  bottom: 60px; left: 96px;
  font-size: 22px; color: var(--c-sub);
  letter-spacing: 0.08em;
  font-weight: 500; text-transform: uppercase;
  z-index: 2;
}
.swipe-hint {
  position: absolute;
  bottom: 60px; right: 96px;
  display: flex; align-items: center; gap: 16px;
  font-size: 26px; color: var(--c-accent);
  font-weight: 600; letter-spacing: 0.05em;
  z-index: 2;
}
.swipe-hint .arrow { font-size: 40px; line-height: 1; }

/* 한국어는 단어 단위로 묶되, 컨테이너를 넘으면 어디서든 줄바꿈 (15만개+, AI에이전트 같은 혼합 토큰 안전).
   또한 모든 텍스트 컨테이너가 부모 폭을 절대 안 넘게 max-width 0 (flex/grid 자식 폭 안전망). */
.card * { word-break: keep-all; overflow-wrap: anywhere; }
.card .card-inner > * { max-width: 100%; min-width: 0; }

/* ===== 배경 이미지 모드 ===== */
.card.has-bg-image {
  background-color: #1a1a1a !important;
  overflow: hidden;
}
.card.has-bg-image .bg-image-layer {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-size: cover;
  background-position: var(--bg-pos-x, 50%) var(--bg-pos-y, 50%);
  background-repeat: no-repeat;
  transform: scale(var(--bg-zoom, 1));
  transform-origin: var(--bg-pos-x, 50%) var(--bg-pos-y, 50%);
}
.card.has-bg-image .bg-image-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  /* darken 값(0~85%)을 두 stop으로 분배 — 상단은 약, 하단은 강 (가독성↑) */
  background: linear-gradient(
    180deg,
    rgba(0,0,0, calc(var(--bg-darken, 0.55) * 0.55)) 0%,
    rgba(0,0,0, var(--bg-darken, 0.55)) 60%,
    rgba(0,0,0, calc(var(--bg-darken, 0.55) * 1.05)) 100%
  );
}
.card.has-bg-image .card-inner {
  position: relative;
  z-index: 2;
}
/* 텍스트 색상 강제 — 어떤 테마든 흰 계열로 */
.card.has-bg-image,
.card.has-bg-image .card-inner,
.card.has-bg-image h1, .card.has-bg-image h2, .card.has-bg-image h3,
.card.has-bg-image h4,
.card.has-bg-image .quote, .card.has-bg-image .attr,
.card.has-bg-image .title, .card.has-bg-image .subtitle,
.card.has-bg-image .body, .card.has-bg-image .sub,
.card.has-bg-image .label, .card.has-bg-image .eyebrow,
.card.has-bg-image .pre, .card.has-bg-image .post,
.card.has-bg-image .stat, .card.has-bg-image .stat-unit,
.card.has-bg-image .emphasis, .card.has-bg-image .number,
.card.has-bg-image .term, .card.has-bg-image .pron,
.card.has-bg-image .pronunciation,
.card.has-bg-image .question, .card.has-bg-image .answer,
.card.has-bg-image .compareTitle, .card.has-bg-image .compare-title,
.card.has-bg-image .compare-h, .card.has-bg-image .compare-body,
.card.has-bg-image .descItems strong, .card.has-bg-image .item-title,
.card.has-bg-image .item-desc,

.lo-list-desc .item-desc { font-size: calc(36px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); color: var(--c-sub); line-height: 1.5; font-weight: 400; }

/* LIST: ICON */
.lo-list-icon .card-inner { padding-top: 160px; }
.lo-list-icon .list-header { margin-bottom: 60px; }
.lo-list-icon .title { font-size: calc(86px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.2; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 14px; }
.lo-list-icon .sub { font-size: calc(39px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); color: var(--c-sub); font-weight: 500; }
.lo-list-icon .items { display: flex; flex-direction: column; gap: 30px; }
.lo-list-icon .row { display: flex; align-items: center; gap: 28px; }
.lo-list-icon .dot { flex: 0 0 28px; height: 28px; border-radius: 50%; background: var(--c-accent); }
.lo-list-icon .text { flex: 1; font-size: calc(53px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); line-height: 1.4; font-weight: 600; }

/* LIST: TIMELINE (5th) */
.lo-list-timeline .card-inner { padding-top: 140px; }
.lo-list-timeline .title { font-size: calc(76px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.2; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 60px; }
.lo-list-timeline .timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
.lo-list-timeline .tl-row { display: flex; align-items: baseline; gap: 30px; padding-bottom: 36px; position: relative; }
.lo-list-timeline .tl-row::before { content: ""; position: absolute; left: 23px; top: 50px; bottom: 0; width: 3px; background: var(--c-line); }
.lo-list-timeline .tl-row:last-child::before { display: none; }
.lo-list-timeline .tl-dot { flex: 0 0 50px; white-space: nowrap; height: 50px; border-radius: 50%; background: var(--c-accent); display: flex; align-items: center; justify-content: center; color: var(--c-bg); font-weight: 800; font-size: calc(23px * var(--font-scale, 1) * var(--fs-num, 1) * var(--field-scale, 1)); z-index: 1; }
.lo-list-timeline .tl-content { flex: 1; }
.lo-list-timeline .tl-label { font-size: calc(32px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); color: var(--c-accent); font-weight: 700; margin-bottom: 6px; }
.lo-list-timeline .tl-body { font-size: calc(42px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); font-weight: 600; line-height: 1.4; }

/* HIGHLIGHT: QUOTE */
.lo-highlight-quote .card-inner { justify-content: center; padding: 200px 120px; }
.lo-highlight-quote .q-mark { font-size: calc(210px * var(--font-scale, 1) * var(--fs-num, 1) * var(--field-scale, 1)); line-height: 0.8; color: var(--c-accent); font-family: Georgia, serif; font-weight: 700; margin-bottom: 30px; }
.lo-highlight-quote .quote { font-size: calc(103px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.25; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 40px; }
.lo-highlight-quote .attr { font-size: calc(36px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); color: var(--c-sub); font-weight: 500; letter-spacing: 0.04em; }

/* HIGHLIGHT: STAT */
.lo-highlight-stat .card-inner { justify-content: center; padding-top: 180px; padding-bottom: 180px; gap: 20px; }
.lo-highlight-stat .pre { font-size: calc(45px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); color: var(--c-sub); font-weight: 500; }
.lo-highlight-stat .stat { font-size: calc(399px * var(--font-scale, 1) * var(--fs-num, 1) * var(--field-scale, 1)); line-height: 0.9; font-weight: 800; color: var(--c-accent); letter-spacing: -0.06em; font-variant-numeric: tabular-nums; margin: 0; }
.lo-highlight-stat .stat-unit { font-size: calc(96px * var(--font-scale, 1) * var(--fs-unit, 1) * var(--field-scale, 1)); color: var(--c-accent); font-weight: 700; margin-left: -10px; }
.lo-highlight-stat .label { font-size: calc(59px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); font-weight: 700; line-height: 1.4; margin-top: 30px; }
.lo-highlight-stat .note { font-size: calc(31px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); color: var(--c-sub); font-weight: 400; margin-top: 16px; }

/* HIGHLIGHT: EMPHASIS */
.lo-highlight-emphasis .card-inner { justify-content: center; padding: 200px 120px; }
.lo-highlight-emphasis .pre { font-size: calc(70px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); line-height: 1.4; font-weight: 600; color: var(--c-text); }
.lo-highlight-emphasis .emphasis { font-size: calc(280px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); line-height: 1; font-weight: 800; color: var(--c-accent); letter-spacing: -0.05em; margin: 20px 0; }
.lo-highlight-emphasis .post { font-size: calc(70px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); line-height: 1.4; font-weight: 600; color: var(--c-text); }

/* HIGHLIGHT: PULL */
.lo-highlight-pull .card-inner { justify-content: center; padding: 180px 96px; }
.lo-highlight-pull .pull-row { display: flex; gap: 50px; align-items: flex-start; }
.lo-highlight-pull .pull-bar { flex: 0 0 12px; align-self: stretch; background: var(--c-accent); border-radius: 8px; }
.lo-highlight-pull .pull-body { flex: 1; }
.lo-highlight-pull .quote { font-size: calc(92px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.3; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 40px; }
.lo-highlight-pull .attr { font-size: calc(36px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); color: var(--c-sub); font-weight: 500; letter-spacing: 0.04em; }

/* HIGHLIGHT: TIP (5th) */
.lo-highlight-tip .card-inner { justify-content: center; padding: 180px 80px; }
.lo-highlight-tip .tip-box { background: var(--c-accent); color: var(--c-bg); border-radius: 28px; padding: 56px 60px 64px; }
.lo-highlight-tip .tip-icon { font-size: calc(119px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); line-height: 1; margin-bottom: 28px; }
.lo-highlight-tip .tip-label { font-size: calc(38px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85; margin-bottom: 18px; }
.lo-highlight-tip .tip-body { font-size: calc(70px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); font-weight: 700; line-height: 1.32; letter-spacing: -0.02em; }

/* CLOSING: NEXT */
.lo-closing-next .card-inner { justify-content: space-between; padding-top: 180px; padding-bottom: 200px; }
.lo-closing-next .eyebrow { font-size: calc(40px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); color: var(--c-accent); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.lo-closing-next .title { font-size: calc(122px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.1; font-weight: 800; letter-spacing: -0.03em; margin: 28px 0 0; }
.lo-closing-next .cta { display: flex; flex-direction: column; gap: 18px; margin-top: 30px; }
.lo-closing-next .account { font-size: calc(47px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); font-weight: 700; color: var(--c-accent); }
.lo-closing-next .hashtag { font-size: calc(34px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); color: var(--c-sub); line-height: 1.5; }

/* CLOSING: SAVE */
.lo-closing-save .card-inner { justify-content: center; padding: 200px 100px; gap: 40px; }
.lo-closing-save .icon { font-size: calc(243px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); line-height: 1; color: var(--c-accent); }
.lo-closing-save .title { font-size: calc(113px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.15; font-weight: 800; letter-spacing: -0.03em; margin: 0; }
.lo-closing-save .reason { font-size: calc(45px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); line-height: 1.6; color: var(--c-sub); font-weight: 500; margin-top: 8px; }
.lo-closing-save .account { font-size: calc(42px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); font-weight: 700; color: var(--c-accent); margin-top: 40px; }

/* CLOSING: ASK */
.lo-closing-ask .card-inner { justify-content: center; padding: 180px 100px; gap: 36px; }
.lo-closing-ask .eyebrow { font-size: calc(43px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); color: var(--c-accent); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.lo-closing-ask .question { font-size: calc(108px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.2; font-weight: 800; letter-spacing: -0.03em; margin: 0; }
.lo-closing-ask .cta-box { padding: 28px 36px; background: var(--c-accent); color: var(--c-bg); border-radius: 16px; font-size: calc(43px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); font-weight: 700; width: fit-content; margin-top: 20px; }
.lo-closing-ask .account { font-size: calc(39px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); font-weight: 700; color: var(--c-sub); margin-top: auto; }

/* CLOSING: MULTI */
.lo-closing-multi .card-inner { justify-content: space-between; padding-top: 160px; padding-bottom: 200px; }
.lo-closing-multi .eyebrow { font-size: calc(38px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); color: var(--c-accent); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.lo-closing-multi .title { font-size: calc(103px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.15; font-weight: 800; letter-spacing: -0.03em; margin: 24px 0 50px; }
.lo-closing-multi .actions-row { display: flex; flex-direction: column; gap: 22px; }
.lo-closing-multi .act-row { display: flex; align-items: center; gap: 24px; font-size: calc(48px * var(--font-scale, 1) * var(--fs-body, 1) * var(--field-scale, 1)); font-weight: 600; }
.lo-closing-multi .act-icon { width: 60px; height: 60px; border-radius: 14px; background: var(--c-accent); color: var(--c-bg); display: flex; align-items: center; justify-content: center; font-size: calc(40px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); font-weight: 800; }
.lo-closing-multi .account { font-size: calc(42px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); font-weight: 700; color: var(--c-accent); margin-top: 40px; }

/* CLOSING: THANKS (5th) */
.lo-closing-thanks .card-inner { justify-content: center; padding: 200px 100px; gap: 40px; align-items: center; text-align: center; }
.lo-closing-thanks .icon { font-size: calc(189px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); line-height: 1; }
.lo-closing-thanks .title { font-size: calc(130px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.1; font-weight: 800; letter-spacing: -0.03em; margin: 0; }
.lo-closing-thanks .subtitle { font-size: calc(43px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.6; color: var(--c-sub); font-weight: 500; }
.lo-closing-thanks .account { font-size: calc(47px * var(--font-scale, 1) * var(--fs-note, 1) * var(--field-scale, 1)); font-weight: 700; color: var(--c-accent); margin-top: 30px; }

/* 필드별 사용자 색상은 RENDERER 결과 element 의 인라인 style 로 적용됨
   (style="color: #XXX !important"). 글자 크기는 카드 root --field-scale 변수 곱셈. */

/* 추출용 hidden 영역 */
.render-area {
  position: fixed;
  top: 0; left: -10000px;
  width: 1080px; height: 1350px;
  pointer-events: none;
}
.render-area .card { transform: none; position: relative; }

/* ── 인스타 스토리 요약 카드 (1080×1920, 9:16) ── */
.story-render-area {
  position: fixed;
  top: 0; left: -10000px;
  width: 1080px; height: 1920px;
  pointer-events: none;
}
.story-card {
  width: 1080px; height: 1920px;
  position: relative;
  background: var(--s-bg);
  color: var(--s-text);
  font-family: "Pretendard Variable", Pretendard, sans-serif;
  display: flex;
  flex-direction: column;
  /* 인스타 스토리 상·하단 UI 안전영역 고려 */
  padding: 172px 88px 206px;
  overflow: hidden;
}
.story-card .s-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px;
}
.story-card .s-tag {
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: 36px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--s-accent); text-transform: uppercase;
}
.story-card .s-brand {
  font-size: 32px; font-weight: 600; color: var(--s-sub);
  max-width: 520px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.story-card .s-headline {
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: calc(90px * var(--s-fit, 1) * var(--u-title, 1));
  line-height: 1.16; font-weight: 800;
  letter-spacing: -0.03em; margin: 0;
  color: var(--s-title-color, var(--s-text));
}
.story-card .s-rule {
  width: 110px; height: 10px; border-radius: 6px; flex: 0 0 auto;
  background: var(--s-accent);
  margin: calc(40px * var(--s-fit, 1)) 0 calc(46px * var(--s-fit, 1));
}
.story-card .s-points {
  display: flex; flex-direction: column; gap: calc(40px * var(--s-fit, 1));
  flex: 1; min-height: 0;
}
.story-card .s-point { display: flex; align-items: baseline; gap: calc(30px * var(--s-fit, 1) * var(--u-points, 1)); }
.story-card .s-n {
  flex: 0 0 auto;
  width: calc(66px * var(--s-fit, 1) * var(--u-points, 1));
  height: calc(66px * var(--s-fit, 1) * var(--u-points, 1));
  border-radius: 50%;
  background: var(--s-accent); color: var(--s-bg);
  display: flex; align-items: center; justify-content: center;
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: calc(32px * var(--s-fit, 1) * var(--u-points, 1));
  font-weight: 800; font-variant-numeric: tabular-nums;
}
.story-card .s-tx {
  flex: 1; font-size: calc(47px * var(--s-fit, 1) * var(--u-points, 1));
  line-height: 1.4; font-weight: 600;
  color: var(--s-tx-color, var(--s-text)); letter-spacing: -0.01em;
}
.story-card .s-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px; border-top: 2px solid var(--s-line);
  padding-top: 40px; margin-top: 44px;
}
.story-card .s-handle {
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: 46px; font-weight: 700; color: var(--s-accent);
}
.story-card .s-cta { font-size: 34px; color: var(--s-sub); font-weight: 500; }

/* 모달 안 9:16 미리보기 (0.3 배율 = 324×576) */
.story-preview {
  flex: 0 0 auto; width: 324px; height: 576px;
  overflow: hidden; border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  background: #000;
}
.story-preview .story-card { transform: scale(0.3); transform-origin: top left; }
.story-summary-body { display: flex; gap: 24px; align-items: flex-start; }
.story-summary-controls { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }
.story-summary-controls label { font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 5px; }
.story-summary-controls textarea, .story-summary-controls input, .story-summary-controls select {
  width: 100%; background: var(--panel-2); border: 1px solid var(--line);
  color: var(--text); border-radius: 8px; padding: 9px 11px; font-size: 13px; resize: vertical;
}
.story-summary-controls textarea:focus, .story-summary-controls input:focus, .story-summary-controls select:focus { outline: none; border-color: var(--accent); }
.story-mode-toggle { display: flex; gap: 6px; }
.story-mode-toggle button {
  flex: 1; padding: 8px; border: 1px solid var(--line); background: var(--panel-2);
  color: var(--text-dim); border-radius: 8px; font-size: 12px;
}
.story-mode-toggle button.active { border-color: var(--accent); color: var(--text); background: rgba(110,231,255,0.08); }

/* 모달 */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 40px;
}
.modal {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  width: 100%;
  max-width: 720px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.modal-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 { margin: 0; font-size: 16px; }
.modal-header .close {
  background: transparent; border: 0;
  color: var(--text-dim); font-size: 24px;
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.modal-header .close:hover { color: var(--text); background: var(--panel-2); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-body p.intro {
  margin: 0 0 16px;
  color: var(--text-dim);
  font-size: 12.5px;
  line-height: 1.6;
}
.modal-body textarea {
  width: 100%;
  min-height: 220px;
  padding: 14px 16px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
}
.modal-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}
.modal-options .opt {
  display: flex; flex-direction: column; gap: 4px;
}
.modal-options label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.modal-options select, .modal-options input {
  padding: 8px 10px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
}
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.modal-footer .hint { font-size: 11px; color: var(--text-faint); }
.modal-footer-actions { display: flex; gap: 8px; }
.modal-footer .btn { padding: 9px 18px; font-size: 12px; }

.modal-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  gap: 16px;
}
.modal-loading .spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--line);
  border-top-color: var(--ai);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.modal-loading .label { color: var(--ai); font-size: 13px; font-weight: 600; }
.modal-loading .sub { color: var(--text-dim); font-size: 11px; }

/* === 이미지 업로드 영역 === */
.upload-area {
  border: 2px dashed var(--line);
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  background: var(--panel-2);
  transition: all 0.15s;
  margin-bottom: 14px;
}
.upload-area.dragging {
  border-color: var(--ai);
  background: rgba(200,155,255,0.08);
}
.upload-prompt {
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.5;
}
.upload-prompt .link-btn {
  background: transparent;
  border: 0;
  color: var(--ai);
  cursor: pointer;
  font-weight: 600;
  text-decoration: underline;
  font-size: 12px;
  padding: 0;
}
.upload-prompt .hint {
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 4px;
}
.upload-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.upload-list:empty { display: none; }
.upload-thumb {
  position: relative;
  width: 72px;
  height: 72px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: var(--panel);
}
.upload-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.upload-thumb .remove {
  position: absolute;
  top: 2px; right: 2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: 0;
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;

  color: #fff;

  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 캡션 결과 */
.caption-result {

  border-radius: 8px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.65;
  white-space: pre-wrap;
  color: var(--text);
  min-height: 120px;
}
.caption-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

/* 토스트 */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 12.5px;
  z-index: 2000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.success { border-color: var(--accent); }

/* 스크롤바 */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

// 필드 key → 카드 안에서 해당 텍스트를 표시하는 element selector (첫 매치)
// compare A/B 처럼 같은 클래스가 두 번 나오는 layout 은 nth-of-type 으로 위치 지정.
const FIELD_TO_SELECTOR = {
  // 공용 (단일 element)
  eyebrow: ".eyebrow", title: ".title", subtitle: ".subtitle", badge: ".badge",
  body: ".body", sub: ".sub", label: ".label", account: ".account",
  hashtag: ".hashtag", attribution: ".attr", quote: ".quote",
  term: ".term", pron: ".pronunciation",
  // number layout 별 대응 — selector list 로 첫 매치
  number: ".big-num, .idx",
  // QA: 같은 .qa-text 두 개 → :nth-of-type 으로
  question: ".question, .qa-text:nth-of-type(1)",
  answer: ".qa-text:nth-of-type(2)",
  // compare: A/B 컬럼 .col-a / .col-b 또는 인덱스 fallback
  compareTitle: ".compare-h", // cover 위치의 메인 제목 (단일)
  // compare 좌/우 분리는 후처리에서 위치 인덱스 기반
  labelA: { sel: ".compare-label", index: 0 },
  titleA: { sel: ".compare-h", index: 0 },
  bodyA:  { sel: ".compare-body", index: 0 },
  labelB: { sel: ".compare-label", index: 1 },
  titleB: { sel: ".compare-h", index: 1 },
  bodyB:  { sel: ".compare-body", index: 1 },
  // highlight/stat
  statPre: ".pre", stat: ".stat", statUnit: ".stat-unit",
  statLabel: ".label", statNote: ".note",
  // highlight/emphasis
  emphPre: ".pre", emphasis: ".emphasis", emphPost: ".post",
  // highlight/tip
  tipLabel: ".tip-label", tipBody: ".tip-body",
  // closing
  saveReason: ".reason", askQuestion: ".question", askCta: ".cta-box",
};

// 배열 필드 (descItems/timelineItems/items) → 카드 안 N번째 element selector
const ARRAY_FIELD_TO_SELECTOR = {
  "descItems.title":       ".item-title",
  "descItems.desc":        ".item-desc",
  "timelineItems.label":   ".tl-label",
  "timelineItems.content": ".tl-body",
  "items":                 ".text",
};

function applyFieldStyles(card, rootEl) {
  const fs = card.fieldStyles;
  if (!fs || typeof fs !== "object") return;
  for (const [field, sty] of Object.entries(fs)) {
    if (!sty) continue;
    let el = null;
    // dotted key: arrayName.index 또는 arrayName.index.subKey
    const m = field.match(/^(\w+)\.(\d+)(?:\.(\w+))?$/);
    if (m) {
      const arrayName = m[1], idx = +m[2], subKey = m[3];
      const lookup = subKey ? `${arrayName}.${subKey}` : arrayName;
      const sel = ARRAY_FIELD_TO_SELECTOR[lookup];
      if (sel) {
        const all = rootEl.querySelectorAll(sel);
        el = all[idx] || null;
      }
    } else {
      const map = FIELD_TO_SELECTOR[field];
      if (typeof map === "string") {
        el = rootEl.querySelector(map);
      } else if (map && map.sel) {
        const all = rootEl.querySelectorAll(map.sel);
        el = all[map.index] || null;
      }
    }
    if (!el) continue;
    if (typeof sty.scale === "number" && sty.scale > 0 && sty.scale !== 1) {
      el.style.setProperty("--field-scale", sty.scale);
    }
    if (typeof sty.color === "string" && /^#[0-9a-f]{3,8}$/i.test(sty.color)) {
      el.style.setProperty("color", sty.color, "important");
    }
  }
}

function renderCard(card, pageNum, total) {
  const key = `${card.type}/${card.layout}`;
  const inner = RENDERERS[key] ? RENDERERS[key](card.data) : `<div class="card-inner">레이아웃 오류: ${key}</div>`;
  const isCover = card.type === "cover";
  const isLast = pageNum === total;
  const showSwipe = isCover && total > 1;
  const brand = STATE.brand;

  // 배경 이미지 (per-card)
  const bg = card.data && card.data.bgImage;
  const hasBg = bg && bg.url;
  const darkenPct = hasBg ? (typeof bg.darken === "number" ? bg.darken : 55) : 0;
  // 배경 이미지 zoom/position (디폴트: cover 가득 채움)
  const bgScale = (hasBg && typeof bg.scale === "number" && bg.scale > 0) ? bg.scale : 1;
  const bgOffX = hasBg && typeof bg.offsetX === "number" ? bg.offsetX : 50;
  const bgOffY = hasBg && typeof bg.offsetY === "number" ? bg.offsetY : 50;

  const styleVars = [];
  if (hasBg) {
    styleVars.push(`--bg-darken: ${darkenPct / 100}`);
    styleVars.push(`--bg-zoom: ${bgScale}`);
    styleVars.push(`--bg-pos-x: ${bgOffX}%`);
    styleVars.push(`--bg-pos-y: ${bgOffY}%`);
  }
  const bgStyle = styleVars.length ? `style="${styleVars.join('; ')}"` : "";
  const bgLayer = hasBg ? `
      <div class="bg-image-layer" style="background-image:url('${esc(bg.url)}')"></div>
      <div class="bg-image-overlay"></div>` : "";

  const html = `
    <div class="card lo-${card.type}-${card.layout}${hasBg ? " has-bg-image" : ""}" ${bgStyle}>
      ${bgLayer}
      ${inner}
      ${!isCover && !isLast ? `<div class="footer-mark">${esc(brand.footer || "")}</div>` : ""}
      ${!isCover && !isLast ? `<div class="page-num">${String(pageNum).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div>` : ""}
      ${showSwipe ? `<div class="swipe-hint">SWIPE <span class="arrow">→</span></div>` : ""}
    </div>`;
  // fieldStyles 후처리 — 카드 root 안의 element 에 인라인 style 주입
  if (card.fieldStyles && Object.keys(card.fieldStyles).length) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    const root = tmp.firstElementChild;
    if (root) applyFieldStyles(card, root);
    return tmp.innerHTML;
  }
  return html;
}

// ====================================================================
// STATE
// ====================================================================
const STATE = {
  theme: "navy",
  brand: {
    name: "인공지능사관학교 서포터즈",
    handle: "@dailysync_ai",
    footer: "인공지능사관학교 서포터즈",
  },
  cards: [],
  activeId: null,
  lastSourceText: "", // 마지막 원본 텍스트 (재생성 시 참조)
  meta: {}, // 세션 메타 (cluster_id 등 — 봇 인테그레이션 시 채워짐)
};

const LS_KEY = "cardnews_studio_v3";          // (구) 단일 세션 키 — 마이그레이션용
const LS_WS_KEY = "cardnews_studio_ws_v1";    // 멀티 프로젝트 워크스페이스 키

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// ====================================================================
// WORKSPACE — 여러 카드뉴스(프로젝트)를 탭으로 관리
//   STATE 는 항상 "활성 프로젝트"를 가리킨다(기존 코드 호환).
//   WORKSPACE.projects 에 모든 프로젝트를 보관한다.
// ====================================================================
const WORKSPACE = { activeId: null, projects: [] };

function blankProjectData(name) {
  return {
    id: uid(),
    name: name || "새 카드뉴스",
    theme: "navy",
    brand: { name: "인공지능사관학교 서포터즈", handle: "@dailysync_ai", footer: "인공지능사관학교 서포터즈" },
    cards: [],
    activeId: null,
    lastSourceText: "",
    meta: {},
  };
}

function activeProject() { return WORKSPACE.projects.find(p => p.id === WORKSPACE.activeId) || null; }

// STATE -> 활성 프로젝트 레코드로 저장
function syncStateToProject() {
  const p = activeProject();
  if (!p) return;
  p.theme = STATE.theme;
  p.brand = STATE.brand;
  p.cards = STATE.cards;
  p.activeId = STATE.activeId;
  p.lastSourceText = STATE.lastSourceText;
  p.meta = STATE.meta;
}

// 프로젝트 레코드 -> STATE 로 로드
function loadProjectToState(p) {
  STATE.theme = p.theme || "navy";
  STATE.brand = p.brand || { name: "", handle: "@dailysync_ai", footer: "" };
  STATE.cards = p.cards || [];
  STATE.activeId = p.activeId || (STATE.cards[0]?.id ?? null);
  STATE.lastSourceText = p.lastSourceText || "";
  STATE.meta = p.meta || {};
}

function ensureAtLeastOneProject() {
  if (WORKSPACE.projects.length === 0) {
    const p = blankProjectData("카드뉴스 1");
    WORKSPACE.projects.push(p);
    WORKSPACE.activeId = p.id;
    loadProjectToState(p);
  }
}

function activateProject(id) {
  if (id === WORKSPACE.activeId) return;
  syncStateToProject();
  const p = WORKSPACE.projects.find(x => x.id === id);
  if (!p) return;
  WORKSPACE.activeId = id;
  loadProjectToState(p);
  setTheme(STATE.theme);
  renderTabs();
  renderAll();
  autoSave();
}

function addProject(name) {
  syncStateToProject();
  const p = blankProjectData(name || `카드뉴스 ${WORKSPACE.projects.length + 1}`);
  WORKSPACE.projects.push(p);
  WORKSPACE.activeId = p.id;
  loadProjectToState(p);
  setTheme(STATE.theme);
  renderTabs();
  renderAll();
  autoSave();
  toast("✓ 새 카드뉴스 탭 생성", "success");
}

function renameProject(id) {
  const p = WORKSPACE.projects.find(x => x.id === id);
  if (!p) return;
  const name = prompt("카드뉴스 이름", p.name);
  if (name && name.trim()) { p.name = name.trim(); renderTabs(); autoSave(); }
}

function deleteProject(id) {
  const p = WORKSPACE.projects.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`"${p.name}" 탭을 삭제할까요?\n이 카드뉴스의 카드가 모두 사라집니다.`)) return;
  const wasActive = (id === WORKSPACE.activeId);
  const idx = WORKSPACE.projects.findIndex(x => x.id === id);
  WORKSPACE.projects.splice(idx, 1);
  if (WORKSPACE.projects.length === 0) {
    const np = blankProjectData("카드뉴스 1");
    WORKSPACE.projects.push(np);
    WORKSPACE.activeId = np.id;
    loadProjectToState(np);
  } else if (wasActive) {
    const next = WORKSPACE.projects[Math.max(0, idx - 1)];
    WORKSPACE.activeId = next.id;
    loadProjectToState(next);
  }
  setTheme(STATE.theme);
  renderTabs();
  renderAll();
  autoSave();
}

function renderTabs() {
  const bar = document.getElementById("project-tabs");
  if (!bar) return;
  bar.innerHTML = "";
  WORKSPACE.projects.forEach(p => {
    const isActive = p.id === WORKSPACE.activeId;
    const count = isActive ? STATE.cards.length : (p.cards ? p.cards.length : 0);
    const tab = document.createElement("div");
    tab.className = "tab" + (isActive ? " active" : "");
    tab.title = `${p.name} — 더블클릭으로 이름 변경`;
    tab.innerHTML =
      `<span class="tab-name"></span>` +
      `<span class="tab-count">${count}</span>` +
      (WORKSPACE.projects.length > 1 ? `<span class="tab-close" title="탭 닫기">✕</span>` : ``);
    tab.querySelector(".tab-name").textContent = p.name;
    tab.onclick = e => { if (e.target.classList.contains("tab-close")) return; activateProject(p.id); };
    tab.ondblclick = e => { if (e.target.classList.contains("tab-close")) return; renameProject(p.id); };
    const closeBtn = tab.querySelector(".tab-close");
    if (closeBtn) closeBtn.onclick = e => { e.stopPropagation(); deleteProject(p.id); };
    bar.appendChild(tab);
  });
  const add = document.createElement("button");
  add.className = "tab-add";
  add.textContent = "+ 새 카드뉴스";
  add.onclick = () => addProject();
  bar.appendChild(add);

  const queue = document.createElement("button");
  queue.className = "tab-add";
  queue.textContent = "📥 발행큐에서 불러오기";
  queue.title = "카드뉴스 오토의 발행큐에 있는 기사를 새 탭으로 불러오기";
  queue.onclick = () => openQueuePickerModal();
  bar.appendChild(queue);
}

// 발행큐(/api/sessions)에서 기사를 골라 새 탭으로 불러오기
function openQueuePickerModal() {
  const back = document.createElement("div");
  back.className = "modal-backdrop";
  back.innerHTML = `
    <div class="modal" style="max-width:680px">
      <div class="modal-header">
        <h2>📥 발행큐에서 불러오기</h2>
        <button class="close">×</button>
      </div>
      <div class="modal-body">
        <p class="intro">카드뉴스 오토의 발행큐에 있는 기사를 새 탭으로 불러옵니다. 불러온 탭을 편집하면 해당 세션에 자동 저장됩니다.</p>
        <input type="text" id="queue-filter" placeholder="제목·ID 검색…" style="width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px;margin-bottom:12px" autocomplete="off">
        <div id="queue-list" style="display:flex;flex-direction:column;gap:8px;min-height:140px;max-height:52vh;overflow-y:auto">
          <div style="color:var(--text-dim);font-size:12px;padding:24px;text-align:center">불러오는 중…</div>
        </div>
      </div>
    </div>`;
  document.body.appendChild(back);
  const close = () => back.remove();
  back.querySelector(".close").onclick = close;
  back.onclick = e => { if (e.target === back) close(); };

  const listEl = back.querySelector("#queue-list");
  const filterEl = back.querySelector("#queue-filter");
  let items = [];

  const KIND = { daily_news: "데일리뉴스", tool_tip: "툴팁", tooltip: "툴팁", academy: "아카데미", freeform: "자유", studio: "스튜디오" };
  function kindLabel(meta) { const k = (meta && meta.kind) || ""; return KIND[k] || k || ""; }
  function fmtDate(ts) {
    if (!ts) return "";
    const d = new Date(ts * 1000);
    return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  }
  const openIds = new Set(WORKSPACE.projects.map(p => p.meta && p.meta.sessionId).filter(Boolean));

  function render(list) {
    if (!list.length) { listEl.innerHTML = `<div style="color:var(--text-faint);font-size:12px;padding:24px;text-align:center">결과 없음</div>`; return; }
    listEl.innerHTML = "";
    list.forEach(it => {
      const isOpen = openIds.has(it.id);
      const row = document.createElement("button");
      row.style.cssText = "text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;flex-direction:column;gap:4px";
      row.onmouseenter = () => row.style.borderColor = "var(--accent)";
      row.onmouseleave = () => row.style.borderColor = "var(--line)";
      const kl = kindLabel(it.meta);
      row.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;color:var(--text);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.title || it.id)}</span>
          ${isOpen ? `<span style="font-size:9px;color:var(--accent);border:1px solid var(--accent);border-radius:100px;padding:1px 6px">열림</span>` : ""}
          <span style="font-size:10px;color:var(--text-faint)">${fmtDate(it.mtime)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-dim)">
          ${kl ? `<span style="border:1px solid var(--line);border-radius:100px;padding:1px 7px">${esc(kl)}</span>` : ""}
          <span>${it.cardCount || 0}장</span>
          <span>· ${esc(it.theme || "navy")}</span>
          <span style="margin-left:auto;color:var(--text-faint)">${esc(it.id)}</span>
        </div>`;
      row.onclick = () => { loadFromQueue(it.id); close(); };
      listEl.appendChild(row);
    });
  }

  filterEl.addEventListener("input", () => {
    const q = filterEl.value.trim().toLowerCase();
    render(!q ? items : items.filter(it => (it.title || "").toLowerCase().includes(q) || String(it.id).toLowerCase().includes(q)));
  });

  fetch("/api/sessions")
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(list => { items = Array.isArray(list) ? list : []; render(items); filterEl.focus(); })
    .catch(err => {
      listEl.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:24px;text-align:center">큐를 불러오지 못했습니다: ${esc(err.message)}<br><span style="color:var(--text-faint);font-size:11px">서버로 띄운 스튜디오( / )에서만 가능합니다.</span></div>`;
    });
}

function loadFromQueue(id) {
  // 서버 연동 스크립트가 노출한 loadSessionAsTab 우선 사용(중복 방지·세션 자동 동기화 포함)
  if (typeof window.loadSessionAsTab === "function") {
    window.loadSessionAsTab(id);
    return;
  }
  // 폴백: 직접 불러오기 (서버 자동 동기화는 없음)
  fetch(`/api/sessions/${id}`)
    .then(r => { if (!r.ok) throw new Error("세션 없음"); return r.json(); })
    .then(p => {
      const existing = WORKSPACE.projects.find(pr => pr.meta && pr.meta.sessionId === id);
      if (existing) { activateProject(existing.id); return; }
      syncStateToProject();
      const proj = blankProjectData((p.meta && p.meta.title) || p.name || ("세션 " + id));
      proj.theme = p.theme || "navy";
      proj.brand = p.brand || proj.brand;
      proj.cards = p.cards || [];
      proj.activeId = p.activeId || (proj.cards[0]?.id ?? null);
      proj.lastSourceText = p.lastSourceText || "";
      proj.meta = p.meta || {};
      proj.meta.sessionId = id;
      WORKSPACE.projects.push(proj);
      WORKSPACE.activeId = proj.id;
      loadProjectToState(proj);
      setTheme(STATE.theme);
      renderTabs();
      renderAll();
      autoSave();
      toast(`✓ 새 탭으로 불러옴: ${id}`, "success");
    })
    .catch(err => toast("불러오기 실패: " + err.message, "error"));
}

function applyTheme(themeId) {
  const t = THEMES[themeId];
  if (!t) return;
  let style = document.getElementById("theme-style");
  if (!style) { style = document.createElement("style"); style.id = "theme-style"; document.head.appendChild(style); }
  style.textContent = `
    .theme-${themeId} .card { --c-bg:${t.light.bg}; --c-text:${t.light.text}; --c-sub:${t.light.sub}; --c-accent:${t.light.accent}; --c-line:${t.light.line}; }
    .theme-${themeId} .lo-cover-bold, .theme-${themeId} .lo-cover-number, .theme-${themeId} .lo-cover-question, .theme-${themeId} .lo-cover-split, .theme-${themeId} .lo-cover-minimal {
      --c-bg:${t.bold.bg}; --c-text:${t.bold.text}; --c-sub:${t.bold.sub}; --c-accent:${t.bold.accent}; --c-line:${t.bold.line};
    }
  `;
}

async function callClaude(systemPrompt, userPrompt, maxTokens = 1000, images = []) {
  // user 메시지의 content 배열 구성 (이미지 먼저, 텍스트 마지막)
  const userContent = [];
  for (const img of images) {
    userContent.push({
      type: "image",
      source: { type: "base64", media_type: img.mediaType, data: img.base64 }
    });
  }
  userContent.push({ type: "text", text: userPrompt });

  // 프록시 우선, 안되면 직접 호출 (artifact 환경 fallback)
  const useProxy = !window.location.protocol.startsWith("file");
  const endpoint = useProxy ? "/api/claude" : "https://api.anthropic.com/v1/messages";

  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  if (!response.ok) {
    let errMsg = `API 오류 ${response.status}`;
    try {
      const errData = await response.json();
      errMsg += `: ${errData.error || JSON.stringify(errData).slice(0, 200)}`;
    } catch {
      errMsg += `: ${(await response.text()).slice(0, 200)}`;
    }
    throw new Error(errMsg);
  }
  const data = await response.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  return text;
}

function extractJSON(text) {
  // 코드블럭 제거
  let cleaned = text.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
  // JSON 객체 부분만 추출
  const objMatch = cleaned.match(/\{[\s\S]*\}/);
  if (objMatch) cleaned = objMatch[0];
  return JSON.parse(cleaned);
}

function renderCardList() {
  const wrap = document.getElementById("card-list");
  document.getElementById("card-count").textContent = STATE.cards.length;
  if (STATE.cards.length === 0) {
    wrap.innerHTML = `<div style="padding:20px 8px; color:var(--text-faint); font-size:11px; text-align:center; line-height:1.5;">아직 카드가 없어요</div>`;
    return;
  }
  wrap.innerHTML = "";
  STATE.cards.forEach((c, i) => {
    const item = document.createElement("div");
    item.className = "card-item" + (c.id === STATE.activeId ? " active" : "");
    item.dataset.id = c.id;
    item.draggable = true;
    item.innerHTML = `
      <span class="drag-handle" title="드래그">⋮⋮</span>
      <div class="card-num">${i + 1}</div>
      <div class="card-meta">
        <div class="card-label">${esc(previewLabel(c))}</div>
        <div class="card-type-mini">${TYPE_LABEL[c.type]} · ${c.layout}</div>
      </div>
      <div class="card-actions">
        <button class="card-act-btn" data-dup="${c.id}" title="복제">⎘</button>
        <button class="card-act-btn del" data-del="${c.id}" title="삭제">×</button>
      </div>`;
    item.addEventListener("click", e => {
      if (e.target.closest("[data-del]") || e.target.closest("[data-dup]")) return;
      selectCard(c.id);
    });
    item.addEventListener("dragstart", e => {
      item.classList.add("dragging");
      e.dataTransfer.setData("text/plain", c.id);
      e.dataTransfer.effectAllowed = "move";
    });
    item.addEventListener("dragend", () => item.classList.remove("dragging"));
    item.addEventListener("dragover", e => { e.preventDefault(); item.classList.add("drag-over"); });
    item.addEventListener("dragleave", () => item.classList.remove("drag-over"));
    item.addEventListener("drop", e => {
      e.preventDefault();
      item.classList.remove("drag-over");
      const fromId = e.dataTransfer.getData("text/plain");
      moveCard(fromId, c.id);
    });
    wrap.appendChild(item);
  });
  wrap.querySelectorAll("[data-del]").forEach(b => b.onclick = e => { deleteCard(b.dataset.del); e.stopPropagation(); });
  wrap.querySelectorAll("[data-dup]").forEach(b => b.onclick = e => { duplicateCard(b.dataset.dup); e.stopPropagation(); });
}

function previewLabel(card) {
  const d = card.data;
  if (card.type === "cover") return (d.title || "표지").split("\n")[0];
  if (card.type === "topic") {
    if (card.layout === "qa") return (d.question || "Q&A").split("\n")[0];
    if (card.layout === "definition") return d.term || "정의";
    if (card.layout === "compare") return d.compareTitle || "비교";
    return (d.title || "주제").split("\n")[0];
  }
  if (card.type === "list") return (d.title || "리스트").split("\n")[0];
  if (card.type === "highlight") {
    if (card.layout === "stat") return `${d.stat}${d.statUnit} · ${(d.statLabel || "").split("\n")[0]}`;
    if (card.layout === "emphasis") return `${d.emphPre} ${d.emphasis}`;
    if (card.layout === "tip") return `💡 ${(d.tipBody || "").split("\n")[0]}`;
    return (d.quote || "포인트").split("\n")[0];
  }
  if (card.type === "closing") {
    if (card.layout === "ask") return (d.askQuestion || "댓글 유도").split("\n")[0];
    return (d.title || "마무리").split("\n")[0];
  }
  return "";
}

function _currentFieldStyle(key) {
  const card = STATE.cards.find(c => c.id === STATE.activeId);

}

      <input type="range" class="ff-scale" data-field="${fieldKey}" min="0.5" max="2.0" step="0.05" value="${fs.scale}" style="flex:1;cursor:pointer;accent-color:var(--accent);height:14px">
      <span class="ff-scale-val" data-field="${fieldKey}" style="flex:0 0 34px;font-size:10px;color:var(--text-dim);text-align:right;font-variant-numeric:tabular-nums">${Math.round(fs.scale*100)}%</span>
      <input type="color" class="ff-color" data-field="${fieldKey}" value="${fs.color || '#ffffff'}" title="${hasCol ? '글자색 적용 중 — 더블클릭으로 해제' : '글자색 미적용 — 클릭해서 선택'}" style="flex:0 0 22px;width:22px;height:18px;padding:0;border:1px solid var(--line);border-radius:3px;cursor:pointer;opacity:${hasCol ? 1 : 0.45}">
      <button type="button" class="ff-reset" data-field="${fieldKey}" title="이 필드 크기·색 원래대로" style="flex:0 0 20px;background:none;border:1px solid var(--line);color:var(--text-faint);cursor:pointer;font-size:10px;padding:0 4px;border-radius:3px">↺</button>
    </div>`;
}

function field({key, label, type="input", placeholder="", limit=null, value=""}) {
  const counter = limit ? `<span class="counter" data-counter="${key}" data-limit="${limit}">0 / ${limit}</span>` : "";
  const input = type === "textarea"
    ? `<textarea data-key="${key}" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`
    : `<input type="text" data-key="${key}" value="${esc(value)}" placeholder="${esc(placeholder)}">`;
  return `<div class="field"><div class="field-label-row"><label>${label}</label>${counter}</div>${input}${fieldStyleCtrl(key)}</div>`;
}

function renderFields(card) {
  const d = card.data;
  const T = card.type, L = card.layout;
  let html = "";

  if (T === "cover") {
    html += field({key:"eyebrow", label:"아이브로우 (영문)", value:d.eyebrow, limit:32});
    if (L === "number") html += field({key:"number", label:"숫자", value:d.number, limit:3});
    html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:30});
    if (L !== "minimal") html += field({key:"subtitle", label:"서브타이틀", type:"textarea", value:d.subtitle, limit:60});
    if (L !== "question") html += field({key:"badge", label:"배지", value:d.badge, limit:30});
  }
  if (T === "topic") {
    if (L === "qa") {
      html += field({key:"question", label:"질문", type:"textarea", value:d.question, limit:40});
      html += field({key:"answer", label:"답변", type:"textarea", value:d.answer, limit:80});
    } else if (L === "definition") {
      html += field({key:"term", label:"용어 (1단어)", value:d.term, limit:10});
      html += field({key:"pron", label:"풀이/원어", value:d.pron, limit:60});
      html += field({key:"body", label:"본문 (정의)", type:"textarea", value:d.body, limit:120});
    } else if (L === "compare") {
      html += field({key:"compareTitle", label:"비교 주제", type:"textarea", value:d.compareTitle, limit:30});
