<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cardnews Studio v3 · AI-Powered</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
/* 제목용 디스플레이 폰트 — Gmarket Sans (상업용 무료, 카드뉴스 제목 트렌드) */
@font-face {
  font-family: 'Gmarket Sans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
  font-weight: 700 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Gmarket Sans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
  font-weight: 400 600; font-style: normal; font-display: swap;
}
:root {
  --bg: #0c0d12;
  --panel: #14161f;
  --panel-2: #1c1f2c;
  --line: #2a2e3e;
  --text: #ebeef5;
  --text-dim: #8b91a6;
  --text-faint: #5a607a;
  --accent: #6ee7ff;
  --accent-warm: #ffb86b;
  --ai: #c89bff;
  --danger: #ff6b86;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: "Pretendard Variable", Pretendard, -apple-system, "Apple SD Gothic Neo", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* 프로젝트(카드뉴스) 탭바 */
.tabbar {
  flex: 0 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  padding: 6px 10px 0;
  background: #08090d;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
}
.tabbar::-webkit-scrollbar { height: 6px; }
.tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px 8px 14px;
  border: 1px solid var(--line);
  border-bottom: none;
  border-radius: 9px 9px 0 0;
  background: var(--panel);
  color: var(--text-dim);
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
  max-width: 220px;
  transition: background 0.12s, color 0.12s;
}
.tab:hover { background: var(--panel-2); color: var(--text); }
.tab.active {
  background: var(--panel-2);
  color: var(--text);
  border-color: var(--accent);
  box-shadow: inset 0 2px 0 var(--accent);
}
.tab .tab-name {
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}
.tab .tab-count {
  font-size: 10px;
  color: var(--text-faint);
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  padding: 1px 7px;
  font-variant-numeric: tabular-nums;
}
.tab .tab-close {
  font-size: 11px;
  color: var(--text-faint);
  opacity: 0;
  padding: 0 2px;
  border-radius: 3px;
  transition: opacity 0.12s, color 0.12s, background 0.12s;
}
.tab:hover .tab-close, .tab.active .tab-close { opacity: 0.7; }
.tab .tab-close:hover { opacity: 1; color: var(--danger); background: rgba(255,107,134,0.12); }
.tab-add {
  flex: 0 0 auto;
  margin: 0 0 4px 4px;
  padding: 7px 12px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  white-space: nowrap;
}
.tab-add:hover { border-color: var(--accent); color: var(--accent); }

.app {
  display: grid;
  /* 카드 목록(좌) | 프리뷰 중앙(가변) | 에디터(우) */
  grid-template-columns: 260px 1fr 420px;
  flex: 1;
  min-height: 0;
}
.sidebar {
  order: 1;
  background: var(--panel);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.preview-pane {
  order: 2;
  background: #06070b;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.editor {
  order: 3;
  background: var(--panel);
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.brand {
  display: none;
}
.brand h1 {
  font-size: 14px;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand h1::before {
  content: "";
  width: 6px; height: 14px;
  background: linear-gradient(180deg, var(--accent), var(--ai));
  border-radius: 2px;
}
.brand .ver {
  font-size: 9.5px;
  color: var(--ai);
  padding: 2px 8px;
  border: 1px solid rgba(200,155,255,0.3);
  border-radius: 100px;
  background: rgba(200,155,255,0.06);
  letter-spacing: 0.05em;
}

.section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.section h3 {
  margin: 0 0 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  justify-content: space-between;
}
.section h3 .help {
  font-weight: 400; text-transform: none;
  letter-spacing: 0; color: var(--text-faint); font-size: 10px;
}

/* 메인 AI 버튼 */
.ai-hero {
  padding: 14px;
  background: linear-gradient(135deg, rgba(200,155,255,0.12), rgba(110,231,255,0.08));
  border-bottom: 1px solid var(--line);
}
.ai-hero-btn {
  width: 100%;
  padding: 14px 14px;
  border: 0;
  background: linear-gradient(135deg, var(--ai), var(--accent));
  color: #1a0d3a;
  border-radius: 10px;
  font-size: 13.5px;
  font-weight: 700;
  letter-spacing: -0.01em;
  transition: all 0.2s;
  position: relative;
}
.ai-hero-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(200,155,255,0.25);
}
.ai-hero-btn:disabled {
  opacity: 0.6;
  cursor: progress;
  transform: none;
}
.ai-hero-desc {
  font-size: 10.5px;
  color: var(--text-dim);
  text-align: center;
  margin: 8px 0 0;
  line-height: 1.5;
}

/* 테마 그리드 */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}
.theme-chip {
  height: 32px;
  border-radius: 6px;
  border: 1.5px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  font-size: 9.5px;
  transition: all 0.1s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 4px 2px;
  position: relative;
}
.theme-chip:hover { border-color: var(--text-dim); }
.theme-chip.active { border-color: var(--accent); }
.theme-chip.active::after {
  content: "✓";
  position: absolute;
  top: 1px; right: 3px;
  font-size: 9px; color: var(--accent);
}
.theme-swatch {
  display: flex; width: 100%; height: 11px;
  border-radius: 2px; overflow: hidden;
}
.theme-swatch span { flex: 1; }

/* 카드 목록 */
.card-list-wrap {
  flex: 1;
  min-height: 96px;        /* 세로 폭이 좁아도 최소 카드 2~3장은 보이도록 */
  overflow-y: auto;
  padding: 6px 8px;
}
.card-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 9px;
  margin-bottom: 3px;
  background: var(--panel-2);
  border: 1.5px solid transparent;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.1s;
  position: relative;
}
.card-item:hover { border-color: var(--line); }
.card-item.active {
  border-color: var(--accent);
  background: rgba(110, 231, 255, 0.06);
}
.card-item.dragging { opacity: 0.4; }
.card-item.drag-over { border-top: 2px solid var(--accent); }
.drag-handle {
  color: var(--text-faint);
  font-size: 13px; cursor: grab; user-select: none; padding: 0 1px;
}
.card-num {
  width: 20px; height: 20px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 700;
  color: var(--text-dim);
  flex-shrink: 0;
}
.card-item.active .card-num { background: var(--accent); color: #000; }
.card-meta { flex: 1; min-width: 0; }
.card-label {
  font-size: 11.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.card-type-mini {
  font-size: 9px; color: var(--text-faint);
  margin-top: 1px; text-transform: uppercase; letter-spacing: 0.05em;
}
.card-actions {
  display: flex; gap: 1px;
  opacity: 0; transition: opacity 0.1s;
}
.card-item:hover .card-actions, .card-item.active .card-actions { opacity: 1; }
.card-act-btn {
  border: 0; background: transparent;
  color: var(--text-faint);
  padding: 3px 4px; border-radius: 3px;
  font-size: 11px; line-height: 1;
}
.card-act-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.card-act-btn.del:hover { color: var(--danger); background: rgba(255,107,134,0.1); }

/* 카드 추가 */
.add-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}
.add-btn {
  padding: 8px 7px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  font-size: 10.5px;
  text-align: left;
  line-height: 1.25;
  transition: all 0.1s;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); }
.add-btn b { display: block; font-size: 11.5px; margin-bottom: 1px; }
.add-btn span { color: var(--text-faint); font-size: 9.5px; }

/* 푸터 액션 */
.actions {
  padding: 10px 14px;
  border-top: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 5px;
}
.btn {
  padding: 9px 11px;
  border: 0;
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
  transition: all 0.12s;
}
.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover { background: #8aeeff; }
.btn-primary:disabled { opacity: 0.6; cursor: progress; }
.btn-ghost {
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--text-dim); }
.btn-ai {
  background: linear-gradient(135deg, rgba(200,155,255,0.18), rgba(110,231,255,0.12));
  color: var(--ai);
  border: 1px solid rgba(200,155,255,0.3);
}
.btn-ai:hover { border-color: var(--ai); }
.btn-ai:disabled { opacity: 0.6; cursor: progress; }
.btn-row { display: flex; gap: 5px; }
.btn-row .btn { flex: 1; font-size: 11px; padding: 8px 6px; }

/* 에디터 */
.editor-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}
.editor-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.editor-header h2 { margin: 0; font-size: 13px; }
.editor-header .ec { font-size: 10px; color: var(--text-faint); }
.editor-header p { margin: 0; color: var(--text-dim); font-size: 10.5px; }

.layout-chips {
  display: flex; gap: 4px;
  margin-top: 10px; flex-wrap: wrap;
}
.layout-chip {
  padding: 5px 9px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--text-dim);
  font-size: 10.5px;
  border-radius: 100px;
  transition: all 0.1s;
}
.layout-chip:hover { color: var(--text); border-color: var(--text-dim); }
.layout-chip.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}
.layout-chip.loading {
  background: linear-gradient(135deg, var(--ai), var(--accent));
  color: #1a0d3a;
  border-color: transparent;
}

.card-action-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.card-action-row .btn { flex: 1; padding: 7px 10px; font-size: 11px; }

.editor-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px;
}
.empty {
  padding: 30px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.6;
}
.empty-emoji { font-size: 32px; margin-bottom: 8px; }

.field { margin-bottom: 14px; }
.field-label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.field label {
  font-size: 10.5px; color: var(--text-dim);
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
.field .counter {
  font-size: 10px; color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.field .counter.warn { color: var(--accent-warm); }
.field .counter.over { color: var(--danger); }
.field input, .field textarea, .field select {
  width: 100%;
  padding: 9px 11px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  resize: vertical;
}
.field textarea { min-height: 56px; line-height: 1.5; }
/* 자동 높이 textarea — 내용에 맞춰 1줄~여러 줄로 늘어남(JS autoGrow) */
.field textarea.ta-auto { min-height: 38px; line-height: 1.5; overflow: hidden; resize: none; }
.field textarea.ta-compact { min-height: 38px; }
.field textarea.ta-sub { font-size: 12px; color: var(--text-dim); background: var(--panel); }
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--accent);
}

.list-items { display: flex; flex-direction: column; gap: 5px; }
.list-item-row { display: flex; gap: 5px; align-items: flex-start; }
.list-item-row input, .list-item-row textarea { flex: 1; }
.icon-btn {
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text-dim);
  width: 28px; height: 28px;
  border-radius: 5px;
  font-size: 13px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--danger); border-color: var(--danger); }
.add-item-btn {
  margin-top: 5px;
  border: 1px dashed var(--line);
  background: transparent;
  color: var(--text-dim);
  padding: 7px;
  width: 100%;
  border-radius: 6px;
  font-size: 11px;
}
.add-item-btn:hover { color: var(--accent); border-color: var(--accent); }

/* 미리보기 */
.preview-header {
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.preview-header h2 {
  margin: 0; font-size: 12px;
  color: var(--text-dim); font-weight: 500;
}
.preview-header .meta {
  font-size: 10.5px; color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.preview-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: auto;
  position: relative;
}
.preview-scaler {
  width: calc(1080px * var(--preview-scale, 0.4));
  height: calc(1350px * var(--preview-scale, 0.4));
  position: relative;
}
.preview-scaler::before {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  border-radius: 4px;
  pointer-events: none;
  z-index: -1;
}
.preview-loading {
  position: absolute; inset: 0;
  background: rgba(8,9,13,0.85);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  flex-direction: column;
  gap: 14px;
}
.preview-loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--line);
  border-top-color: var(--ai);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.preview-loading .label {
  color: var(--ai);
  font-size: 12px;
  font-weight: 600;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === 카드 본체 === */
.card {
  width: 1080px;
  height: 1350px;
  position: absolute;
  top: 0;
  left: 0;
  transform: scale(var(--preview-scale, 0.4));
  transform-origin: top left;
  background: var(--c-bg);
  color: var(--c-text);
  --font-body: "Pretendard Variable", Pretendard, sans-serif;
  --font-head: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-family: var(--font-body);
  overflow: hidden;
  --c-bg: #eef0f4;
  --c-text: #0e1422;
  --c-sub: #5b6275;
  --c-accent: #1e3fa8;
  --c-line: #dde1e9;
}
/* 제목·대형 숫자 등 헤드라인 요소에만 디스플레이 폰트 적용 (본문은 Pretendard 유지) */
.card .title, .card .term, .card .compare-title, .card .compare-h,
.card .big-num, .card .stat, .card .stat-unit, .card .q-mark, .card .quote,
.card .emphasis, .card .idx, .card .qa-tag, .card .bullet, .card .tl-dot {
  font-family: var(--font-head);
}
.card-inner {
  position: absolute;
  inset: 0;
  padding: 96px;
  display: flex;
  flex-direction: column;
}
.page-num {
  position: absolute;
  bottom: 60px; right: 96px;
  font-size: 24px; color: var(--c-sub);
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
  font-weight: 500; z-index: 2;
}
.footer-mark {
  position: absolute;
  bottom: 60px; left: 96px;
  font-size: 22px; color: var(--c-sub);
  letter-spacing: 0.08em;
  font-weight: 500; text-transform: uppercase;
  z-index: 2;
}
.swipe-hint {
  position: absolute;
  bottom: 60px; right: 96px;
  display: flex; align-items: center; gap: 16px;
  font-size: 26px; color: var(--c-accent);
  font-weight: 600; letter-spacing: 0.05em;
  z-index: 2;
}
.swipe-hint .arrow { font-size: 40px; line-height: 1; }

/* 한국어는 단어 단위로 묶되, 컨테이너를 넘으면 어디서든 줄바꿈 (15만개+, AI에이전트 같은 혼합 토큰 안전).
   또한 모든 텍스트 컨테이너가 부모 폭을 절대 안 넘게 max-width 0 (flex/grid 자식 폭 안전망). */
.card * { word-break: keep-all; overflow-wrap: anywhere; }
.card .card-inner > * { max-width: 100%; min-width: 0; }

/* ===== 배경 이미지 모드 ===== */
.card.has-bg-image {
  background-color: #1a1a1a !important;
  overflow: hidden;
}
.card.has-bg-image .bg-image-layer {
  position: absolute;
  inset: 0;
  z-index: -1000; /* 배경 — 항상 최하단 (요소 레이어 순서와 분리) */
  background-size: cover;
  background-position: var(--bg-pos-x, 50%) var(--bg-pos-y, 50%);
  background-repeat: no-repeat;
  transform: scale(var(--bg-zoom, 1));
  transform-origin: var(--bg-pos-x, 50%) var(--bg-pos-y, 50%);
}
.card.has-bg-image .bg-image-overlay {
  position: absolute;
  inset: 0;
  z-index: -999;
  /* darken 값(0~85%)을 두 stop으로 분배 — 상단은 약, 하단은 강 (가독성↑) */
  background: linear-gradient(
    180deg,
    rgba(0,0,0, calc(var(--bg-darken, 0.55) * 0.55)) 0%,
    rgba(0,0,0, var(--bg-darken, 0.55)) 60%,
    rgba(0,0,0, calc(var(--bg-darken, 0.55) * 1.05)) 100%
  );
}
.card.has-bg-image .card-inner {
  position: relative;
  z-index: auto; /* 스태킹 컨텍스트 만들지 않음 — 필드/오버레이가 카드 컨텍스트에서 자유롭게 정렬 */
}
/* 텍스트 색상 강제 — 어떤 테마든 흰 계열로 */
.card.has-bg-image,
.card.has-bg-image .card-inner,
.card.has-bg-image h1, .card.has-bg-image h2, .card.has-bg-image h3,
.card.has-bg-image h4,
.card.has-bg-image .quote, .card.has-bg-image .attr,
.card.has-bg-image .title, .card.has-bg-image .subtitle,
.card.has-bg-image .body, .card.has-bg-image .sub,
.card.has-bg-image .label, .card.has-bg-image .eyebrow,
.card.has-bg-image .pre, .card.has-bg-image .post,
.card.has-bg-image .stat, .card.has-bg-image .stat-unit,
.card.has-bg-image .emphasis, .card.has-bg-image .number,
.card.has-bg-image .term, .card.has-bg-image .pron,
.card.has-bg-image .pronunciation,
.card.has-bg-image .question, .card.has-bg-image .answer,
.card.has-bg-image .compareTitle, .card.has-bg-image .compare-title,
.card.has-bg-image .compare-h, .card.has-bg-image .compare-body,
.card.has-bg-image .descItems strong, .card.has-bg-image .item-title,
.card.has-bg-image .item-desc,
.card.has-bg-image .timelineItems strong, .card.has-bg-image .tl-label,
.card.has-bg-image .tl-body, .card.has-bg-image .footer-mark,
.card.has-bg-image .page-num, .card.has-bg-image .swipe-hint,
.card.has-bg-image .tipLabel, .card.has-bg-image .tipBody,
.card.has-bg-image .tip-label, .card.has-bg-image .tip-body,
.card.has-bg-image .qa-text, .card.has-bg-image .qa-tag,
/* closing 전용 — 자주 누락되던 작은 글자들 */
.card.has-bg-image .account, .card.has-bg-image .hashtag,
.card.has-bg-image .saveReason, .card.has-bg-image .save-reason,
.card.has-bg-image .askQuestion, .card.has-bg-image .ask-question,
.card.has-bg-image .askCta, .card.has-bg-image .ask-cta,
.card.has-bg-image .statLabel, .card.has-bg-image .statNote,
.card.has-bg-image .note,
.card.has-bg-image li, .card.has-bg-image span, .card.has-bg-image p,
.card.has-bg-image .q-mark, .card.has-bg-image .badge,
.card.has-bg-image .big-num, .card.has-bg-image .idx, .card.has-bg-image .tl-dot,
.card.has-bg-image .bullet, .card.has-bg-image .box {
  color: #ffffff !important;
}
/* 어두운 영역에선 sub/dim 톤도 살짝 밝게 */
.card.has-bg-image .attr, .card.has-bg-image .footer-mark,
.card.has-bg-image .page-num, .card.has-bg-image .subtitle,
.card.has-bg-image .pron, .card.has-bg-image .statNote,
.card.has-bg-image .note {
  color: rgba(255,255,255,0.8) !important;
}

/* ===== 부분 배경(밴드) 모드 — 카드 일부만 이미지, 나머지는 테마 색/텍스트 =====
   카드 크기(1080×1350)가 고정이라 calc 로 정확히 분할. 콘텐츠는 테마 색 영역에
   남으므로 흰색 강제(has-bg-image)를 적용하지 않는다. */
.card.bg-band { overflow: hidden; }
.card.bg-band .bg-image-layer {
  position: absolute; z-index: -1000;
  background-size: cover;
  background-position: var(--bg-pos-x, 50%) var(--bg-pos-y, 50%);
  background-repeat: no-repeat;
  transform: scale(var(--bg-zoom, 1));
  transform-origin: var(--bg-pos-x, 50%) var(--bg-pos-y, 50%);
}
.card.bg-band .bg-image-overlay { position: absolute; z-index: -999; background: rgba(0,0,0, var(--bg-darken, 0)); }
.card.bg-band .card-inner { position: relative; z-index: auto; }
.card.bg-band-top .bg-image-layer, .card.bg-band-top .bg-image-overlay { inset: 0 0 auto 0; height: calc(1350px * var(--band-ratio, 0.42)); }
.card.bg-band-bottom .bg-image-layer, .card.bg-band-bottom .bg-image-overlay { inset: auto 0 0 0; height: calc(1350px * var(--band-ratio, 0.42)); }
.card.bg-band-left .bg-image-layer, .card.bg-band-left .bg-image-overlay { inset: 0 auto 0 0; width: calc(1080px * var(--band-ratio, 0.42)); }
.card.bg-band-right .bg-image-layer, .card.bg-band-right .bg-image-overlay { inset: 0 0 0 auto; width: calc(1080px * var(--band-ratio, 0.42)); }
/* 콘텐츠가 밴드를 피하도록 안쪽 여백 (기본 패딩 + 밴드 크기) */
.card.bg-band-top .card-inner { padding-top: calc(1350px * var(--band-ratio, 0.42) + 80px); }
.card.bg-band-bottom .card-inner { padding-bottom: calc(1350px * var(--band-ratio, 0.42) + 80px); }
.card.bg-band-left .card-inner { padding-left: calc(1080px * var(--band-ratio, 0.42) + 80px); }
.card.bg-band-right .card-inner { padding-right: calc(1080px * var(--band-ratio, 0.42) + 80px); }
/* === 글자 효과 — 크기별로 다른 그림자 강도 ===
   paint-order: stroke fill 로 외곽선이 글자 아래 깔리게 (가독성 +) */
.card.has-bg-image * {
  paint-order: stroke fill;
}
/* 큰 글자 (title/quote/stat/emphasis/number/term) — 부드러운 drop shadow + 얇은 stroke */
.card.has-bg-image .title, .card.has-bg-image .quote,
.card.has-bg-image .stat, .card.has-bg-image .emphasis,
.card.has-bg-image .number, .card.has-bg-image .term {
  text-shadow:
    0 4px 24px rgba(0,0,0,0.55),
    0 2px 6px rgba(0,0,0,0.7),
    0 0 1px rgba(0,0,0,0.9);
  -webkit-text-stroke: 0.5px rgba(0,0,0,0.35);
}
/* 중간 글자 (body/sub/subtitle/label/eyebrow/question/answer 등) — 헤일로 효과 */
.card.has-bg-image .body, .card.has-bg-image .sub,
.card.has-bg-image .subtitle, .card.has-bg-image .label,
.card.has-bg-image .eyebrow, .card.has-bg-image .answer,
.card.has-bg-image .question, .card.has-bg-image .descItems,
.card.has-bg-image .tipBody, .card.has-bg-image .tip-body,
.card.has-bg-image .compare-body, .card.has-bg-image .item-desc,
.card.has-bg-image .tl-body, .card.has-bg-image .qa-text {
  text-shadow:
    0 0 6px rgba(0,0,0,0.85),
    0 0 3px rgba(0,0,0,0.9),
    0 2px 4px rgba(0,0,0,0.6);
  -webkit-text-stroke: 0.4px rgba(0,0,0,0.4);
}
/* 작은 글자 (footer/page-num/attr/note/statNote/pronunciation) — 가장 강한 헤일로 */
.card.has-bg-image .footer-mark, .card.has-bg-image .page-num,
.card.has-bg-image .attr, .card.has-bg-image .note,
.card.has-bg-image .statNote, .card.has-bg-image .pron,
.card.has-bg-image .pronunciation, .card.has-bg-image .swipe-hint,
.card.has-bg-image .compare-label, .card.has-bg-image .tl-label,
.card.has-bg-image .item-title, .card.has-bg-image .tip-label,
/* closing 카드 작은 본문 — 자주 누락되던 부분 */
.card.has-bg-image .account, .card.has-bg-image .hashtag,
.card.has-bg-image .saveReason, .card.has-bg-image .save-reason,
.card.has-bg-image .askCta, .card.has-bg-image .ask-cta {
  text-shadow:
    0 0 8px rgba(0,0,0,0.95),
    0 0 4px rgba(0,0,0,0.95),
    0 0 2px rgba(0,0,0,0.9),
    0 1px 3px rgba(0,0,0,0.85);
  -webkit-text-stroke: 0.6px rgba(0,0,0,0.55);
  font-weight: 600 !important; /* 약간 더 두껍게 */
}

/* closing 카드의 본문 작은 글자 — inline 반투명 박스로 확실히 분리
   (DOM 의 실제 클래스명 기준: .reason, .question, .cta-box, .hashtag, .subtitle, .account) */
.card.has-bg-image.lo-closing-save .reason,
.card.has-bg-image.lo-closing-ask .question,
.card.has-bg-image.lo-closing-ask .cta-box,
.card.has-bg-image.lo-closing-next .hashtag,
.card.has-bg-image.lo-closing-thanks .subtitle,
.card.has-bg-image .account {
  background: rgba(0,0,0,0.55);
  padding: 8px 18px !important;
  border-radius: 10px;
  display: inline-block !important;
  max-width: 90%;
}

/* closing/save·thanks 의 큰 이모지(.icon)도 색상 강제 (var(--c-accent) 덮어쓰기) */
.card.has-bg-image .icon {
  color: #ffffff !important;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
}

/* closing 카드 중앙 vignette — 텍스트 영역만 추가로 어둡게 */
.card.has-bg-image[class*="lo-closing"] .bg-image-overlay {
  background:
    radial-gradient(
      ellipse 70% 50% at center,
      rgba(0,0,0, calc(var(--bg-darken, 0.55) * 0.4)) 0%,
      rgba(0,0,0, 0) 70%
    ),
    linear-gradient(
      180deg,
      rgba(0,0,0, calc(var(--bg-darken, 0.55) * 0.5)) 0%,
      rgba(0,0,0, var(--bg-darken, 0.55)) 50%,
      rgba(0,0,0, calc(var(--bg-darken, 0.55) * 1.1)) 100%
    );
}

/* badge·label·footer-mark·page-num — 반투명 솔리드 박스로 가독성 보장 (html2canvas 호환) */
.card.has-bg-image .badge {
  background: rgba(0,0,0,0.5) !important;
  padding: 8px 18px !important;
  border-radius: 100px;
  display: inline-flex !important;
  align-items: center;
  gap: 8px;
}
.card.has-bg-image .label,
.card.has-bg-image .compare-label,
.card.has-bg-image .tl-label,
.card.has-bg-image .qa-tag,
.card.has-bg-image .tip-label {
  background: rgba(0,0,0,0.55) !important;
  padding: 6px 16px !important;
  border-radius: 8px;
  display: inline-block !important;
}
.card.has-bg-image .footer-mark,
.card.has-bg-image .page-num,
.card.has-bg-image .swipe-hint {
  background: rgba(0,0,0,0.5);
  padding: 8px 16px;
  border-radius: 100px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
/* attr·note — 인용 출처 등은 박스보다 그림자만 (디자인 깨지지 않게) */

/* === 밝은 배경 자동 감지 (JS 가 .bright-bg 부착) === */
.card.has-bg-image.bright-bg .bg-image-overlay {
  /* 밝은 사진일 때 오버레이 1.5배 강화 */
  background: linear-gradient(
    180deg,
    rgba(0,0,0, calc(var(--bg-darken, 0.55) * 0.85)) 0%,
    rgba(0,0,0, calc(var(--bg-darken, 0.55) * 1.5)) 60%,
    rgba(0,0,0, calc(var(--bg-darken, 0.55) * 1.7)) 100%
  );
}
/* 매우 밝은 배경일 때 추가 vignette */
.card.has-bg-image.very-bright-bg .bg-image-layer {
  filter: brightness(0.75);
}

.lo-cover-number .eyebrow { font-size: calc(40px * var(--font-scale, 1) * var(--fs-label, 1) * var(--field-scale, 1)); color: var(--c-sub); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }

.lo-topic-compare .compare-title { font-size: calc(73px * var(--font-scale, 1) * var(--fs-top, 1) * var(--field-scale, 1)); line-height: 1.2; font-weight: 800; margin: 0 0 56px; letter-spacing: -0.03em; }

.lo-highlight-card .quote-card .quote { font-size: calc(78px * var(--font-scale,1) * var(--fs-top,1) * var(--field-scale,1)); line-height: 1.3; font-weight: 700; letter-spacing: -0.02em; margin: 16px 0 36px; }
.lo-highlight-card .quote-card .attr { font-size: calc(34px * var(--font-scale,1) * var(--fs-note,1) * var(--field-scale,1)); font-weight: 600; opacity: 0.85; }

/* CLOSING: CTA — 강한 행동유도 버튼 */
.lo-closing-cta .card-inner { justify-content: center; align-items: center; text-align: center; padding: 180px 90px; gap: 30px; }
.lo-closing-cta .eyebrow { font-size: calc(42px * var(--font-scale,1) * var(--fs-label,1) * var(--field-scale,1)); color: var(--c-accent); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.lo-closing-cta .title { font-size: calc(112px * var(--font-scale,1) * var(--fs-top,1) * var(--field-scale,1)); line-height: 1.12; font-weight: 800; letter-spacing: -0.03em; margin: 0; }
.lo-closing-cta .cta-btn { background: var(--c-accent); color: var(--c-bg); padding: 32px 60px; border-radius: 100px; font-size: calc(48px * var(--font-scale,1) * var(--fs-top,1) * var(--field-scale,1)); font-weight: 800; margin-top: 12px; }
.lo-closing-cta .account { font-size: calc(44px * var(--font-scale,1) * var(--fs-note,1) * var(--field-scale,1)); font-weight: 700; color: var(--c-accent); margin-top: 16px; }

/* ===== P5 오버레이 요소 (자유 배치 텍스트/배지/이미지) ===== */
/* z-index 없음 — 오버레이가 필드와 같은 컨텍스트에서 정렬되도록.
   pointer-events:none 으로 빈 레이어가 아래 템플릿 필드 클릭을 막지 않게 함(실제 요소만 클릭 받음) */
.ov-layer { position: absolute; inset: 0; pointer-events: none; }
.ov-el { position: absolute; box-sizing: border-box; pointer-events: auto; }
.ov-text { line-height: 1.3; letter-spacing: -0.01em; color: var(--c-text); white-space: pre-wrap; word-break: keep-all; overflow-wrap: anywhere; }
.ov-badge { display: inline-block; background: var(--c-accent); color: var(--c-bg); padding: 0.2em 0.66em; border-radius: 100px; font-weight: 800; white-space: nowrap; line-height: 1.25; }
.ov-image img { width: 100%; height: auto; display: block; }
/* 프리뷰에서만 드래그 가능 표시 (내보내기 render-area 에는 점선 없음) */
.preview-scaler .ov-el { cursor: move; outline: 1.5px dashed rgba(127,127,127,0.55); outline-offset: 2px; transition: outline-color .12s; }
.preview-scaler .ov-el:hover { outline-color: var(--accent, #6ee7ff); }
/* 기존 템플릿 영역도 프리뷰에서 선택/이동 가능 — 평소엔 표시 없음, 호버 시 점선 */
.preview-scaler .fld-target { cursor: move; }
.preview-scaler .fld-target:hover { outline: 1.5px dashed var(--accent, #6ee7ff); outline-offset: 3px; }
.preview-scaler .ov-el.sel-active,
.preview-scaler .fld-target.sel-active { outline: 3px solid var(--accent, #6ee7ff) !important; outline-offset: 2px; }
.preview-scaler .fld-target.sel-active { position: relative; }
/* 모서리 리사이즈 핸들 (카드 좌표 기준 — 0.4 줌에서 약 15px) */
.ov-handle { position: absolute; width: 38px; height: 38px; background: #fff; border: 3px solid var(--accent, #6ee7ff); border-radius: 5px; z-index: 10; box-shadow: 0 1px 5px rgba(0,0,0,0.45); }
.ov-handle[data-corner="nw"] { left: -19px; top: -19px; cursor: nwse-resize; }
.ov-handle[data-corner="ne"] { right: -19px; top: -19px; cursor: nesw-resize; }
.ov-handle[data-corner="sw"] { left: -19px; bottom: -19px; cursor: nesw-resize; }
.ov-handle[data-corner="se"] { right: -19px; bottom: -19px; cursor: nwse-resize; }
/* 변(엣지) 핸들 — 이미지 오버레이에서만 표시. 모서리 핸들과 시각적으로 구분되도록 살짝 둥글게 */
.ov-handle[data-corner="n"] { left: 50%; top: -19px; transform: translateX(-50%); cursor: ns-resize; border-radius: 50%; }
.ov-handle[data-corner="s"] { left: 50%; bottom: -19px; transform: translateX(-50%); cursor: ns-resize; border-radius: 50%; }
.ov-handle[data-corner="e"] { right: -19px; top: 50%; transform: translateY(-50%); cursor: ew-resize; border-radius: 50%; }
.ov-handle[data-corner="w"] { left: -19px; top: 50%; transform: translateY(-50%); cursor: ew-resize; border-radius: 50%; }

/* 필드별 사용자 색상은 RENDERER 결과 element 의 인라인 style 로 적용됨
   (style="color: #XXX !important"). 글자 크기는 카드 root --field-scale 변수 곱셈. */

/* 추출용 hidden 영역 */
.render-area {
  position: fixed;
  top: 0; left: -10000px;
  width: 1080px; height: 1350px;
  pointer-events: none;
}
.render-area .card { transform: none; position: relative; }

/* ── 인스타 스토리 요약 카드 (1080×1920, 9:16) ── */
.story-render-area {
  position: fixed;
  top: 0; left: -10000px;
  width: 1080px; height: 1920px;
  pointer-events: none;
}
.story-card {
  width: 1080px; height: 1920px;
  position: relative;
  background: var(--s-bg);
  color: var(--s-text);
  font-family: "Pretendard Variable", Pretendard, sans-serif;
  display: flex;
  flex-direction: column;
  /* 인스타 스토리 상·하단 UI 안전영역 고려 */
  padding: 172px 88px 206px;
  overflow: hidden;
}
.story-card .s-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px;
}
.story-card .s-tag {
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: 36px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--s-accent); text-transform: uppercase;
}
.story-card .s-brand {
  font-size: 32px; font-weight: 600; color: var(--s-sub);
  max-width: 520px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.story-card .s-headline {
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: calc(90px * var(--s-fit, 1) * var(--u-title, 1));
  line-height: 1.16; font-weight: 800;
  letter-spacing: -0.03em; margin: 0;
  color: var(--s-title-color, var(--s-text));
}
.story-card .s-rule {
  width: 110px; height: 10px; border-radius: 6px; flex: 0 0 auto;
  background: var(--s-accent);
  margin: calc(40px * var(--s-fit, 1)) 0 calc(46px * var(--s-fit, 1));
}
.story-card .s-points {
  display: flex; flex-direction: column; gap: calc(40px * var(--s-fit, 1));
  flex: 1; min-height: 0;
}
.story-card .s-point { display: flex; align-items: baseline; gap: calc(30px * var(--s-fit, 1) * var(--u-points, 1)); }
.story-card .s-n {
  flex: 0 0 auto;
  width: calc(66px * var(--s-fit, 1) * var(--u-points, 1));
  height: calc(66px * var(--s-fit, 1) * var(--u-points, 1));
  border-radius: 50%;
  background: var(--s-accent); color: var(--s-bg);
  display: flex; align-items: center; justify-content: center;
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: calc(32px * var(--s-fit, 1) * var(--u-points, 1));
  font-weight: 800; font-variant-numeric: tabular-nums;
}
.story-card .s-tx {
  flex: 1; font-size: calc(47px * var(--s-fit, 1) * var(--u-points, 1));
  line-height: 1.4; font-weight: 600;
  color: var(--s-tx-color, var(--s-text)); letter-spacing: -0.01em;
}
.story-card .s-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px; border-top: 2px solid var(--s-line);
  padding-top: 40px; margin-top: 44px;
}
.story-card .s-handle {
  font-family: "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
  font-size: 46px; font-weight: 700; color: var(--s-accent);
}
.story-card .s-cta { font-size: 34px; color: var(--s-sub); font-weight: 500; }

/* 모달 안 9:16 미리보기 (0.3 배율 = 324×576) */
.story-preview {
  flex: 0 0 auto; width: 324px; height: 576px;
  overflow: hidden; border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  background: #000;
}
.story-preview .story-card { transform: scale(0.3); transform-origin: top left; }
.story-summary-body { display: flex; gap: 24px; align-items: flex-start; }
.story-summary-controls { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }
.story-summary-controls label { font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 5px; }
.story-summary-controls textarea, .story-summary-controls input, .story-summary-controls select {
  width: 100%; background: var(--panel-2); border: 1px solid var(--line);
  color: var(--text); border-radius: 8px; padding: 9px 11px; font-size: 13px; resize: vertical;
}
.story-summary-controls textarea:focus, .story-summary-controls input:focus, .story-summary-controls select:focus { outline: none; border-color: var(--accent); }
.story-mode-toggle { display: flex; gap: 6px; }
.story-mode-toggle button {
  flex: 1; padding: 8px; border: 1px solid var(--line); background: var(--panel-2);
  color: var(--text-dim); border-radius: 8px; font-size: 12px;
}
.story-mode-toggle button.active { border-color: var(--accent); color: var(--text); background: rgba(110,231,255,0.08); }

/* 모달 */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 40px;
}
.modal {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  width: 100%;
  max-width: 720px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.modal-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 { margin: 0; font-size: 16px; }
.modal-header .close {
  background: transparent; border: 0;
  color: var(--text-dim); font-size: 24px;
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.modal-header .close:hover { color: var(--text); background: var(--panel-2); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-body p.intro {
  margin: 0 0 16px;
  color: var(--text-dim);
  font-size: 12.5px;
  line-height: 1.6;
}
.modal-body textarea {
  width: 100%;
  min-height: 220px;
  padding: 14px 16px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
}
.modal-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}
.modal-options .opt {
  display: flex; flex-direction: column; gap: 4px;
}
.modal-options label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.modal-options select, .modal-options input {
  padding: 8px 10px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
}
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.modal-footer .hint { font-size: 11px; color: var(--text-faint); }
.modal-footer-actions { display: flex; gap: 8px; }
.modal-footer .btn { padding: 9px 18px; font-size: 12px; }

.modal-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  gap: 16px;
}
.modal-loading .spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--line);
  border-top-color: var(--ai);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.modal-loading .label { color: var(--ai); font-size: 13px; font-weight: 600; }
.modal-loading .sub { color: var(--text-dim); font-size: 11px; }

/* === 이미지 업로드 영역 === */
.upload-area {
  border: 2px dashed var(--line);
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  background: var(--panel-2);
  transition: all 0.15s;
  margin-bottom: 14px;
}
.upload-area.dragging {
  border-color: var(--ai);
  background: rgba(200,155,255,0.08);
}
.upload-prompt {
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.5;
}
.upload-prompt .link-btn {
  background: transparent;
  border: 0;
  color: var(--ai);
  cursor: pointer;
  font-weight: 600;
  text-decoration: underline;
  font-size: 12px;
  padding: 0;
}
.upload-prompt .hint {
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 4px;
}
.upload-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.upload-list:empty { display: none; }
.upload-thumb {
  position: relative;
  width: 72px;
  height: 72px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: var(--panel);
}
.upload-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.upload-thumb .remove {
  position: absolute;
  top: 2px; right: 2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: 0;
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.upload-thumb .name {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  font-size: 8.5px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 2px 4px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 캡션 결과 */
.caption-result {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.65;
  white-space: pre-wrap;
  color: var(--text);
  min-height: 120px;
}
.caption-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

/* 토스트 */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 12.5px;
  z-index: 2000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.success { border-color: var(--accent); }

/* 스크롤바 */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── 세로 폭이 좁은 모니터 대응 ──
   사이드바 섹션들이 위아래로 눌려 '카드 / 드래그 정렬' 목록이 사라지는 문제 방지.
   여백을 줄이고, 그래도 모자라면 사이드바 자체가 스크롤되게 한다. */
@media (max-height: 860px) {
  .sidebar { overflow-y: auto; }
  .ai-hero { padding: 10px 12px; }
  .ai-hero-btn { padding: 11px; font-size: 13px; }
  .ai-hero-desc { margin-top: 6px; font-size: 10px; }
  .section { padding: 9px 14px; }
  .section h3 { margin-bottom: 6px; }
  .actions { padding: 8px 14px; gap: 4px; }
}
@media (max-height: 680px) {
  .ai-hero-desc { display: none; }       /* 부가 설명 숨김 */
  .ai-hero-btn { padding: 10px; }
  .theme-chip { height: 28px; }
  .add-btn { padding: 6px 7px; }
  .add-btn span { display: none; }        /* '5종 레이아웃' 보조문구 숨김 */
}
</style>
</head>
<body>

<div class="tabbar" id="project-tabs"></div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>Cardnews Studio</h1>
      <span class="ver">v3 · AI</span>
    </div>

    <div class="ai-hero">
      <button class="ai-hero-btn" id="btn-one-shot">
        ✨ 내용 입력 → 카드뉴스 자동 완성
      </button>
      <p class="ai-hero-desc">Claude AI가 요약·구조·테마까지 한 번에</p>
    </div>

    <div class="section">
      <h3>컬러 테마 <span class="help">10종</span></h3>
      <div class="theme-grid" id="theme-grid"></div>
    </div>

    <div class="section" style="flex:1; min-height:150px; overflow:hidden; display:flex; flex-direction:column; padding-bottom:6px;">
      <h3>카드 (<span id="card-count">0</span>) <span class="help">드래그 정렬</span></h3>
      <div class="card-list-wrap" id="card-list"></div>
    </div>

    <div class="section">
      <h3>수동 카드 추가</h3>
      <div class="add-grid">
        <button class="add-btn" data-add="cover"><b>표지</b><span>5종 레이아웃</span></button>
        <button class="add-btn" data-add="topic"><b>주제</b><span>5종 레이아웃</span></button>
        <button class="add-btn" data-add="list"><b>리스트</b><span>5종 레이아웃</span></button>
        <button class="add-btn" data-add="highlight"><b>포인트</b><span>5종 레이아웃</span></button>
        <button class="add-btn" data-add="closing"><b>마무리</b><span>5종 레이아웃</span></button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" id="btn-brand">🎙 브랜드 설정</button>
      <button class="btn btn-ai" id="btn-caption">📝 AI 캡션 생성</button>
      <button class="btn btn-ai" id="btn-story">📱 스토리 요약 카드 (1장)</button>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-save">저장</button>
        <button class="btn btn-ghost" id="btn-load">불러오기</button>
        <button class="btn btn-ghost" id="btn-reset">초기화</button>
      </div>
      <button class="btn btn-primary" id="btn-export">📥 전체 PNG 다운로드 (ZIP)</button>
      <button class="btn btn-primary" id="btn-preview-publish" style="background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none">🔍 발행 미리보기</button>
      <button class="btn btn-primary" id="btn-publish" style="background:linear-gradient(135deg,#e1306c,#833ab4);color:#fff;border:none">📲 인스타·스레드 발행</button>
    </div>
  </aside>

  <section class="editor">
    <div class="editor-header" id="editor-header">
      <div class="editor-header-top">
        <h2 id="editor-title">카드를 선택하세요</h2>
        <span class="ec" id="editor-counter"></span>
      </div>
      <p id="editor-sub">상단의 AI 생성 버튼으로 시작하거나, 수동으로 카드를 추가하세요</p>
      <div class="layout-chips" id="layout-chips"></div>
      <div class="card-action-row" id="card-actions" style="display:none">
        <button class="btn btn-ai" id="btn-polish">✨ AI로 다듬기</button>
      </div>
    </div>
    <div class="editor-body" id="editor-body">
      <div class="empty">

  "closing/cta": d => `<div class="card-inner"><div class="eyebrow">${nl(d.eyebrow)}</div><h2 class="title">${nl(d.title)}</h2><div class="cta-btn">팔로우하고 더 보기 →</div><div class="account">${esc(d.account)}</div></div>`,
};

// 리스트 항목(numbered/check/icon)의 선택적 세부내용 렌더
function itemSub(d, i) {
  const v = d.itemDescs && d.itemDescs[i];
  return (v && String(v).trim()) ? `<div class="item-sub">${nl(v)}</div>` : "";
}

// 필드 key → 카드 안에서 해당 텍스트를 표시하는 element selector (첫 매치)
// compare A/B 처럼 같은 클래스가 두 번 나오는 layout 은 nth-of-type 으로 위치 지정.
const FIELD_TO_SELECTOR = {
  // 공용 (단일 element) — minimal 레이아웃은 eyebrow 를 .top-badge 로 렌더하므로 포함
  eyebrow: ".eyebrow, .top-badge", title: ".title", subtitle: ".subtitle", badge: ".badge",
  body: ".body", sub: ".sub", label: ".label", account: ".account",
  hashtag: ".hashtag", attribution: ".attr", quote: ".quote",
  term: ".term", pron: ".pronunciation",
  // number layout 별 대응 — selector list 로 첫 매치
  number: ".big-num, .idx",
  // QA: 두 .qa-text 가 서로 다른 .qa-block 안에 있어 :nth-of-type 이 안 먹힘.
  //     답변은 .a 클래스가 있으므로 클래스로 구분한다.
  question: ".question, .qa-text:not(.a)",
  answer: ".qa-text.a",
  // compare: A/B 컬럼은 인덱스 기반. compareTitle 은 상단 메인 제목 = .compare-title
  // (이전엔 .compare-h 로 잘못 매핑돼 titleA 에 적용되고 정작 메인 제목은 조절 불가였음)
  compareTitle: ".compare-title",
  // compare 좌/우 분리는 후처리에서 위치 인덱스 기반
  labelA: { sel: ".compare-label", index: 0 },
  titleA: { sel: ".compare-h", index: 0 },
  bodyA:  { sel: ".compare-body", index: 0 },
  labelB: { sel: ".compare-label", index: 1 },
  titleB: { sel: ".compare-h", index: 1 },
  bodyB:  { sel: ".compare-body", index: 1 },
  // highlight/stat
  statPre: ".pre", stat: ".stat", statUnit: ".stat-unit",
  statLabel: ".label", statNote: ".note",
  // highlight/emphasis
  emphPre: ".pre", emphasis: ".emphasis", emphPost: ".post",
  // highlight/tip
  tipLabel: ".tip-label", tipBody: ".tip-body",
  // closing
  saveReason: ".reason", askQuestion: ".question", askCta: ".cta-box",
};

// 배열 필드 (descItems/timelineItems/items) → 카드 안 N번째 element selector
const ARRAY_FIELD_TO_SELECTOR = {
  "descItems.title":       ".item-title",
  "descItems.desc":        ".item-desc",
  "descItems.idx":         ".idx",
  "timelineItems.label":   ".tl-label",
  "timelineItems.content": ".tl-body",
  "timelineItems.dot":     ".tl-dot",
  "items":                 ".text",
  "items.bullet":          ".bullet, .box, .dot",
};

function applyFieldStyles(card, rootEl) {
  const fs = card.fieldStyles;
  if (!fs || typeof fs !== "object") return;
  for (const [field, sty] of Object.entries(fs)) {
    if (!sty) continue;
    let el = null;
    // dotted key: arrayName.index 또는 arrayName.index.subKey
    const m = field.match(/^(\w+)\.(\d+)(?:\.(\w+))?$/);
    if (m) {
      const arrayName = m[1], idx = +m[2], subKey = m[3];
      if (arrayName === "itemDescs") {
        // 세부내용은 i번째 .text 의 자식 — 빈 항목으로 인한 인덱스 어긋남 방지
        const txt = rootEl.querySelectorAll(".text")[idx];
        el = txt ? txt.querySelector(".item-sub") : null;
      } else {
        const lookup = subKey ? `${arrayName}.${subKey}` : arrayName;
        const sel = ARRAY_FIELD_TO_SELECTOR[lookup];
        if (sel) {
          const all = rootEl.querySelectorAll(sel);
          el = all[idx] || null;
        }
      }
    } else {
      const map = FIELD_TO_SELECTOR[field];
      if (typeof map === "string") {
        el = rootEl.querySelector(map);
      } else if (map && map.sel) {
        const all = rootEl.querySelectorAll(map.sel);
        el = all[map.index] || null;
      }
    }
    if (!el) continue;
    if (typeof sty.scale === "number" && sty.scale > 0 && sty.scale !== 1) {
      el.style.setProperty("--field-scale", sty.scale);
    }
    if (typeof sty.color === "string" && /^#[0-9a-f]{3,8}$/i.test(sty.color)) {
      el.style.setProperty("color", sty.color, "important");
    }
    // P2 — 영역별 세부 스타일
    if (["left", "center", "right"].includes(sty.align)) {
      el.style.setProperty("text-align", sty.align, "important");
    }
    if (typeof sty.bg === "string" && /^#[0-9a-f]{3,8}$/i.test(sty.bg)) {
      el.style.setProperty("background-color", sty.bg, "important");
      el.style.setProperty("border-radius", "0.16em");
      el.style.setProperty("padding", "0.08em 0.3em");
      el.style.setProperty("-webkit-box-decoration-break", "clone");
      el.style.setProperty("box-decoration-break", "clone");
    }
    if (typeof sty.weight === "number" && sty.weight >= 100) {
      el.style.setProperty("font-weight", sty.weight, "important");
    }
    if (typeof sty.lh === "number" && sty.lh > 0) {
      el.style.setProperty("line-height", sty.lh, "important");
    }
    if (typeof sty.ls === "number") {
      el.style.setProperty("letter-spacing", sty.ls + "em", "important");
    }
    if (typeof sty.opacity === "number" && sty.opacity >= 0 && sty.opacity < 1) {
      el.style.setProperty("opacity", sty.opacity);
    }
    // 이동 — transform으로 적용해야 부모 컨테이너 폭과 무관하게 1:1 이동
    if ((typeof sty.dx === "number" && sty.dx) || (typeof sty.dy === "number" && sty.dy)) {
      el.style.setProperty("position", "relative");
      el.style.setProperty("transform", `translate(${sty.dx || 0}px, ${sty.dy || 0}px)`);
    }
    // 레이어 순서 — z-index (positioned 여야 적용되므로 relative 보장)
    if (typeof sty.z === "number") {
      el.style.setProperty("position", "relative");
      el.style.setProperty("z-index", sty.z);
    }
  }
}

// 프리뷰 줌 — #preview-scaler 의 --preview-scale 변수만 조절 (실제 카드/내보내기엔 영향 없음)
function setPreviewZoom(scale) {
  const s = Math.max(0.2, Math.min(1, parseFloat(scale) || 0.4));
  const sc = document.getElementById("preview-scaler");
  if (sc) sc.style.setProperty("--preview-scale", s);
  const val = document.getElementById("preview-zoom-val");
  if (val) val.textContent = Math.round(s * 100) + "%";
}

// ====================================================================
// 오버레이 요소 (P5) — 카드 위에 자유 배치되는 텍스트/배지/이미지
// card.overlays = [{id,type,text,url,x,y,w,size,color,bg,align,weight}]
// 좌표 x,y,w 는 카드(1080×1350) 대비 % → 프리뷰 줌·내보내기 모두 동일하게 적용
// ====================================================================
function renderOverlayEl(o) {
  const pos = `left:${o.x ?? 30}%;top:${o.y ?? 30}%;${typeof o.z === "number" ? `z-index:${o.z};` : ""}`;
  if (o.type === "image") {
    // 모델 (컨테이너 / 이미지 분리)
    //  - 컨테이너(보이는 영역): x, y, w, h (카드 대비 %, h=0/미설정=자동)
    //  - 이미지 자체:           imgL, imgT, imgW (컨테이너 대비 %, 기본 0 / 0 / 100)
    //    · height 는 auto (자연 비율 유지) — 이미지 픽셀 자체는 늘어나지 않는다.
    //
    // 모서리 핸들: 컨테이너 w/h 비례 조정 — 이미지는 컨테이너 대비 imgL/imgT/imgW 가 그대로라 함께 비례.
    // 변(엣지) 핸들: 컨테이너의 그 변만 안/밖으로 이동 — 이미지는 카드 대비 위치/크기를 유지하도록
    //   imgL/imgT/imgW 가 자동 보정되어, 컨테이너 밖으로 나간 부분이 overflow:hidden 으로 가려진다.
    const hasH = typeof o.h === "number" && o.h > 0;
    const wVal = o.w ?? 30;
    const imgL = (typeof o.imgL === "number") ? o.imgL : 0;
    const imgT = (typeof o.imgT === "number") ? o.imgT : 0;
    const imgW = (typeof o.imgW === "number" && o.imgW > 0) ? o.imgW : 100;
    const hasCrop = (imgL !== 0) || (imgT !== 0) || (imgW !== 100);
    // h 명시 또는 자름이 있을 때만 이미지를 absolute 로 띄운다.
    // 둘 다 없으면(처음 추가 직후 등) 이미지를 static 으로 두어 컨테이너 height 가 자연스럽게 결정되게 한다.
    //   (absolute 자식만 있는 컨테이너에 height:auto 를 주면 0 이 되어 이미지가 안 보이는 문제 방지)
    const useAbs = hasH || hasCrop;
    const boxStyle = `${pos}width:${wVal}%;${hasH ? `height:${o.h}%;` : ""}overflow:hidden;border-radius:8px;`;
    const imgStyle = useAbs
      ? `position:absolute;left:${imgL}%;top:${imgT}%;width:${imgW}%;height:auto;display:block;`
      : `width:100%;height:auto;display:block;`;
    return `<div class="ov-el ov-image" data-ov="${o.id}" style="${boxStyle}">`
      + `<img src="${esc(o.url || "")}" style="${imgStyle}" onerror="this.style.opacity=0.2"></div>`;
  }
  if (o.type === "badge") {
    return `<div class="ov-el ov-badge" data-ov="${o.id}" style="${pos}font-size:${o.size ?? 40}px;`
      + `${o.bg ? `background:${o.bg};` : ""}${o.color ? `color:${o.color};` : ""}">${nl(o.text || "")}</div>`;
  }
  const lhStyle = (typeof o.lh === "number" && o.lh > 0) ? `line-height:${o.lh};` : "";
  const lsStyle = (typeof o.ls === "number") ? `letter-spacing:${o.ls}em;` : "";
  const opStyle = (typeof o.opacity === "number" && o.opacity < 1) ? `opacity:${o.opacity};` : "";
  return `<div class="ov-el ov-text" data-ov="${o.id}" style="${pos}width:${o.w ?? 40}%;font-size:${o.size ?? 56}px;`
    + `text-align:${o.align || "left"};font-weight:${o.weight || 700};${lhStyle}${lsStyle}${opStyle}${o.color ? `color:${o.color};` : ""}${o.bg ? `background:${o.bg};padding:0.08em 0.3em;border-radius:0.12em;` : ""}">${nl(o.text || "")}</div>`;
}

function renderOverlays(card) {
  const ovs = card.overlays || [];
  if (!ovs.length) return "";
  return `<div class="ov-layer">${ovs.map(renderOverlayEl).join("")}</div>`;
}

// ---- 선택 / 이동 / 모서리 리사이즈 / 키보드 — 오버레이 + 기존 템플릿 영역 공통 ----
let SEL = null;            // { kind:'ov'|'fld', key } | null
let _ovClipboard = null;   // 붙여넣기 클립보드(오버레이 스펙). 필드 복사도 오버레이 스펙으로 저장.

function _ovPosLabelUpdate(ov) {
  const posEl = document.querySelector(`.ov-pos[data-ov="${ov.id}"]`);
  if (posEl) posEl.textContent = `${Math.round(ov.x)}%, ${Math.round(ov.y)}%`;
}
function ensureFieldStyle(card, key) {
  card.fieldStyles = card.fieldStyles || {};
  card.fieldStyles[key] = card.fieldStyles[key] || {};
  return card.fieldStyles[key];
}

// 현재 카드의 편집 가능한 필드 element 순회 (단일 + 배열 항목)
function forEachFieldEl(card, root, cb) {
  const fields = LAYOUT_FIELDS[`${card.type}/${card.layout}`] || [];
  fields.forEach(f => {
    if (f === "items") {
      const els = root.querySelectorAll(".text");
      const layoutKey = `${card.type}/${card.layout}`;
      const bulletSel = { "list/numbered": ".bullet", "list/check": ".box", "list/icon": ".dot", "list/grid": ".bullet" }[layoutKey] || null;
      const bulletEls = bulletSel ? root.querySelectorAll(bulletSel) : [];
      (card.data.items || []).forEach((_, i) => {
        if (!els[i]) return;
        cb(`items.${i}`, els[i]);
        const sub = els[i].querySelector(".item-sub"); // 항목별 세부내용(있을 때만)
        if (sub) cb(`itemDescs.${i}`, sub);
        if (bulletEls[i]) cb(`items.${i}.bullet`, bulletEls[i]);
      });
    } else if (f === "descItems") {
      const t = root.querySelectorAll(".item-title"), dd = root.querySelectorAll(".item-desc"), idxEls = root.querySelectorAll(".idx");
      (card.data.descItems || []).forEach((_, i) => { if (t[i]) cb(`descItems.${i}.title`, t[i]); if (dd[i]) cb(`descItems.${i}.desc`, dd[i]); if (idxEls[i]) cb(`descItems.${i}.idx`, idxEls[i]); });
    } else if (f === "timelineItems") {
      const l = root.querySelectorAll(".tl-label"), b = root.querySelectorAll(".tl-body"), dots = root.querySelectorAll(".tl-dot");
      (card.data.timelineItems || []).forEach((_, i) => { if (l[i]) cb(`timelineItems.${i}.label`, l[i]); if (b[i]) cb(`timelineItems.${i}.content`, b[i]); if (dots[i]) cb(`timelineItems.${i}.dot`, dots[i]); });
    } else {
      const map = FIELD_TO_SELECTOR[f];
      let el = null;
      if (typeof map === "string") el = root.querySelector(map);
      else if (map && map.sel) { const all = root.querySelectorAll(map.sel); el = all[map.index] || null; }
      if (el) cb(f, el);
    }
  });
}
function tagFieldTargets(scaler, card) {
  forEachFieldEl(card, scaler, (key, el) => { el.setAttribute("data-fld", key); el.classList.add("fld-target"); });
}
function _fieldText(card, key) {
  const m = key.match(/^(\w+)\.(\d+)(?:\.(\w+))?$/);
  if (m) { const it = (card.data[m[1]] || [])[+m[2]]; if (it == null) return ""; return m[3] ? (it[m[3]] || "") : (typeof it === "string" ? it : ""); }
  return card.data[key] || "";
}
function _fieldClear(card, key) {
  const m = key.match(/^(\w+)\.(\d+)(?:\.(\w+))?$/);
  if (m) { const arr = card.data[m[1]]; if (!arr || arr[+m[2]] == null) return; if (m[3]) arr[+m[2]][m[3]] = ""; else arr[+m[2]] = ""; return; }
  if (key in card.data) card.data[key] = "";
}
function _selEl(scaler) {
  if (!SEL) return null;
  return scaler.querySelector(SEL.kind === "ov" ? `.ov-el[data-ov="${SEL.key}"]` : `[data-fld="${SEL.key}"]`);
}

// 선택 표시(아웃라인 + 4모서리 핸들). 프리뷰에만 — 내보내기엔 없음.
function applySelection(scaler, card) {
  scaler.querySelectorAll(".ov-el, .fld-target").forEach(el => {
    el.classList.remove("sel-active");
    el.querySelectorAll(".ov-handle").forEach(h => h.remove());
  });
  const el = _selEl(scaler);
  const tb = document.getElementById("layer-toolbar");
  if (tb) tb.style.display = el ? "flex" : "none"; // 선택 시 레이어 툴바 표시
  if (!el) return;
  el.classList.add("sel-active");
  // 이미지 오버레이는 모서리 4개 + 변(엣지) 4개 = 총 8개 핸들.
  //   - 모서리: 종횡비 유지하며 컨테이너(w/h) 크기 조정 (이미지도 함께 비례)
  //   - 변(n/e/s/w): 컨테이너의 그 변만 안/밖으로 이동 — 컨테이너 보이는 영역만 변하고
  //                   이미지 자체 크기는 그대로 → 컨테이너 밖으로 나간 영역이 가려짐(잘림).
  // 핸들 위치는 CSS 기본(컨테이너 가장자리). 컨테이너가 변 드래그로 줄어들면 핸들도 자연스럽게 따라옴.
  // 그 외(텍스트/배지/필드)는 기존 4모서리만.
  const isImage = el.classList.contains("ov-image");
  const corners = isImage ? ["nw", "ne", "sw", "se", "n", "e", "s", "w"] : ["nw", "ne", "sw", "se"];
  corners.forEach(corner => {
    const h = document.createElement("div");
    h.className = "ov-handle"; h.dataset.corner = corner;
    el.appendChild(h);
    h.addEventListener("pointerdown", e => startResize(e, el, corner, scaler, card));
  });
}

// 모서리 / 변(엣지) 핸들 드래그.
//   - 텍스트/배지: 기존 동작 유지 (가로 비율로 글자 크기 변경, 모서리만 사용)
//   - 이미지 + 모서리: 컨테이너 w/h 비례 조정 — 이미지는 컨테이너 대비 좌표(imgL/imgT/imgW)가 그대로라
//                       자동으로 함께 비례 (잘림 없음).
//   - 이미지 + 변(n/s/e/w): 컨테이너의 그 변만 안/밖으로 이동 — 컨테이너만 변하고 이미지 자체 픽셀 크기는
//                            그대로 유지하도록 imgL/imgT/imgW 를 보정 → 컨테이너 밖으로 나간 부분이 가려짐.
//   - 필드: 기존 scale 동작 유지
function startResize(e, el, corner, scaler, card) {
  e.preventDefault(); e.stopPropagation();
  const cardEl = scaler.querySelector(".card"); if (!cardEl) return;
  const cardRect = cardEl.getBoundingClientRect();
  const r0 = el.getBoundingClientRect();
  const FIXED = {
    nw:{x:r0.right,y:r0.bottom}, ne:{x:r0.left,y:r0.bottom},
    sw:{x:r0.right,y:r0.top},    se:{x:r0.left,y:r0.top},
  };
  const fixed = FIXED[corner];
  const origW = Math.max(20, r0.width);
  const origPxH = Math.max(20, r0.height);
  const isHorzEdge = (corner === "e" || corner === "w");
  const isVertEdge = (corner === "n" || corner === "s");
  const isCorner = !isHorzEdge && !isVertEdge;
  const isOv = el.classList.contains("ov-el");
  let ov = null, st = null, origSize = 0, origWpct = 0, origScale = 1, origHpct = 0;
  // 변 드래그 시 보정에 쓸 컨테이너 + 이미지의 시작값
  let startWpct = 0, startHpct = 0, startXpct = 0, startYpct = 0;
  let startImgL = 0, startImgT = 0, startImgW = 100;
  if (isOv) {
    ov = (card.overlays || []).find(o => o.id === el.dataset.ov);
    if (ov) {
      origSize = ov.size || (ov.type === "badge" ? 40 : 56);
      origWpct = ov.w || 40;
      origHpct = (typeof ov.h === "number" && ov.h > 0) ? ov.h : (ov.type === "image" ? (origPxH / cardRect.height * 100) : 0);
      if (ov.type === "image") {
        startWpct = ov.w;
        startHpct = (typeof ov.h === "number" && ov.h > 0) ? ov.h : (origPxH / cardRect.height * 100);
        startXpct = ov.x ?? 0;
        startYpct = ov.y ?? 0;
        startImgL = (typeof ov.imgL === "number") ? ov.imgL : 0;
        startImgT = (typeof ov.imgT === "number") ? ov.imgT : 0;
        startImgW = (typeof ov.imgW === "number" && ov.imgW > 0) ? ov.imgW : 100;
      }
    }
  } else {
    st = ensureFieldStyle(card, el.dataset.fld);
    origScale = (typeof st.scale === "number" && st.scale > 0) ? st.scale : 1;
  }
  const leftMoves = (corner === "nw" || corner === "sw");
  const topMoves  = (corner === "nw" || corner === "ne");
  const startMX = e.clientX, startMY = e.clientY;
  // 변 드래그를 시작하는 순간 컨테이너 h 가 자동이면 명시값으로 변환 (변 동작이 의미 있도록).
  const willActivateH = (ov && ov.type === "image" && (isVertEdge || isHorzEdge) && !(ov.h > 0));
  if (willActivateH) {
    ov.h = origHpct;
    el.style.height = ov.h + "%";
  }
  try { el.setPointerCapture(e.pointerId); } catch (e2) {}
  const move = ev => {
    if (!isOv) {
      // 필드: scale (코너만)
      const xRatio = Math.max(0.2, Math.min(6, Math.abs(ev.clientX - fixed.x) / origW));
      st.scale = Math.max(0.3, Math.min(4, +(origScale * xRatio).toFixed(3)));
      el.style.setProperty("--field-scale", st.scale);
      return;
    }
    if (!ov) return;
    if (ov.type === "image") {
      if (isCorner) {
        // 종횡비 유지 — 컨테이너 w/h 비례 조정. 이미지는 컨테이너 대비 좌표(imgL/imgT/imgW) 그대로.
        const xRatio = Math.max(0.2, Math.min(6, Math.abs(ev.clientX - fixed.x) / origW));
        ov.w = Math.max(5, Math.min(100, origWpct * xRatio));
        ov.h = Math.max(5, Math.min(100, origHpct * xRatio));
        el.style.width = ov.w + "%";
        el.style.height = ov.h + "%";
        const nr = el.getBoundingClientRect();
        const newLeft = leftMoves ? (fixed.x - nr.width) : fixed.x;
        const newTop  = topMoves  ? (fixed.y - nr.height) : fixed.y;
        ov.x = Math.max(0, Math.min(100, (newLeft - cardRect.left) / cardRect.width * 100));
        ov.y = Math.max(0, Math.min(100, (newTop  - cardRect.top)  / cardRect.height * 100));
        el.style.left = ov.x + "%"; el.style.top = ov.y + "%";
      } else if (isHorzEdge) {
        // 변 e/w — 컨테이너의 가로만 변경. 이미지 카드 대비 가로/위치를 유지하도록 imgL/imgW 보정.
        const dxPct = (ev.clientX - startMX) / cardRect.width * 100;
        if (corner === "e") {
          // 안쪽(왼쪽)으로 끌면 컨테이너 width 감소
          const newW = Math.max(5, Math.min(100, startWpct + dxPct));
          ov.w = newW;
          // 이미지 카드 대비 (왼쪽 x 그대로): imgL_card = imgL/100*w + x → 카드 대비 left/width 그대로면
          //   newImgL = startImgL * startWpct / newW
          //   newImgW = startImgW * startWpct / newW
          ov.imgL = startImgL * startWpct / newW;
          ov.imgW = startImgW * startWpct / newW;
        } else { // w
          // 안쪽(오른쪽)으로 끌면 컨테이너 left 증가 + width 감소 (반대 변 e 고정)
          const newX = Math.max(0, Math.min(95, startXpct + dxPct));
          const newW = Math.max(5, Math.min(100, startWpct - (newX - startXpct)));
          ov.x = newX;
          ov.w = newW;
          // 이미지 카드 대비 left 유지:
          //   startXpct + startImgL/100 * startWpct  =  newX + newImgL/100 * newW
          //   newImgL = (startImgL*startWpct + 100*(startXpct - newX)) / newW
          //           = (startImgL*startWpct - 100*(newX - startXpct)) / newW
          ov.imgL = (startImgL * startWpct - 100 * (newX - startXpct)) / newW;
          ov.imgW = startImgW * startWpct / newW;
        }
        _applyImgContainerDom(el, ov);
      } else if (isVertEdge) {
        // 변 n/s — 컨테이너의 세로만 변경. 이미지 카드 대비 세로 위치 유지하도록 imgT 보정.
        const dyPct = (ev.clientY - startMY) / cardRect.height * 100;
        if (corner === "s") {
          const newH = Math.max(5, Math.min(100, startHpct + dyPct));
          ov.h = newH;
          ov.imgT = startImgT * startHpct / newH;
        } else { // n
          const newY = Math.max(0, Math.min(95, startYpct + dyPct));
          const newH = Math.max(5, Math.min(100, startHpct - (newY - startYpct)));
          ov.y = newY;
          ov.h = newH;
          ov.imgT = (startImgT * startHpct - 100 * (newY - startYpct)) / newH;
        }
        _applyImgContainerDom(el, ov);
      }
    } else {
      // 텍스트/배지 — 가로 비율로 글자 크기 (코너만)
      const xRatio = Math.max(0.2, Math.min(6, Math.abs(ev.clientX - fixed.x) / origW));
      ov.size = Math.max(12, Math.min(400, Math.round(origSize * xRatio)));
      el.style.fontSize = ov.size + "px";
      const nr = el.getBoundingClientRect();
      const newLeft = leftMoves ? (fixed.x - nr.width) : fixed.x;
      const newTop  = topMoves  ? (fixed.y - nr.height) : fixed.y;
      ov.x = Math.max(0, Math.min(100, (newLeft - cardRect.left) / cardRect.width * 100));
      ov.y = Math.max(0, Math.min(100, (newTop  - cardRect.top)  / cardRect.height * 100));
      el.style.left = ov.x + "%"; el.style.top = ov.y + "%";
    }
  };
  const up = () => {
    el.removeEventListener("pointermove", move);
    el.removeEventListener("pointerup", up);
    if (isOv && ov) _ovPosLabelUpdate(ov);
    renderEditor(); autoSave();
  };
  el.addEventListener("pointermove", move);
  el.addEventListener("pointerup", up);
}

// 변 드래그 중 컨테이너(.ov-el)와 이미지(img) 인라인 스타일을 한 번에 갱신.
// renderPreview 를 호출하면 DOM 전체가 다시 그려져 드래그가 끊기기 때문.
function _applyImgContainerDom(el, ov) {
  const hasH = typeof ov.h === "number" && ov.h > 0;
  el.style.left = (ov.x ?? 0) + "%";
  el.style.top  = (ov.y ?? 0) + "%";
  el.style.width = (ov.w ?? 30) + "%";
  if (hasH) el.style.height = ov.h + "%";
  const img = el.querySelector("img"); if (!img) return;
  img.style.position = "absolute";
  img.style.left = ((typeof ov.imgL === "number") ? ov.imgL : 0) + "%";
  img.style.top  = ((typeof ov.imgT === "number") ? ov.imgT : 0) + "%";
  img.style.width = ((typeof ov.imgW === "number" && ov.imgW > 0) ? ov.imgW : 100) + "%";
  img.style.height = "auto";
  img.style.objectFit = "";
  img.style.objectPosition = "";
  img.style.display = "block";
}

// 본체 드래그 → 이동. 오버레이=x/y, 필드=fieldStyles.dx/dy(상대 오프셋).
function startMove(e, el, scaler, card) {
  const cardEl = scaler.querySelector(".card"); if (!cardEl) return;
  const rect = cardEl.getBoundingClientRect();
  const sx = e.clientX, sy = e.clientY;
  const isOv = el.classList.contains("ov-el");
  let ov = null, st = null, ox, oy;
  if (isOv) { ov = (card.overlays || []).find(o => o.id === el.dataset.ov); if (!ov) return; ox = ov.x ?? 30; oy = ov.y ?? 30; }
  else { st = ensureFieldStyle(card, el.dataset.fld); ox = st.dx || 0; oy = st.dy || 0; }
  let moved = false;
  try { el.setPointerCapture(e.pointerId); } catch (e2) {}
  const cardScale = rect.width / 1080; // CSS transform scale (~0.42)
  const move = ev => {
    moved = true;
    if (isOv) {
      // 오버레이: 카드 % 기준 (0-100)
      const nx = ox + (ev.clientX - sx) / rect.width * 100;
      const ny = oy + (ev.clientY - sy) / rect.height * 100;
      ov.x = Math.max(0, Math.min(100, nx)); ov.y = Math.max(0, Math.min(100, ny));
      el.style.left = ov.x + "%"; el.style.top = ov.y + "%";
    } else {
      // 템플릿 필드: 카드 픽셀(1080 기준) — 부모 컨테이너 폭과 무관하게 1:1 이동
      const dxPx = (ev.clientX - sx) / cardScale;
      const dyPx = (ev.clientY - sy) / cardScale;
      st.dx = +(ox + dxPx).toFixed(1); st.dy = +(oy + dyPx).toFixed(1);
      el.style.position = "relative";
      el.style.transform = `translate(${st.dx}px, ${st.dy}px)`;
    }
  };
  const up = () => {
    el.removeEventListener("pointermove", move);
    el.removeEventListener("pointerup", up);
    if (moved) { if (isOv && ov) _ovPosLabelUpdate(ov); autoSave(); }
  };
  el.addEventListener("pointermove", move);
  el.addEventListener("pointerup", up);
}

// 프리뷰 상호작용 바인딩 (오버레이 + 필드 공통) — renderPreview 가 호출
function bindOverlayDrag(scaler, card) {
  tagFieldTargets(scaler, card);
  if (SEL) {
    const exists = SEL.kind === "ov"
      ? (card.overlays || []).some(o => o.id === SEL.key)
      : !!scaler.querySelector(`[data-fld="${SEL.key}"]`);
    if (!exists) SEL = null;
  }
  scaler.onpointerdown = e => {
    if (!e.target.closest(".ov-el, .fld-target")) { SEL = null; applySelection(scaler, card); }
  };
  scaler.querySelectorAll(".ov-el, .fld-target").forEach(el => {
    el.addEventListener("pointerdown", e => {
      if (e.target.classList.contains("ov-handle")) return; // 핸들은 리사이즈 전용
      e.preventDefault(); e.stopPropagation();
      const isOv = el.classList.contains("ov-el");
      SEL = { kind: isOv ? "ov" : "fld", key: isOv ? el.dataset.ov : el.dataset.fld };
      applySelection(scaler, card);
      startMove(e, el, scaler, card);
    });
  });
  applySelection(scaler, card);
}

// ---- 레이어 순서 (z-index) — 선택된 오버레이/필드를 앞/뒤로 ----
function _collectZ(card) {
  const zs = [];
  (card.overlays || []).forEach(o => { if (typeof o.z === "number") zs.push(o.z); });
  Object.values(card.fieldStyles || {}).forEach(st => { if (st && typeof st.z === "number") zs.push(st.z); });
  return zs.length ? zs : [0];
}
function _getSelZ(card) {
  if (!SEL) return 0;
  if (SEL.kind === "ov") { const o = (card.overlays || []).find(x => x.id === SEL.key); return (o && typeof o.z === "number") ? o.z : 0; }
  const st = card.fieldStyles && card.fieldStyles[SEL.key];
  return (st && typeof st.z === "number") ? st.z : 0;
}
function _setSelZ(card, val) {
  if (!SEL) return;
  if (SEL.kind === "ov") { const o = (card.overlays || []).find(x => x.id === SEL.key); if (o) o.z = val; }
  else ensureFieldStyle(card, SEL.key).z = val;
}
function zOp(op) {
  const card = STATE.cards.find(c => c.id === STATE.activeId);
  if (!card || !SEL) return;
  const zs = _collectZ(card), mx = Math.max(...zs, 0), mn = Math.min(...zs, 0), cur = _getSelZ(card);
  let nz = cur;
  if (op === "front") nz = mx + 1;
  else if (op === "back") nz = mn - 1;
  else if (op === "forward") nz = cur + 1;
  else if (op === "backward") nz = cur - 1;
  _setSelZ(card, nz);
  renderPreview(); autoSave();
  // 선택 상태(SEL)는 유지 — renderPreview 안의 bindOverlayDrag 가 다시 applySelection 을 호출하므로
  // 핸들/툴바도 자연스럽게 다시 표시된다.
}

function _pasteOverlay(card, e) {
  e.preventDefault();
  const clone = JSON.parse(JSON.stringify(_ovClipboard));
  clone.id = "ov" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  clone.x = Math.min(95, (clone.x ?? 30) + 4);
  clone.y = Math.min(95, (clone.y ?? 30) + 4);
  card.overlays = card.overlays || [];
  card.overlays.push(clone);
  SEL = { kind: "ov", key: clone.id };
  renderEditor(); renderPreview(); autoSave();
}

// 스튜디오 키보드 — 삭제(Del)·복사(Ctrl+C)·붙여넣기(Ctrl+V)·해제(Esc), 오버레이/필드 공통
function onStudioOverlayKey(e) {
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable)) return;
  const card = STATE.cards.find(c => c.id === STATE.activeId);
  if (!card) return;
  const k = (e.key || "").toLowerCase();
  // 실행취소 (선택 없이도 허용). 입력란 포커스 땐 위에서 이미 return → 텍스트 편집의 기본 Ctrl+Z 유지
  if ((e.ctrlKey || e.metaKey) && k === "z" && !e.shiftKey) { e.preventDefault(); undoLastAction(); return; }
  // 붙여넣기는 선택 없이도 허용
  if ((e.ctrlKey || e.metaKey) && k === "v") { if (_ovClipboard) _pasteOverlay(card, e); return; }
  if (!SEL) return;
  // 레이어 순서 — Ctrl+] 앞으로 / Ctrl+[ 뒤로 (Shift 동반 시 맨앞/맨뒤)
  if ((e.ctrlKey || e.metaKey) && e.key === "]") { e.preventDefault(); zOp(e.shiftKey ? "front" : "forward"); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === "[") { e.preventDefault(); zOp(e.shiftKey ? "back" : "backward"); return; }
  if ((e.ctrlKey || e.metaKey) && k === "c") {
    if (SEL.kind === "ov") {
      const o = (card.overlays || []).find(x => x.id === SEL.key);
      if (o) { _ovClipboard = JSON.parse(JSON.stringify(o)); delete _ovClipboard.id; toast("요소 복사됨 — Ctrl+V로 붙여넣기", "success"); }
    } else {
      const sc = document.getElementById("preview-scaler");
      const el = sc && sc.querySelector(`[data-fld="${SEL.key}"]`);
      const cardEl = sc && sc.querySelector(".card");
      let size = 56, x = 28, y = 36;
      if (el && cardEl) {
        const r = el.getBoundingClientRect(), cr = cardEl.getBoundingClientRect();
        size = Math.round(parseFloat(getComputedStyle(el).fontSize) || 56);
        x = Math.max(0, Math.min(90, (r.left - cr.left) / cr.width * 100));
        y = Math.max(0, Math.min(90, (r.top - cr.top) / cr.height * 100));
      }
      _ovClipboard = { type: "text", text: _fieldText(card, SEL.key), x, y, w: 44, size, weight: 700 };
      toast("영역 복사됨 — Ctrl+V로 요소로 붙여넣기", "success");
    }
    return;
  }
  if (e.key === "Delete" || e.key === "Backspace") {
    e.preventDefault();
    if (SEL.kind === "ov") card.overlays = (card.overlays || []).filter(o => o.id !== SEL.key);
    else _fieldClear(card, SEL.key);
    SEL = null;
    renderEditor(); renderPreview(); autoSave();
    return;
  }
  if (e.key === "Escape") { SEL = null; renderPreview(); }
}
document.addEventListener("keydown", onStudioOverlayKey);

// 외부 이미지 붙여넣기 — 브라우저/파일탐색기에서 복사한 이미지를 Ctrl+V로 카드에 추가
document.addEventListener("paste", e => {
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable)) return;
  if (_ovClipboard) return; // 내부 오버레이 클립보드 우선 — keydown Ctrl+V 핸들러에 위임
  const imgItem = [...(e.clipboardData?.items || [])].find(it => it.type.startsWith("image/"));
  if (!imgItem) return;
  e.preventDefault();
  const card = STATE.cards.find(c => c.id === STATE.activeId);
  if (!card) return;
  const file = imgItem.getAsFile();
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    card.overlays = card.overlays || [];
    const ov = { id: "ov" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5), type: "image", url: ev.target.result, x: 10, y: 10, w: 60 };
    card.overlays.push(ov);
    SEL = { kind: "ov", key: ov.id };
    renderEditor(); renderPreview(); autoSave();
    toast("이미지 붙여넣기됨", "success");
  };
  reader.readAsDataURL(file);
});

function renderCard(card, pageNum, total) {
  const key = `${card.type}/${card.layout}`;
  const inner = RENDERERS[key] ? RENDERERS[key](card.data) : `<div class="card-inner">레이아웃 오류: ${key}</div>`;
  const isCover = card.type === "cover";
  const isLast = pageNum === total;
  const showSwipe = isCover && total > 1;
  const brand = STATE.brand;

  // 배경 이미지 (per-card) — 전체(full) 또는 부분(band) 모드
  const bg = card.data && card.data.bgImage;
  const hasBg = bg && bg.url;
  const bandMode = hasBg && bg.mode === "band";
  const bandSide = ["top", "bottom", "left", "right"].includes(bg?.side) ? bg.side : "top";
  const bandRatio = (typeof bg?.ratio === "number" && bg.ratio >= 0.15 && bg.ratio <= 0.9) ? bg.ratio : 0.42;
  // 전체 모드는 가독성 위해 기본 어둡기 55%, 밴드 모드는 이미지를 살리려 기본 0%
  const darkenPct = hasBg ? (typeof bg.darken === "number" ? bg.darken : (bandMode ? 0 : 55)) : 0;
  const bgScale = (hasBg && typeof bg.scale === "number" && bg.scale > 0) ? bg.scale : 1;
  const bgOffX = hasBg && typeof bg.offsetX === "number" ? bg.offsetX : 50;
  const bgOffY = hasBg && typeof bg.offsetY === "number" ? bg.offsetY : 50;

  const styleVars = [];
  if (hasBg) {
    styleVars.push(`--bg-darken: ${darkenPct / 100}`);
    styleVars.push(`--bg-zoom: ${bgScale}`);
    styleVars.push(`--bg-pos-x: ${bgOffX}%`);
    styleVars.push(`--bg-pos-y: ${bgOffY}%`);
    if (bandMode) styleVars.push(`--band-ratio: ${bandRatio}`);
  }
  const bgStyle = styleVars.length ? `style="${styleVars.join('; ')}"` : "";
  const bgClass = !hasBg ? "" : (bandMode ? ` bg-band bg-band-${bandSide}` : " has-bg-image");
  const bgLayer = hasBg ? `
      <div class="bg-image-layer" style="background-image:url('${esc(bg.url)}')"></div>
      <div class="bg-image-overlay"></div>` : "";

  const html = `
    <div class="card lo-${card.type}-${card.layout}${bgClass}" ${bgStyle}>
      ${bgLayer}
      ${inner}
      ${renderOverlays(card)}
      ${!isCover && !isLast ? `<div class="footer-mark">${esc(brand.footer || "")}</div>` : ""}
      ${!isCover && !isLast ? `<div class="page-num">${String(pageNum).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div>` : ""}
      ${showSwipe ? `<div class="swipe-hint">SWIPE <span class="arrow">→</span></div>` : ""}
    </div>`;
  // fieldStyles 후처리 — 카드 root 안의 element 에 인라인 style 주입
  if (card.fieldStyles && Object.keys(card.fieldStyles).length) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    const root = tmp.firstElementChild;
    if (root) applyFieldStyles(card, root);
    return tmp.innerHTML;
  }
  return html;
}

function activeProject() { return WORKSPACE.projects.find(p => p.id === WORKSPACE.activeId) || null; }

// STATE -> 활성 프로젝트 레코드로 저장
function syncStateToProject() {
  const p = activeProject();
  if (!p) return;
  p.theme = STATE.theme;
  p.brand = STATE.brand;
  p.cards = STATE.cards;
  p.activeId = STATE.activeId;
  p.lastSourceText = STATE.lastSourceText;
  p.meta = STATE.meta;
}

// 프로젝트 레코드 -> STATE 로 로드
function loadProjectToState(p) {
  STATE.theme = p.theme || "navy";
  STATE.brand = p.brand || { name: "", handle: "@dailysync_ai", footer: "" };
  STATE.cards = p.cards || [];
  STATE.activeId = p.activeId || (STATE.cards[0]?.id ?? null);
  STATE.lastSourceText = p.lastSourceText || "";
  STATE.meta = p.meta || {};
}

function ensureAtLeastOneProject() {
  if (WORKSPACE.projects.length === 0) {
    const p = blankProjectData("카드뉴스 1");
    WORKSPACE.projects.push(p);
    WORKSPACE.activeId = p.id;
    loadProjectToState(p);
  }
}

function activateProject(id) {
  if (id === WORKSPACE.activeId) return;
  syncStateToProject();
  const p = WORKSPACE.projects.find(x => x.id === id);
  if (!p) return;
  WORKSPACE.activeId = id;
  loadProjectToState(p);
  setTheme(STATE.theme);
  renderTabs();
  renderAll();
  autoSave();
}

function addProject(name) {
  syncStateToProject();
  const p = blankProjectData(name || `카드뉴스 ${WORKSPACE.projects.length + 1}`);
  WORKSPACE.projects.push(p);
  WORKSPACE.activeId = p.id;
  loadProjectToState(p);
  setTheme(STATE.theme);
  renderTabs();
  renderAll();
  autoSave();
  toast("✓ 새 카드뉴스 탭 생성", "success");
}

function renameProject(id) {
  const p = WORKSPACE.projects.find(x => x.id === id);
  if (!p) return;
  const name = prompt("카드뉴스 이름", p.name);
  if (name && name.trim()) { p.name = name.trim(); renderTabs(); autoSave(); }
}

function deleteProject(id) {
  const p = WORKSPACE.projects.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`"${p.name}" 탭을 삭제할까요?\n이 카드뉴스의 카드가 모두 사라집니다.`)) return;
  const wasActive = (id === WORKSPACE.activeId);
  const idx = WORKSPACE.projects.findIndex(x => x.id === id);
  WORKSPACE.projects.splice(idx, 1);
  if (WORKSPACE.projects.length === 0) {
    const np = blankProjectData("카드뉴스 1");
    WORKSPACE.projects.push(np);
    WORKSPACE.activeId = np.id;
    loadProjectToState(np);
  } else if (wasActive) {
    const next = WORKSPACE.projects[Math.max(0, idx - 1)];
    WORKSPACE.activeId = next.id;
    loadProjectToState(next);
  }
  setTheme(STATE.theme);
  renderTabs();
  renderAll();
  autoSave();
}

function renderTabs() {
  const bar = document.getElementById("project-tabs");
  if (!bar) return;
  bar.innerHTML = "";
  WORKSPACE.projects.forEach(p => {
    const isActive = p.id === WORKSPACE.activeId;
    const count = isActive ? STATE.cards.length : (p.cards ? p.cards.length : 0);
    const tab = document.createElement("div");
    tab.className = "tab" + (isActive ? " active" : "");
    tab.title = `${p.name} — 더블클릭으로 이름 변경`;
    tab.innerHTML =
      `<span class="tab-name"></span>` +
      `<span class="tab-count">${count}</span>` +
      (WORKSPACE.projects.length > 1 ? `<span class="tab-close" title="탭 닫기">✕</span>` : ``);
    tab.querySelector(".tab-name").textContent = p.name;
    tab.onclick = e => { if (e.target.classList.contains("tab-close")) return; activateProject(p.id); };
    tab.ondblclick = e => { if (e.target.classList.contains("tab-close")) return; renameProject(p.id); };
    const closeBtn = tab.querySelector(".tab-close");
    if (closeBtn) closeBtn.onclick = e => { e.stopPropagation(); deleteProject(p.id); };
    bar.appendChild(tab);
  });
  const add = document.createElement("button");
  add.className = "tab-add";
  add.textContent = "+ 새 카드뉴스";
  add.onclick = () => addProject();
  bar.appendChild(add);

  const queue = document.createElement("button");
  queue.className = "tab-add";
  queue.textContent = "📥 발행큐에서 불러오기";
  queue.title = "카드뉴스 오토의 발행큐에 있는 기사를 새 탭으로 불러오기";
  queue.onclick = () => openQueuePickerModal();
  bar.appendChild(queue);
}
