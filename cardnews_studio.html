// ====================================================================
// CLAUDE API 통합
// ====================================================================
async function callClaude(systemPrompt, userPrompt, maxTokens = 1000, images = []) {
  // user 메시지의 content 배열 구성 (이미지 먼저, 텍스트 마지막)
  const userContent = [];
  for (const img of images) {
    userContent.push({
      type: "image",
      source: { type: "base64", media_type: img.mediaType, data: img.base64 }
    });
  }
  userContent.push({ type: "text", text: userPrompt });

  // 프록시 우선, 안되면 직접 호출 (artifact 환경 fallback)
  const useProxy = !window.location.protocol.startsWith("file");
  const endpoint = useProxy ? "/api/claude" : "https://api.anthropic.com/v1/messages";

  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  if (!response.ok) {
    let errMsg = `API 오류 ${response.status}`;
    try {
      const errData = await response.json();
      errMsg += `: ${errData.error || JSON.stringify(errData).slice(0, 200)}`;
    } catch {
      errMsg += `: ${(await response.text()).slice(0, 200)}`;
    }
    throw new Error(errMsg);
  }
  const data = await response.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  return text;
}

function extractJSON(text) {
  // 코드블럭 제거
  let cleaned = text.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
  // JSON 객체 부분만 추출
  const objMatch = cleaned.match(/\{[\s\S]*\}/);
  if (objMatch) cleaned = objMatch[0];
  return JSON.parse(cleaned);
}

async function aiGenerateCards(sourceText, opts = {}) {

    `  "${k}": [${fs.map(f => `"${f}"`).join(", ")}]`
  ).join(",\n");

  const themesList = Object.keys(THEMES).join(", ");

  const system = `당신은 인스타그램 카드뉴스 전문 에디터입니다. 100만 팔로워 계정을 운영해온 경험으로, 사용자가 전달한 내용을 카드뉴스 5-7장으로 재구성합니다.

## 필드 의미
- eyebrow: 짧은 영문 라벨 (대문자, 20자 이내)
- title/subtitle: 한국어 헤드라인. 14자 근처에서 자연스럽게 \\n 줄바꿈

- body: 본문 1-2문장 (80자 이내)
- question/answer: Q&A 텍스트
- term/pron: 용어와 발음/원어
- compareTitle, labelA/B, titleA/B, bodyA/B: 좌우 비교 (labelA="기존" labelB="대안" 같은 식)

- descItems[]: {title, desc} 배열 3-4개, title 15자/desc 30자

- quote/attribution: 인용문과 출처
- stat/statUnit/statPre/statLabel/statNote: 통계 카드. 원문/이미지에 실제 숫자 있을 때만 사용
- emphPre/emphasis/emphPost: 앞 문장, 강조 단어 (3-5자), 뒷 문장
- tipLabel/tipBody: PRO TIP 같은 라벨과 팁 본문
- saveReason: 왜 저장해야 하는지 짧은 이유
- askQuestion/askCta: 댓글 유도 질문과 CTA 박스 텍스트
- account: "@핸들" (사용자가 따로 설정)
- hashtag: "#태그1 #태그2" 형식, 5-10개

## 규칙
1. 첫 카드는 반드시 type="cover", 마지막은 type="closing"
2. 5-7장으로 압축 (너무 길면 안 됨)
3. 각 카드는 한 가지 핵심만
4. 한국어는 word-break 고려해 자연스러운 곳에서 \\n
5. 통계 숫자가 원문/이미지에 없으면 stat 레이아웃 쓰지 말 것
6. 비교 구조가 명확할 때만 compare 사용
7. 시간/단계 순서가 있을 때만 timeline 사용
8. 톤: ${tone}
9. 내용에 어울리는 테마 추천 (${themesList} 중 하나)

## 출력
오직 JSON만. 마크다운 코드블럭 금지. 형식:
{
  "theme": "navy",
  "cards": [
    { "type": "cover", "layout": "bold", "data": { "eyebrow": "...", "title": "...", ... } },
    ...
  ]
}`;

  // 사용자 메시지 구성
  let user;
  if (sourceText && images.length > 0) {
    user = `첨부된 ${images.length}장의 이미지와 아래 텍스트를 종합 분석해서 카드뉴스를 만들어주세요.\n\n[텍스트]\n${sourceText}\n\n계정 핸들: ${STATE.brand.handle}\n브랜드명: ${STATE.brand.name}`;
  } else if (images.length > 0) {
    user = `첨부된 ${images.length}장의 이미지를 분석해서 카드뉴스로 만들어주세요. 이미지 안의 텍스트(OCR), 표, 차트, 도식을 모두 활용하세요.\n\n계정 핸들: ${STATE.brand.handle}\n브랜드명: ${STATE.brand.name}`;
  } else {
    user = `다음 내용을 카드뉴스로 만들어주세요:\n\n${sourceText}\n\n계정 핸들: ${STATE.brand.handle}\n브랜드명: ${STATE.brand.name}`;
  }

  const raw = await callClaude(system, user, 3000, images);
  const parsed = extractJSON(raw);
  parsed.cards = parsed.cards.map(c => ({ ...c, id: uid() }));
  return parsed;
}

  if (needsNew.length === 0) {
    // 모든 새 필드가 기존에 존재 → 그대로 사용
    return card.data;
  }

  const system = `당신은 카드뉴스 에디터입니다. 같은 카드 내용을 다른 레이아웃으로 옮길 때, 새 레이아웃에 맞게 필드를 재구성합니다.

기존 레이아웃: ${oldKey}

- term/pron: 용어/원어
- quote/attribution: 인용
- stat/statUnit/statPre/statLabel: 숫자 강조
- emphPre/emphasis/emphPost: 한 단어 강조
- tipLabel/tipBody: 팁

규칙:
1. 기존 의미·내용 최대한 보존
2. 새 필드만 채워주면 됨 (오버랩 필드는 같은 값 유지)
3. 정보가 부족하면 자연스럽게 추론·보완
4. 통계 숫자 없는데 stat 가면 가상으로 만들지 말고 의미있는 값 유지 불가하면 placeholder

오직 JSON만 출력:
{
  "data": { 새 레이아웃의 모든 필드 }
}`;

  const user = `기존 데이터:\n${JSON.stringify(card.data, null, 2)}\n\n위 내용을 새 레이아웃(${newKey})에 맞게 재구성해주세요.`;

  const raw = await callClaude(system, user, 1500);
  const parsed = extractJSON(raw);
  // 기존 데이터에 새 필드 머지
  return { ...card.data, ...parsed.data };
}

// 개별 카드 다듬기
async function aiPolishCard(card, instruction) {
  const key = `${card.type}/${card.layout}`;
  const fields = LAYOUT_FIELDS[key];

  const system = `당신은 인스타 카드뉴스 카피라이터입니다. 한 장의 카드 내용을 사용자 요청대로 다듬어주세요.

레이아웃: ${key}
필드: ${JSON.stringify(fields)}

규칙:
- 한국어 14자 근처 자연스러운 \\n 줄바꿈
- title 30자 이내, body 100자 이내
- items는 각 25자 이내, 3-5개
- 의미 유지, 표현만 다듬기

오직 JSON만:
{ "data": { 다듬어진 필드들 } }`;

  const user = `요청: ${instruction}\n\n현재 데이터:\n${JSON.stringify(card.data, null, 2)}`;
  const raw = await callClaude(system, user, 1500);
  const parsed = extractJSON(raw);
  return { ...card.data, ...parsed.data };
}

// AI 캡션 생성
async function aiGenerateCaption() {
  const cardsSummary = STATE.cards.map((c, i) => {
    const d = c.data;
    let preview = "";
    if (c.type === "cover") preview = `${d.title} / ${d.subtitle || ""}`;
    else if (c.type === "topic") preview = `${d.title || d.question || d.term}: ${d.body || d.answer || ""}`;
    else if (c.type === "list") preview = `${d.title}: ${(d.items || []).slice(0,3).join(", ")}`;
    else if (c.type === "highlight") preview = d.quote || `${d.statPre} ${d.stat}${d.statUnit} ${d.statLabel}` || `${d.emphPre} ${d.emphasis} ${d.emphPost}` || d.tipBody;
    else if (c.type === "closing") preview = `${d.title || d.askQuestion} ${d.account}`;
    return `${i+1}. [${c.type}/${c.layout}] ${preview}`;
  }).join("\n");

  const system = `당신은 인스타그램 카피라이터입니다. 카드뉴스 슬라이드 요약을 보고, 인스타 포스트 캡션을 작성합니다.

규칙:
1. 첫 줄: 강한 후크 (스와이프 유도)
2. 본문: 카드 내용을 2-4줄로 압축
3. CTA: 저장/공유/팔로우 유도 1-2줄
4. 마지막: 해시태그 8-12개 (#인공지능사관학교 #AI #서포터즈 류 한국어 위주)
5. 이모지 적절히 (과하지 않게)
6. 전체 길이: 300-500자
7. 계정 핸들 ${STATE.brand.handle} 포함

오직 캡션 텍스트만 출력. 설명 금지.`;

  const user = `브랜드: ${STATE.brand.name}\n계정: ${STATE.brand.handle}\n\n카드 슬라이드 요약:\n${cardsSummary}`;
  return await callClaude(system, user, 1500);
}

function renderThemeGrid() {
  const grid = document.getElementById("theme-grid");
  grid.innerHTML = "";
  Object.entries(THEMES).forEach(([id, t]) => {
    const isActive = STATE.theme === id;
    const swatchHtml = t.swatch.map(c => `<span style="background:${c}"></span>`).join("");
    const chip = document.createElement("button");
    chip.className = "theme-chip" + (isActive ? " active" : "");
    chip.dataset.theme = id;
    chip.innerHTML = `<div class="theme-swatch">${swatchHtml}</div>${t.name}`;
    chip.onclick = () => setTheme(id);
    grid.appendChild(chip);
  });
}

function renderCardList() {
  const wrap = document.getElementById("card-list");
  document.getElementById("card-count").textContent = STATE.cards.length;
  if (STATE.cards.length === 0) {
    wrap.innerHTML = `<div style="padding:20px 8px; color:var(--text-faint); font-size:11px; text-align:center; line-height:1.5;">아직 카드가 없어요</div>`;
    return;
  }
  wrap.innerHTML = "";
  STATE.cards.forEach((c, i) => {
    const item = document.createElement("div");
    item.className = "card-item" + (c.id === STATE.activeId ? " active" : "");
    item.dataset.id = c.id;
    item.draggable = true;
    item.innerHTML = `
      <span class="drag-handle" title="드래그">⋮⋮</span>
      <div class="card-num">${i + 1}</div>
      <div class="card-meta">
        <div class="card-label">${esc(previewLabel(c))}</div>
        <div class="card-type-mini">${TYPE_LABEL[c.type]} · ${c.layout}</div>
      </div>
      <div class="card-actions">
        <button class="card-act-btn" data-dup="${c.id}" title="복제">⎘</button>
        <button class="card-act-btn del" data-del="${c.id}" title="삭제">×</button>
      </div>`;
    item.addEventListener("click", e => {
      if (e.target.closest("[data-del]") || e.target.closest("[data-dup]")) return;
      selectCard(c.id);
    });
    item.addEventListener("dragstart", e => {
      item.classList.add("dragging");
      e.dataTransfer.setData("text/plain", c.id);
      e.dataTransfer.effectAllowed = "move";
    });
    item.addEventListener("dragend", () => item.classList.remove("dragging"));
    item.addEventListener("dragover", e => { e.preventDefault(); item.classList.add("drag-over"); });
    item.addEventListener("dragleave", () => item.classList.remove("drag-over"));
    item.addEventListener("drop", e => {
      e.preventDefault();
      item.classList.remove("drag-over");
      const fromId = e.dataTransfer.getData("text/plain");
      moveCard(fromId, c.id);
    });
    wrap.appendChild(item);
  });
  wrap.querySelectorAll("[data-del]").forEach(b => b.onclick = e => { deleteCard(b.dataset.del); e.stopPropagation(); });
  wrap.querySelectorAll("[data-dup]").forEach(b => b.onclick = e => { duplicateCard(b.dataset.dup); e.stopPropagation(); });
}

function previewLabel(card) {
  const d = card.data;
  if (card.type === "cover") return (d.title || "표지").split("\n")[0];
  if (card.type === "topic") {
    if (card.layout === "qa") return (d.question || "Q&A").split("\n")[0];
    if (card.layout === "definition") return d.term || "정의";
    if (card.layout === "compare") return d.compareTitle || "비교";
    return (d.title || "주제").split("\n")[0];
  }
  if (card.type === "list") return (d.title || "리스트").split("\n")[0];
  if (card.type === "highlight") {
    if (card.layout === "stat") return `${d.stat}${d.statUnit} · ${(d.statLabel || "").split("\n")[0]}`;
    if (card.layout === "emphasis") return `${d.emphPre} ${d.emphasis}`;
    if (card.layout === "tip") return `💡 ${(d.tipBody || "").split("\n")[0]}`;
    return (d.quote || "포인트").split("\n")[0];
  }
  if (card.type === "closing") {
    if (card.layout === "ask") return (d.askQuestion || "댓글 유도").split("\n")[0];
    return (d.title || "마무리").split("\n")[0];
  }
  return "";
}

// 카드의 현재 활성 필드 스타일 헬퍼
function _currentFieldStyle(key) {
  const card = STATE.cards.find(c => c.id === STATE.activeId);
  const s = (card && card.fieldStyles && card.fieldStyles[key]) || {};
  const hex = v => (typeof v === "string" && /^#[0-9a-f]{3,8}$/i.test(v)) ? v : "";
  return {
    scale: (typeof s.scale === "number" && s.scale > 0) ? s.scale : 1,
    color: hex(s.color),
    bg: hex(s.bg),
    align: ["left", "center", "right"].includes(s.align) ? s.align : "",
    weight: (typeof s.weight === "number") ? s.weight : 0,
    lh: (typeof s.lh === "number") ? s.lh : 0,
    ls: (typeof s.ls === "number") ? s.ls : null,
    opacity: (typeof s.opacity === "number") ? s.opacity : 1,
  };
}

// 인라인 미니 컨트롤 (📏 슬라이더 + 🎨 색 + ↺) — fieldKey 단순 또는 dotted 가능
function fieldStyleCtrl(fieldKey) {
  const fs = _currentFieldStyle(fieldKey);
  const hasCol = !!fs.color;
  const hasBg = !!fs.bg;
  const advActive = !!(fs.bg || fs.align || fs.weight || fs.lh || fs.ls !== null || fs.opacity < 1);
  const alignBtn = (a, sym) => `<button type="button" class="ff-align" data-field="${fieldKey}" data-align="${a}" title="정렬 ${a}" style="flex:1;font-size:11px;line-height:1;padding:3px 0;border:1px solid var(--line);border-radius:3px;cursor:pointer;background:${fs.align === a ? 'var(--accent)' : 'none'};color:${fs.align === a ? '#fff' : 'var(--text-faint)'}">${sym}</button>`;
  const advSlider = (cls, label, min, max, step, val) => `
      <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-faint);margin-top:4px">
        <span style="flex:0 0 30px">${label}</span>
        <input type="range" class="${cls}" data-field="${fieldKey}" min="${min}" max="${max}" step="${step}" value="${val}" style="flex:1;accent-color:var(--accent);height:12px">
        <span class="${cls}-val" data-field="${fieldKey}" style="flex:0 0 30px;text-align:right;font-variant-numeric:tabular-nums">${val}</span>
      </label>`;
  return `
    <div class="field-style-row" data-field="${fieldKey}" style="display:flex;align-items:center;gap:4px;margin-top:4px">
      <span style="flex:0 0 12px;font-size:10px;color:var(--text-faint)">📏</span>
      <input type="range" class="ff-scale" data-field="${fieldKey}" min="0.5" max="2.0" step="0.05" value="${fs.scale}" style="flex:1;cursor:pointer;accent-color:var(--accent);height:14px">
      <span class="ff-scale-val" data-field="${fieldKey}" style="flex:0 0 34px;font-size:10px;color:var(--text-dim);text-align:right;font-variant-numeric:tabular-nums">${Math.round(fs.scale*100)}%</span>
      <input type="color" class="ff-color" data-field="${fieldKey}" value="${fs.color || '#ffffff'}" title="${hasCol ? '글자색 적용 중 — 더블클릭으로 해제' : '글자색 미적용 — 클릭해서 선택'}" style="flex:0 0 22px;width:22px;height:18px;padding:0;border:1px solid var(--line);border-radius:3px;cursor:pointer;opacity:${hasCol ? 1 : 0.45}">
      <button type="button" class="ff-adv" data-field="${fieldKey}" title="세부 조절 (정렬·배경·굵기·행간·자간·투명도)" style="flex:0 0 20px;background:${advActive ? 'var(--accent)' : 'none'};border:1px solid var(--line);color:${advActive ? '#fff' : 'var(--text-faint)'};cursor:pointer;font-size:10px;padding:0 4px;border-radius:3px">⚙</button>
      <button type="button" class="ff-reset" data-field="${fieldKey}" title="이 필드 스타일 원래대로" style="flex:0 0 20px;background:none;border:1px solid var(--line);color:var(--text-faint);cursor:pointer;font-size:10px;padding:0 4px;border-radius:3px">↺</button>
    </div>
    <div class="field-adv-row" data-field="${fieldKey}" style="display:${advActive ? 'block' : 'none'};margin-top:4px;padding:6px 8px;background:var(--bg-soft,rgba(0,0,0,0.03));border-radius:6px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;color:var(--text-faint);flex:0 0 30px">정렬</span>
        <div style="display:flex;gap:3px;flex:1">${alignBtn("left","⟸")}${alignBtn("center","≡")}${alignBtn("right","⟹")}</div>
        <span style="font-size:10px;color:var(--text-faint)">🖍</span>
        <input type="color" class="ff-bg" data-field="${fieldKey}" value="${fs.bg || '#ffe066'}" title="${hasBg ? '영역 배경색 적용 중 — 더블클릭 해제' : '영역 배경색 — 클릭해서 선택'}" style="flex:0 0 22px;width:22px;height:18px;padding:0;border:1px solid var(--line);border-radius:3px;cursor:pointer;opacity:${hasBg ? 1 : 0.45}">
      </div>
      ${advSlider("ff-weight", "굵기", 100, 900, 100, fs.weight || 700)}
      ${advSlider("ff-lh", "행간", 0.9, 2.2, 0.05, fs.lh || 1.3)}
      ${advSlider("ff-ls", "자간", -0.08, 0.3, 0.01, fs.ls === null ? 0 : fs.ls)}
      ${advSlider("ff-opacity", "투명", 0.2, 1, 0.05, fs.opacity)}
    </div>`;
}

function field({key, label, type="input", placeholder="", limit=null, value=""}) {
  const counter = limit ? `<span class="counter" data-counter="${key}" data-limit="${limit}">0 / ${limit}</span>` : "";
  const cls = type === "textarea" ? "" : " ta-compact";
  const input = `<textarea class="ta-auto${cls}" rows="1" data-key="${key}" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`;
  const btns = `<div style="display:flex;gap:2px;margin-left:4px">
    <button type="button" class="fld-copy-btn" data-key="${key}" title="내용 복사" style="font-size:10px;padding:1px 5px;border:1px solid var(--line);border-radius:3px;background:none;color:var(--text-faint);cursor:pointer;line-height:1.4">복사</button>
    <button type="button" class="fld-clear-btn" data-key="${key}" title="내용 지우기" style="font-size:10px;padding:1px 5px;border:1px solid var(--line);border-radius:3px;background:none;color:var(--text-faint);cursor:pointer;line-height:1.4">지우기</button>
  </div>`;
  return `<div class="field"><div class="field-label-row"><label>${label}</label><div style="display:flex;align-items:center;gap:0">${counter}${btns}</div></div>${input}${fieldStyleCtrl(key)}</div>`;
}

function renderFields(card) {
  const d = card.data;
  const T = card.type, L = card.layout;
  let html = "";

  if (T === "cover") {
    html += field({key:"eyebrow", label:"아이브로우 (영문)", value:d.eyebrow, limit:32});
    if (L === "number") html += field({key:"number", label:"숫자", value:d.number, limit:3});
    html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:30});
    if (L !== "minimal") html += field({key:"subtitle", label:"서브타이틀", type:"textarea", value:d.subtitle, limit:60});
    if (L !== "question") html += field({key:"badge", label:"배지", value:d.badge, limit:30});
  }
  if (T === "topic") {
    if (L === "qa") {
      html += field({key:"question", label:"질문", type:"textarea", value:d.question, limit:40});
      html += field({key:"answer", label:"답변", type:"textarea", value:d.answer, limit:80});
    } else if (L === "definition") {
      html += field({key:"term", label:"용어 (1단어)", value:d.term, limit:10});
      html += field({key:"pron", label:"풀이/원어", value:d.pron, limit:60});
      html += field({key:"body", label:"본문 (정의)", type:"textarea", value:d.body, limit:120});
    } else if (L === "compare") {
      html += field({key:"compareTitle", label:"비교 주제", type:"textarea", value:d.compareTitle, limit:30});
      html += field({key:"labelA", label:"A 라벨", value:d.labelA, limit:12});
      html += field({key:"titleA", label:"A 제목", value:d.titleA, limit:20});
      html += field({key:"bodyA", label:"A 설명", type:"textarea", value:d.bodyA, limit:60});
      html += field({key:"labelB", label:"B 라벨", value:d.labelB, limit:12});
      html += field({key:"titleB", label:"B 제목", value:d.titleB, limit:20});
      html += field({key:"bodyB", label:"B 설명", type:"textarea", value:d.bodyB, limit:60});
    } else {
      html += field({key:"label", label:"라벨", value:d.label, limit:20});
      if (L === "index") html += field({key:"number", label:"인덱스", value:d.number, limit:3});
      html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:30});
      html += field({key:"body", label:"본문", type:"textarea", value:d.body, limit:120});
    }
  }
  if (T === "list") {
    if (L === "timeline") {
      html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:30});
      html += `<div class="field"><div class="field-label-row"><label>타임라인 항목 (3-5개)</label></div><div class="list-items" id="tl-items">${(d.timelineItems||[]).map((it,i)=>`
        <div style="border-bottom:1px dashed var(--line);padding-bottom:8px;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-faint);margin-bottom:4px">항목 ${i+1}<button class="icon-btn" data-del-tl="${i}" style="margin-left:auto">×</button></div>
          <textarea class="ta-auto ta-compact" rows="1" data-tl="${i}.label" placeholder="단계 (예: 1주차)" style="width:100%">${esc(it.label)}</textarea>
          ${fieldStyleCtrl(`timelineItems.${i}.label`)}
          <textarea class="ta-auto" rows="1" data-tl="${i}.content" placeholder="내용" style="width:100%;margin-top:6px">${esc(it.content)}</textarea>
          ${fieldStyleCtrl(`timelineItems.${i}.content`)}
        </div>
      `).join("")}</div><button class="add-item-btn" id="add-tl">+ 항목 추가</button></div>`;
    } else if (L === "desc") {
      html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:30});
      html += `<div class="field"><div class="field-label-row"><label>항목 (제목+설명)</label></div><div class="list-items" id="desc-items">${(d.descItems||[]).map((it,i)=>`
        <div style="border-bottom:1px dashed var(--line);padding-bottom:8px;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-faint);margin-bottom:4px">항목 ${i+1}<button class="icon-btn" data-del-desc="${i}" style="margin-left:auto">×</button></div>
          <textarea class="ta-auto ta-compact" rows="1" data-desc="${i}.title" placeholder="제목" style="width:100%">${esc(it.title)}</textarea>
          ${fieldStyleCtrl(`descItems.${i}.title`)}
          <textarea class="ta-auto" rows="1" data-desc="${i}.desc" placeholder="설명" style="width:100%;margin-top:6px">${esc(it.desc)}</textarea>
          ${fieldStyleCtrl(`descItems.${i}.desc`)}
        </div>
      `).join("")}</div><button class="add-item-btn" id="add-desc">+ 항목 추가</button></div>`;
    } else {
      html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:30});
      html += field({key:"sub", label:"서브타이틀", value:d.sub, limit:30});
      html += `<div class="field"><div class="field-label-row"><label>항목 (3-5개) · 각 항목 아래 세부내용(선택)</label></div><div class="list-items" id="list-items">${(d.items||[]).map((it,i)=>`
        <div style="border-bottom:1px dashed var(--line);padding-bottom:8px;margin-bottom:8px">
          <div class="list-item-row"><textarea class="ta-auto ta-compact" rows="1" data-list-idx="${i}" placeholder="항목 ${i+1}">${esc(it)}</textarea><button class="icon-btn" data-del-item="${i}">×</button></div>
          ${fieldStyleCtrl(`items.${i}`)}
          <textarea class="ta-auto ta-sub" rows="1" data-list-sub="${i}" placeholder="↳ 세부내용 (선택)" style="width:100%;margin-top:4px">${esc((d.itemDescs && d.itemDescs[i]) || "")}</textarea>
        </div>`).join("")}</div><button class="add-item-btn" id="add-list-item">+ 항목 추가</button></div>`;
    }
  }
  if (T === "highlight") {
    if (L === "stat") {
      html += field({key:"statPre", label:"상단 설명", value:d.statPre, limit:30});
      html += field({key:"stat", label:"숫자", value:d.stat, limit:5});
      html += field({key:"statUnit", label:"단위", value:d.statUnit, limit:5});
      html += field({key:"statLabel", label:"라벨", type:"textarea", value:d.statLabel, limit:40});
      html += field({key:"statNote", label:"각주", value:d.statNote, limit:40});
    } else if (L === "emphasis") {
      html += field({key:"emphPre", label:"앞 문장", type:"textarea", value:d.emphPre, limit:25});
      html += field({key:"emphasis", label:"강조 단어", value:d.emphasis, limit:6});
      html += field({key:"emphPost", label:"뒷 문장", type:"textarea", value:d.emphPost, limit:25});
    } else if (L === "tip") {
      html += field({key:"tipLabel", label:"팁 라벨", value:d.tipLabel, limit:20});
      html += field({key:"tipBody", label:"팁 본문", type:"textarea", value:d.tipBody, limit:80});
    } else {
      html += field({key:"quote", label:"인용/강조", type:"textarea", value:d.quote, limit:60});
      html += field({key:"attribution", label:"출처", value:d.attribution, limit:30});
    }
  }
  if (T === "closing") {
    html += field({key:"eyebrow", label:"아이브로우", value:d.eyebrow, limit:24});
    if (L === "save") {
      html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:24});
      html += field({key:"saveReason", label:"저장 이유", type:"textarea", value:d.saveReason, limit:50});
    } else if (L === "ask") {
      html += field({key:"askQuestion", label:"질문", type:"textarea", value:d.askQuestion, limit:30});
      html += field({key:"askCta", label:"CTA 박스", value:d.askCta, limit:30});
    } else if (L === "thanks") {
      html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:24});
      html += field({key:"subtitle", label:"서브타이틀", type:"textarea", value:d.subtitle, limit:60});
    } else {
      html += field({key:"title", label:"타이틀", type:"textarea", value:d.title, limit:30});
    }
    html += field({key:"account", label:"인스타 계정", value:d.account, limit:30});
    if (L === "next") html += field({key:"hashtag", label:"해시태그", type:"textarea", value:d.hashtag, limit:200});
  }

  // ===== 요소(오버레이) 추가 섹션 (P5) — 자유 배치 텍스트/배지/이미지 =====
  const OVT = { text: "텍스트", badge: "배지", image: "이미지" };
  const ovItems = (card.overlays || []).map((o) => {
    const head = `<div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-faint);margin-bottom:5px">${OVT[o.type] || o.type} <span class="ov-pos" data-ov="${o.id}">${Math.round(o.x ?? 30)}%, ${Math.round(o.y ?? 30)}%</span><button class="icon-btn ov-del" data-ov="${o.id}" title="삭제" style="margin-left:auto">×</button></div>`;
    let bodyHtml;
    if (o.type === "image") {
      const hVal = (typeof o.h === "number" && o.h > 0) ? o.h : 0;
      const hasCrop = hVal > 0
        || (typeof o.imgL === "number" && o.imgL !== 0)
        || (typeof o.imgT === "number" && o.imgT !== 0)
        || (typeof o.imgW === "number" && o.imgW !== 100);
      bodyHtml = `<button class="btn btn-ghost ov-img-pick" data-ov="${o.id}" style="width:100%;font-size:11px">${o.url ? "🖼 이미지 변경/검색" : "🖼 이미지 선택/검색"}</button>
        <p style="margin:5px 0 0;font-size:10px;color:var(--text-faint);line-height:1.4">💡 프리뷰에서 <b>모서리</b>(사각)는 종횡비 유지하며 크기 조절, <b>변</b>(원)은 컨테이너 영역만 줄여 이미지의 그 부분을 가립니다(이미지 크기 그대로).</p>
        <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-faint);margin-top:5px" title="가로 길이 (%)">가로<input type="range" class="ov-width" data-ov="${o.id}" min="5" max="95" step="1" value="${o.w ?? 30}" style="flex:1;accent-color:var(--accent)"><span class="ov-width-val" data-ov="${o.id}" style="min-width:30px;text-align:right;font-variant-numeric:tabular-nums">${o.w ?? 30}%</span></label>
        <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-faint);margin-top:4px" title="세로 길이 (%) — 0이면 원본 비율 유지(잘림 없음)">세로<input type="range" class="ov-height" data-ov="${o.id}" min="0" max="95" step="1" value="${hVal}" style="flex:1;accent-color:var(--accent)"><span class="ov-height-val" data-ov="${o.id}" style="min-width:30px;text-align:right;font-variant-numeric:tabular-nums">${hVal > 0 ? hVal + "%" : "자동"}</span></label>
        ${hasCrop ? `<button type="button" class="ov-crop-reset" data-ov="${o.id}" style="margin-top:6px;width:100%;background:none;border:1px solid var(--c-line,#e3e7ef);color:var(--text-faint);cursor:pointer;font-size:10px;padding:3px;border-radius:4px">크롭 리셋 ↺</button>` : ""}`;
    } else {
      bodyHtml = `<textarea class="ta-auto ta-compact ov-text-in" data-ov="${o.id}" rows="1" placeholder="${OVT[o.type]} 내용" style="width:100%">${esc(o.text || "")}</textarea>
        <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-faint);margin-top:5px">크기<input type="range" class="ov-size" data-ov="${o.id}" min="20" max="180" step="2" value="${o.size ?? (o.type === 'badge' ? 40 : 56)}" style="flex:1;accent-color:var(--accent)"></label>
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px">
          <span style="font-size:10px;color:var(--text-faint)">🎨</span>
          <input type="color" class="ov-color" data-ov="${o.id}" value="${o.color || '#ffffff'}" title="글자색 (더블클릭 해제)" style="width:24px;height:18px;padding:0;border:1px solid var(--line);border-radius:3px;cursor:pointer;opacity:${o.color ? 1 : 0.45}">
          <span style="font-size:10px;color:var(--text-faint)">🖍</span>
          <input type="color" class="ov-bg" data-ov="${o.id}" value="${o.bg || '#1e3fa8'}" title="배경색 (더블클릭 해제)" style="width:24px;height:18px;padding:0;border:1px solid var(--line);border-radius:3px;cursor:pointer;opacity:${o.bg ? 1 : 0.45}">
          ${o.type === 'text' ? `<input type="range" class="ov-width" data-ov="${o.id}" min="10" max="95" step="1" value="${o.w ?? 40}" title="너비" style="flex:1;accent-color:var(--accent)">` : ""}
        </div>`;
    }
    return `<div class="ov-item" data-ov="${o.id}" style="border:1px solid var(--c-line,#e3e7ef);border-radius:8px;padding:8px;margin-bottom:6px">${head}${bodyHtml}</div>`;
  }).join("");

  html += `<div class="field" style="margin-top:16px;padding-top:14px;border-top:1px solid var(--c-line,#e3e7ef)">
    <div class="field-label-row"><label>➕ 요소 추가</label><span class="counter" style="background:none">${(card.overlays || []).length}개 · 프리뷰에서 드래그</span></div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <button class="btn ov-add" data-ovtype="text" style="flex:1;font-size:11px">＋ 텍스트</button>
      <button class="btn ov-add" data-ovtype="badge" style="flex:1;font-size:11px">＋ 배지</button>
      <button class="btn ov-add" data-ovtype="image" style="flex:1;font-size:11px">＋ 이미지</button>
    </div>
    <div id="ov-list" style="margin-top:8px">${ovItems}</div>
  </div>`;

  // ===== 배경 이미지 섹션 (모든 카드 공통, 맨 아래) =====
  const bg = d.bgImage;
  const hasBg = bg && bg.url;
  const bgScale = (typeof bg?.scale === "number" && bg.scale > 0) ? bg.scale : 1;
  const bgOffX = typeof bg?.offsetX === "number" ? bg.offsetX : 50;
  const bgOffY = typeof bg?.offsetY === "number" ? bg.offsetY : 50;
  const bandMode = hasBg && bg.mode === "band";
  const bandSide = ["top", "bottom", "left", "right"].includes(bg?.side) ? bg.side : "top";
  const bandPct = Math.round(((typeof bg?.ratio === "number" && bg.ratio >= 0.15 && bg.ratio <= 0.9) ? bg.ratio : 0.42) * 100);
  const SIDE_LABEL = { top: "상", bottom: "하", left: "좌", right: "우" };
  const sliderRow = (id, label, min, max, step, val, suffix = "%") => `
    <label style="font-size:10px;color:var(--text-faint);display:flex;align-items:center;gap:4px;margin-top:6px">
      ${label}
      <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" style="flex:1">
      <span id="${id}-val" style="min-width:36px;text-align:right;font-variant-numeric:tabular-nums">${val}${suffix}</span>
    </label>`;
  html += `
    <div class="field bg-image-field" style="margin-top:20px;padding-top:16px;border-top:1px solid var(--c-line,#e3e7ef)">
      <div class="field-label-row">
        <label>🖼 배경 이미지</label>
        <span class="counter" style="background:none">${hasBg ? "사용 중" : "사용 안 함"}</span>
      </div>
      <input type="file" id="bg-file-input" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">
      ${hasBg ? `
        <div style="display:flex;gap:10px;align-items:flex-start;margin-top:6px">
          <img src="${esc(bg.url)}" style="width:96px;height:120px;object-fit:cover;border-radius:6px;border:1px solid var(--c-line,#e3e7ef);background:#000"
               onerror="this.style.opacity=0.3">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;gap:4px">
              <button class="btn btn-ghost" id="btn-bg-pick" style="flex:1;font-size:11px">🖼 기사</button>
              <button class="btn btn-ghost" id="btn-bg-upload" style="flex:1;font-size:11px">📁 파일</button>
            </div>
            <button class="btn btn-ghost" id="btn-bg-remove" style="font-size:11px;color:var(--danger,#e11)">✕ 배경 제거</button>
          </div>
        </div>
        <div style="margin-top:8px;padding:8px;background:var(--bg-soft,rgba(0,0,0,0.03));border-radius:6px">
          <div style="font-size:10px;color:var(--text-faint);margin-bottom:4px">배경 적용 범위</div>
          <div style="display:flex;gap:4px;margin-bottom:4px">
            <button type="button" class="bg-mode-btn" data-mode="full" style="flex:1;font-size:10px;padding:5px;border-radius:4px;cursor:pointer;border:1px solid var(--c-line,#e3e7ef);background:${bandMode ? 'none' : 'var(--accent,#1e3fa8)'};color:${bandMode ? 'var(--text-faint)' : '#fff'}">전체</button>
            <button type="button" class="bg-mode-btn" data-mode="band" style="flex:1;font-size:10px;padding:5px;border-radius:4px;cursor:pointer;border:1px solid var(--c-line,#e3e7ef);background:${bandMode ? 'var(--accent,#1e3fa8)' : 'none'};color:${bandMode ? '#fff' : 'var(--text-faint)'}">밴드(부분)</button>
          </div>
          <div id="bg-band-opts" style="display:${bandMode ? 'block' : 'none'};margin-bottom:6px">
            <div style="display:flex;gap:4px">
              ${["top","bottom","left","right"].map(s => `<button type="button" class="bg-side-btn" data-side="${s}" style="flex:1;font-size:10px;padding:5px;border-radius:4px;cursor:pointer;border:1px solid var(--c-line,#e3e7ef);background:${bandSide === s ? 'var(--accent,#1e3fa8)' : 'none'};color:${bandSide === s ? '#fff' : 'var(--text-faint)'}">${SIDE_LABEL[s]}</button>`).join("")}
            </div>
            ${sliderRow("bg-ratio", "비율  ", 15, 90, 5, bandPct)}
          </div>
          ${sliderRow("bg-darken", "어둡기", 0, 85, 5, bg.darken ?? (bandMode ? 0 : 55))}
          ${sliderRow("bg-scale", "확대  ", 50, 300, 5, Math.round(bgScale * 100))}
          ${sliderRow("bg-offx",  "← →  ", 0, 100, 1, bgOffX)}
          ${sliderRow("bg-offy",  "↑ ↓  ", 0, 100, 1, bgOffY)}
          <button type="button" id="bg-transform-reset" style="margin-top:6px;width:100%;background:none;border:1px solid var(--c-line,#e3e7ef);color:var(--text-faint);cursor:pointer;font-size:11px;padding:4px;border-radius:4px">확대·위치 원래대로 ↺</button>
        </div>` : `
        <div style="margin-top:6px;display:flex;gap:6px">
          <button class="btn" id="btn-bg-pick" style="flex:1;font-size:11px">🖼 기사 이미지</button>
          <button class="btn" id="btn-bg-upload" style="flex:1;font-size:11px">📁 파일 업로드</button>
        </div>
        <p style="margin:6px 0 0;font-size:10px;color:var(--text-faint)">기사 이미지: 보도한 매체의 og:image / 본문 이미지 자동 수집. 파일 업로드: 본인 보유 이미지 직접 사용.</p>`}
    </div>`;

  return html;
}

// 페이지 라이프타임 내 임시 세션 ID (URL ?session=... 없을 때 배경 업로드용)
function getUploadSessionId() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get("session");
  if (fromUrl) return fromUrl;
  if (!window.__cardnewsTempSession) {
    window.__cardnewsTempSession = "studio_" + Date.now().toString(36);
  }
  return window.__cardnewsTempSession;
}

async function uploadBgFile(file, card) {
  const sid = getUploadSessionId();
  const fd = new FormData();
  fd.append("file", file);
  try {
    const r = await fetch(`/api/uploads/bg/${sid}`, { method: "POST", body: fd });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || `HTTP ${r.status}`);
    card.data.bgImage = card.data.bgImage || {};
    card.data.bgImage.url = j.url;
    card.data.bgImage.darken = card.data.bgImage.darken ?? 55;
    renderEditor(); renderPreview(); autoSave();
    if (typeof toast === "function") toast("✓ 배경 이미지 업로드 완료", "success");
  } catch (e) {
    alert("배경 업로드 실패: " + e.message);
  }
}

function bindEditorEvents(card) {
  const body = document.getElementById("editor-body");

  // 필드 복사 버튼 — 해당 필드 내용을 프리뷰에 자유 배치 텍스트 오버레이로 추가
  body.querySelectorAll(".fld-copy-btn").forEach(btn => {
    btn.onclick = () => {
      const key = btn.dataset.key;
      const ta = body.querySelector(`textarea[data-key="${key}"]`);
      if (!ta || !ta.value.trim()) { toast("내용을 먼저 입력하세요", "warn"); return; }

      // 프리뷰 DOM에서 실제 렌더링된 크기·색상 읽기
      const scaler = document.getElementById("preview-scaler");
      const cardEl = scaler && scaler.querySelector(".card");
      const fldEl = scaler && scaler.querySelector(`[data-fld="${key}"]`);
      let sizePx = 56, colorHex = "", weightVal = 700, alignVal = "left", lh = 0, ls = null, opacity = 1, wPct = 80;
      if (fldEl && cardEl) {
        const cs = getComputedStyle(fldEl);
        // transform: scale() 은 자식 computed style에 영향 없음 — 값 그대로가 카드 픽셀
        sizePx = Math.round(parseFloat(cs.fontSize));
        // 필드 실제 폭을 카드 폭 대비 % 로 — 줄바꿈 동일하게 재현
        const fldRect = fldEl.getBoundingClientRect();
        const cardRect = cardEl.getBoundingClientRect();
        wPct = Math.min(100, Math.round(fldRect.width / cardRect.width * 100));
        // rgb(r,g,b) → #rrggbb
        const rgb = cs.color.match(/\d+/g);
        if (rgb) colorHex = "#" + rgb.slice(0,3).map(n => (+n).toString(16).padStart(2,"0")).join("");
        weightVal = parseInt(cs.fontWeight) || 700;
        alignVal = cs.textAlign || "left";
        // 행간: "normal" 이면 0(기본), px값이면 fontSize로 나눠 배수로
        const lhRaw = cs.lineHeight;
        lh = (lhRaw && lhRaw !== "normal") ? +(parseFloat(lhRaw) / parseFloat(cs.fontSize)).toFixed(3) : 0;
        // 자간: px → em 변환
        const lsRaw = cs.letterSpacing;
        ls = (lsRaw && lsRaw !== "normal") ? +(parseFloat(lsRaw) / parseFloat(cs.fontSize)).toFixed(4) : null;
        // 투명도
        opacity = parseFloat(cs.opacity) ?? 1;
      }

      const ov = {
        id: "ov" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
        type: "text",
        text: ta.value,
        x: 10, y: 10, w: wPct,
        size: sizePx,
        color: colorHex,
        weight: weightVal,
        align: alignVal,
        ...(lh > 0 ? { lh } : {}),
        ...(ls !== null ? { ls } : {}),
        ...(opacity < 1 ? { opacity } : {}),
      };
      card.overlays = card.overlays || [];
      card.overlays.push(ov);
      SEL = { kind: "ov", key: ov.id };
      renderEditor(); renderPreview(); autoSave();
      toast("프리뷰에 텍스트 요소가 추가됐어요", "success");
    };
  });

  // 필드 지우기 버튼
  body.querySelectorAll(".fld-clear-btn").forEach(btn => {
    btn.onclick = () => {
      const key = btn.dataset.key;
      const ta = body.querySelector(`textarea[data-key="${key}"]`);
      if (!ta) return;
      ta.value = "";
      const dotted = key.split(".");
      let target = card.data;
      dotted.slice(0, -1).forEach(k => { target = target && target[k]; });
      if (target) target[dotted[dotted.length - 1]] = "";
      ta.dispatchEvent(new Event("input", { bubbles: true }));
      renderPreview(); autoSave();
    };
  });

  // 배경 이미지 컨트롤
  const btnPick = body.querySelector("#btn-bg-pick");
  if (btnPick) btnPick.onclick = () => openBgImagePicker(card);
  const btnRemove = body.querySelector("#btn-bg-remove");
  if (btnRemove) btnRemove.onclick = () => {
    delete card.data.bgImage;
    renderEditor(); renderPreview(); autoSave();
  };
  const darken = body.querySelector("#bg-darken");
  if (darken) darken.oninput = (e) => {
    if (!card.data.bgImage) return;
    card.data.bgImage.darken = +e.target.value;
    body.querySelector("#bg-darken-val").textContent = e.target.value + "%";
    renderPreview(); autoSave();
  };

  // 파일 업로드
  const fileInput = body.querySelector("#bg-file-input");
  const btnUpload = body.querySelector("#btn-bg-upload");
  if (btnUpload && fileInput) {
    btnUpload.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const f = e.target.files && e.target.files[0];
      if (f) uploadBgFile(f, card);
      e.target.value = ""; // 같은 파일 재선택 가능
    };
  }

  // 확대 (scale)
  const bgScale = body.querySelector("#bg-scale");
  if (bgScale) bgScale.oninput = (e) => {
    if (!card.data.bgImage) return;
    const pct = +e.target.value;
    card.data.bgImage.scale = pct / 100;
    body.querySelector("#bg-scale-val").textContent = pct + "%";
    renderPreview(); autoSave();
  };
  // 위치 X
  const bgOffX = body.querySelector("#bg-offx");
  if (bgOffX) bgOffX.oninput = (e) => {
    if (!card.data.bgImage) return;
    card.data.bgImage.offsetX = +e.target.value;
    body.querySelector("#bg-offx-val").textContent = e.target.value + "%";
    renderPreview(); autoSave();
  };
  // 위치 Y
  const bgOffY = body.querySelector("#bg-offy");
  if (bgOffY) bgOffY.oninput = (e) => {
    if (!card.data.bgImage) return;
    card.data.bgImage.offsetY = +e.target.value;
    body.querySelector("#bg-offy-val").textContent = e.target.value + "%";
    renderPreview(); autoSave();
  };
  // 변형 리셋
  const bgReset = body.querySelector("#bg-transform-reset");
  if (bgReset) bgReset.onclick = () => {
    if (!card.data.bgImage) return;
    card.data.bgImage.scale = 1;
    card.data.bgImage.offsetX = 50;
    card.data.bgImage.offsetY = 50;
    renderEditor(); renderPreview(); autoSave();
  };

  // 배경 적용 범위 — 전체 / 밴드(부분)
  body.querySelectorAll(".bg-mode-btn").forEach(b => b.onclick = () => {
    if (!card.data.bgImage) return;
    if (b.dataset.mode === "band") {
      card.data.bgImage.mode = "band";
      if (!card.data.bgImage.side) card.data.bgImage.side = "top";
      if (typeof card.data.bgImage.ratio !== "number") card.data.bgImage.ratio = 0.42;
    } else {
      delete card.data.bgImage.mode;
    }
    renderEditor(); renderPreview(); autoSave();
  });
  // 밴드 방향 (상/하/좌/우)
  body.querySelectorAll(".bg-side-btn").forEach(b => b.onclick = () => {
    if (!card.data.bgImage) return;
    card.data.bgImage.side = b.dataset.side;
    renderEditor(); renderPreview(); autoSave();
  });
  // 밴드 비율
  const bgRatio = body.querySelector("#bg-ratio");
  if (bgRatio) bgRatio.oninput = (e) => {
    if (!card.data.bgImage) return;
    card.data.bgImage.ratio = (+e.target.value) / 100;
    const v = body.querySelector("#bg-ratio-val");
    if (v) v.textContent = e.target.value + "%";
    renderPreview(); autoSave();
  };

  // 필드별 크기 슬라이더 (각 텍스트박스 옆)
  body.querySelectorAll(".ff-scale").forEach(el => {
    el.addEventListener("input", e => {
      const fieldKey = e.target.dataset.field;
      const v = parseFloat(e.target.value);
      card.fieldStyles = card.fieldStyles || {};
      card.fieldStyles[fieldKey] = card.fieldStyles[fieldKey] || {};
      if (v === 1) delete card.fieldStyles[fieldKey].scale;
      else card.fieldStyles[fieldKey].scale = v;
      const valEl = body.querySelector(`.ff-scale-val[data-field="${fieldKey}"]`);
      if (valEl) valEl.textContent = Math.round(v * 100) + "%";
      renderPreview(); autoSave();
    });
  });

  // 필드별 색 picker
  body.querySelectorAll(".ff-color").forEach(el => {
    el.addEventListener("input", e => {
      const fieldKey = e.target.dataset.field;
      const c = e.target.value;
      card.fieldStyles = card.fieldStyles || {};
      card.fieldStyles[fieldKey] = card.fieldStyles[fieldKey] || {};
      card.fieldStyles[fieldKey].color = c;
      e.target.style.opacity = "1";
      e.target.title = "글자색 적용 중 — 더블클릭으로 해제";
      renderPreview(); autoSave();
    });
    el.addEventListener("dblclick", e => {
      const fieldKey = e.target.dataset.field;
      if (card.fieldStyles && card.fieldStyles[fieldKey]) {
        delete card.fieldStyles[fieldKey].color;
      }
      e.target.style.opacity = "0.45";
      e.target.title = "글자색 미적용 — 클릭해서 선택";
      renderPreview(); autoSave();

  });

  // 필드 리셋 ↺ — 해당 필드의 모든 스타일 제거 후 컨트롤 새로 그림
  body.querySelectorAll(".ff-reset").forEach(el => {
    el.addEventListener("click", e => {
      const fieldKey = e.currentTarget.dataset.field;
      if (card.fieldStyles) delete card.fieldStyles[fieldKey];
      renderEditor(); renderPreview(); autoSave();
    });
  });

  // 세부 조절 토글 ⚙
  body.querySelectorAll(".ff-adv").forEach(el => {
    el.addEventListener("click", e => {
      const fieldKey = e.currentTarget.dataset.field;
      const row = body.querySelector(`.field-adv-row[data-field="${fieldKey}"]`);

  const setFieldStyle = (fieldKey, prop, value) => {
    card.fieldStyles = card.fieldStyles || {};
    card.fieldStyles[fieldKey] = card.fieldStyles[fieldKey] || {};
    if (value === null || value === undefined) delete card.fieldStyles[fieldKey][prop];
    else card.fieldStyles[fieldKey][prop] = value;

  body.querySelectorAll(".ff-align").forEach(el => {

        setFieldStyle(e.target.dataset.field, prop, isDefault(v) ? null : v);

        if (valEl) valEl.textContent = fmt(e.target.value);
      });

  advBind("ff-weight", "weight", v => parseInt(v, 10), () => false, v => v);
  advBind("ff-lh", "lh", v => parseFloat(v), () => false, v => v);
  advBind("ff-ls", "ls", v => parseFloat(v), () => false, v => v);
  advBind("ff-opacity", "opacity", v => parseFloat(v), v => v >= 1, v => v);

  // ===== 오버레이 요소 (P5) =====
  const ovFind = id => (card.overlays || []).find(o => o.id === id);

    else if (t === "badge") Object.assign(o, { text: "NEW", size: 40, y: 30 });

    card.overlays.push(o);
    renderEditor(); renderPreview(); autoSave();

  });
  body.querySelectorAll(".ov-del").forEach(b => b.onclick = () => {

  });
  body.querySelectorAll(".ov-text-in").forEach(el => el.addEventListener("input", e => {

  body.querySelectorAll(".ov-size").forEach(el => el.addEventListener("input", e => {

  }));
  body.querySelectorAll(".ov-width").forEach(el => el.addEventListener("input", e => {
    const o = ovFind(e.target.dataset.ov); if (!o) return;
    o.w = +e.target.value;
    const lbl = body.querySelector(`.ov-width-val[data-ov="${e.target.dataset.ov}"]`);
    if (lbl) lbl.textContent = o.w + "%";
    renderPreview(); autoSave();
  }));
  // 이미지 오버레이 — 세로 길이(높이 %). 0이면 원본 비율(자동), 그 외면 컨테이너 height 고정 + object-fit:cover.
  body.querySelectorAll(".ov-height").forEach(el => el.addEventListener("input", e => {
    const o = ovFind(e.target.dataset.ov); if (!o) return;
    const v = +e.target.value;
    if (v <= 0) delete o.h; else o.h = v;
    const lbl = body.querySelector(`.ov-height-val[data-ov="${e.target.dataset.ov}"]`);
    if (lbl) lbl.textContent = v > 0 ? v + "%" : "자동";
    renderPreview(); autoSave();
  }));
  // 크롭 리셋 — 세로/이미지 위치 모두 초기화 (이미지가 컨테이너에 꽉 차게)
  body.querySelectorAll(".ov-crop-reset").forEach(b => b.onclick = () => {
    const o = ovFind(b.dataset.ov); if (!o) return;

    delete o.imgL; delete o.imgT; delete o.imgW;

    delete o.cx; delete o.cy; delete o.cropX; delete o.cropY;

  });
  body.querySelectorAll(".ov-color").forEach(el => {
    el.addEventListener("input", e => { const o = ovFind(e.target.dataset.ov); if (!o) return; o.color = e.target.value; e.target.style.opacity = "1"; renderPreview(); autoSave(); });

  body.querySelectorAll(".ov-bg").forEach(el => {
    el.addEventListener("input", e => { const o = ovFind(e.target.dataset.ov); if (!o) return; o.bg = e.target.value; e.target.style.opacity = "1"; renderPreview(); autoSave(); });

  });
  body.querySelectorAll(".ov-img-pick").forEach(b => b.onclick = () => openBgImagePicker(card, b.dataset.ov));

  body.querySelectorAll("[data-key]").forEach(el => {
    el.addEventListener("input", e => {

  body.querySelectorAll("[data-list-idx]").forEach(el => {

  body.querySelectorAll("[data-list-sub]").forEach(el => {

  body.querySelectorAll("[data-del-item]").forEach(el => {

  const addLi = document.getElementById("add-list-item");
  if (addLi) addLi.onclick = () => {

  };
  // desc
  body.querySelectorAll("[data-desc]").forEach(el => {
    el.addEventListener("input", e => {
      const [i, key] = e.target.dataset.desc.split(".");

  body.querySelectorAll("[data-del-desc]").forEach(el => {
    el.addEventListener("click", e => {

      renderEditor(); renderPreview(); autoSave();

  const addDesc = document.getElementById("add-desc");
  if (addDesc) addDesc.onclick = () => {
    if (!card.data.descItems) card.data.descItems = [];

  };
  // timeline
  body.querySelectorAll("[data-tl]").forEach(el => {
    el.addEventListener("input", e => {
      const [i, key] = e.target.dataset.tl.split(".");
      if (!card.data.timelineItems) card.data.timelineItems = [];
      if (!card.data.timelineItems[+i]) card.data.timelineItems[+i] = { label:"", content:"" };
      card.data.timelineItems[+i][key] = e.target.value;
      renderPreview(); autoSave();

  body.querySelectorAll("[data-del-tl]").forEach(el => {

      card.data.timelineItems.splice(+e.currentTarget.dataset.delTl, 1);

    });

  if (addTl) addTl.onclick = () => {
    if (!card.data.timelineItems) card.data.timelineItems = [];
    if (card.data.timelineItems.length >= 5) { toast("최대 5개 권장", "error"); return; }
    card.data.timelineItems.push({label:"", content:""}); renderEditor(); renderPreview(); autoSave();
  };

  // 모든 자동높이 textarea: 내용에 맞춰 높이 조절(1줄~여러 줄)
  body.querySelectorAll("textarea.ta-auto").forEach(t => {
    const fit = () => { t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 260) + "px"; };
    t.addEventListener("input", fit);
    fit();
  });
}

function updateAllCounters() {
  document.querySelectorAll("[data-counter]").forEach(c => {
    const key = c.dataset.counter;
    const limit = +c.dataset.limit;
    const el = document.querySelector(`[data-key="${key}"]`);
    if (!el) return;
    const len = (el.value || "").replace(/\n/g, "").length;
    c.textContent = `${len} / ${limit}`;
    c.classList.toggle("warn", len > limit * 0.85 && len <= limit);
    c.classList.toggle("over", len > limit);
  });
}

// ====================================================================
// 배경 이미지 휘도(luminance) 분석 — 토큰 0, 클라이언트 Canvas API
// 평균 휘도 ≥ 0.6 = 밝은 사진 → .bright-bg 클래스로 오버레이 1.5배 강화
//             ≥ 0.75 = 매우 밝음 → .very-bright-bg 로 이미지 자체도 brightness 0.75
// 같은 URL 은 메모리 캐시.
// ====================================================================
const _LUMA_CACHE = new Map();

function _measureLuma(url) {
  if (_LUMA_CACHE.has(url)) return Promise.resolve(_LUMA_CACHE.get(url));
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      try {
        // 다운샘플 (전체 픽셀 분석은 느림)
        const W = 60, H = 75; // 1080:1350 = 4:5
        const cv = document.createElement("canvas");
        cv.width = W; cv.height = H;
        const ctx = cv.getContext("2d");
        ctx.drawImage(img, 0, 0, W, H);
        const data = ctx.getImageData(0, 0, W, H).data;
        let sum = 0;
        const n = data.length / 4;
        for (let i = 0; i < data.length; i += 4) {
          // ITU-R BT.601 휘도 공식
          sum += (0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]) / 255;
        }
        const luma = sum / n;
        _LUMA_CACHE.set(url, luma);
        resolve(luma);
      } catch (e) {
        // CORS 거부 등 — 기본값(중간) 반환
        _LUMA_CACHE.set(url, 0.5);
        resolve(0.5);
      }
    };
    img.onerror = () => {
      _LUMA_CACHE.set(url, 0.5);
      resolve(0.5);
    };
    img.src = url;
  });
}

async function applyBgLuminance(scope) {
  scope = scope || document;
  const cards = scope.querySelectorAll(".card.has-bg-image");
  await Promise.all(Array.from(cards).map(async (cardEl) => {
    const layer = cardEl.querySelector(".bg-image-layer");
    if (!layer) return;
    // background-image URL 파싱
    const bgStyle = layer.style.backgroundImage || "";
    const m = bgStyle.match(/url\(["']?(.+?)["']?\)/);
    if (!m) return;
    const url = m[1];
    const luma = await _measureLuma(url);
    cardEl.classList.toggle("bright-bg", luma >= 0.6);
    cardEl.classList.toggle("very-bright-bg", luma >= 0.75);
    cardEl.dataset.luma = luma.toFixed(2);
  }));
}
window.applyBgLuminance = applyBgLuminance;

// ====================================================================
// html2canvas 캡처 전처리 헬퍼
// ====================================================================

// 렌더 영역 내 모든 <img>를 캡처 가능 상태로 준비:
//   1. 외부 직접 URL(https?://) → /img-proxy 경유로 교체 (CORS 없는 서버 대응)
//   2. CSS background-image 에도 동일 처리 (.bg-image-layer 등)
//   3. 모든 <img> 로드 완료까지 대기
async function _waitForImagesLoaded(root) {
  // <img src="https://..."> → <img src="/img-proxy?url=...">
  const waitFor = [];
  root.querySelectorAll("img").forEach(img => {
    const src = img.getAttribute("src") || "";
    if (!src) return;
    if (/^https?:\/\//i.test(src)) {
      img.src = `/img-proxy?url=${encodeURIComponent(src)}`;
      waitFor.push(new Promise(r => { img.onload = img.onerror = r; }));
    } else if (!img.complete) {
      waitFor.push(new Promise(r => { img.onload = img.onerror = r; }));
    }
  });
  // background-image:url("https://...") → url("/img-proxy?url=...")
  root.querySelectorAll("[style]").forEach(el => {
    const bi = el.style.backgroundImage;
    if (!bi) return;
    const m = bi.match(/url\(["']?(https?:\/\/[^"')]+)["']?\)/);
    if (!m) return;
    el.style.backgroundImage = `url('/img-proxy?url=${encodeURIComponent(m[1])}')`;
  });
  await Promise.all(waitFor);
}

// html2canvas 는 CSS var() inside rgba()/gradient 를 제대로 해석하지 못할 수 있음.
// 캡처 직전에 --bg-darken 값을 계산해 .bg-image-overlay 에 인라인 style 로 주입한다.
function _inlineBgOverlayForExport(cardEl) {
  const overlay = cardEl.querySelector(".bg-image-overlay");
  if (!overlay) return;
  const darkenStr = cardEl.style.getPropertyValue("--bg-darken");
  if (!darkenStr) return;
  const darken = Math.max(0, Math.min(1, parseFloat(darkenStr) || 0));
  const clamp = v => Math.min(1, Math.max(0, v));
  const r = v => +v.toFixed(4);
  const isBand = cardEl.classList.contains("bg-band");
  const isBright = cardEl.classList.contains("bright-bg");
  const isClosing = /\blo-closing-/.test(cardEl.className);
  if (isBand) {
    overlay.style.background = `rgba(0,0,0,${r(darken)})`;
  } else if (isBright) {
    overlay.style.background = `linear-gradient(180deg,rgba(0,0,0,${r(clamp(darken*0.85))}) 0%,rgba(0,0,0,${r(clamp(darken*1.5))}) 60%,rgba(0,0,0,${r(clamp(darken*1.7))}) 100%)`;
  } else if (isClosing) {
    overlay.style.background = [
      `radial-gradient(ellipse 70% 50% at center,rgba(0,0,0,${r(clamp(darken*0.4))}) 0%,rgba(0,0,0,0) 70%)`,
      `linear-gradient(180deg,rgba(0,0,0,${r(clamp(darken*0.5))}) 0%,rgba(0,0,0,${r(darken)}) 50%,rgba(0,0,0,${r(clamp(darken*1.1))}) 100%)`,
    ].join(",");
  } else {
    overlay.style.background = `linear-gradient(180deg,rgba(0,0,0,${r(clamp(darken*0.55))}) 0%,rgba(0,0,0,${r(darken)}) 60%,rgba(0,0,0,${r(clamp(darken*1.05))}) 100%)`;
  }
}
window._waitForImagesLoaded = _waitForImagesLoaded;
window._inlineBgOverlayForExport = _inlineBgOverlayForExport;

// ====================================================================
async function openBgImagePicker(card, overlayId) {
  const clusterId = STATE.meta && STATE.meta.cluster_id;
  const back = document.createElement("div");
  back.className = "modal-backdrop";
  back.innerHTML = `
    <div class="modal" style="max-width:760px">
      <div class="modal-header">
        <h2>🖼 배경 이미지 선택</h2>
        <button class="close">×</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <input type="text" id="bg-img-q" placeholder="키워드로 이미지 검색 (예: 인공지능, 도시, 코딩)" style="flex:1;padding:9px 10px;border:1px solid var(--c-line,#e3e7ef);border-radius:6px">
          <button class="btn primary" id="bg-img-search">🔎 검색</button>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <input type="text" id="bg-img-url" placeholder="또는 이미지 URL 직접 붙여넣기" style="flex:1;padding:9px 10px;border:1px solid var(--c-line,#e3e7ef);border-radius:6px">
          <button class="btn" id="bg-img-url-apply">URL 적용</button>
        </div>
        <div id="bg-img-upload-drop" style="display:flex;gap:6px;margin-bottom:6px;align-items:center;padding:10px 12px;border:1.5px dashed var(--c-line,#e3e7ef);border-radius:6px;background:rgba(110,231,255,0.03);cursor:pointer;transition:border-color .15s">
          <input type="file" id="bg-img-upload-input" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
          <span style="font-size:18px">📁</span>
          <span style="flex:1;font-size:12px"><b>내 컴퓨터에서 업로드</b> — 클릭 또는 끌어다 놓기 <span style="color:var(--text-faint)">(png/jpg/webp/gif, 최대 12MB)</span></span>
          <button type="button" class="btn" id="bg-img-upload-pick" style="font-size:11px;padding:5px 10px">파일 선택</button>
        </div>
        <p class="intro" style="font-size:11px;color:var(--text-faint);margin:4px 0">${clusterId ? "이 클러스터 기사에서 모은 이미지입니다. 또는 키워드로 검색하거나 직접 업로드하세요." : "키워드로 이미지를 검색하거나, URL을 붙여넣거나, 직접 업로드하세요. (Openverse·Wikipedia 무료, 키 있으면 Unsplash 포함)"}</p>
        <div id="bg-img-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px;min-height:180px"></div>
      </div>
    </div>`;
  document.body.appendChild(back);
  const close = () => back.remove();
  back.querySelector(".close").onclick = close;
  back.addEventListener("click", e => { if (e.target === back) close(); });

  const grid = back.querySelector("#bg-img-grid");

  // 외부 URL 은 프록시 경유로 저장 (html2canvas CORS 안전). 기존 밴드/위치 설정은 보존.
  const applyUrl = (rawUrl, extra) => {
    if (!rawUrl) return;
    let url = rawUrl;
    if (/^https?:\/\//i.test(rawUrl) && !rawUrl.includes("/img-proxy") && !rawUrl.includes("/uploads/")) {
      url = `/img-proxy?url=${encodeURIComponent(rawUrl)}`;
    }
    if (overlayId) {
      // 오버레이 이미지 요소에 적용
      const o = (card.overlays || []).find(x => x.id === overlayId);
      if (o) { o.url = url; o.original = rawUrl; }
    } else {
      // 카드 배경에 적용 (기존 밴드/위치 설정 보존)
      const prev = card.data.bgImage || {};
      card.data.bgImage = Object.assign({}, prev, {
        url,
        original: rawUrl,
        darken: (typeof prev.darken === "number" ? prev.darken : 55),
      }, extra || {});
    }
    close(); renderEditor(); renderPreview(); autoSave();
    toast("✓ 이미지 적용", "success");
  };

  const loading = (msg) => { grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:20px"><span class="spinner"></span> ${esc(msg)}</div>`; };

  const showItems = (items) => {
    if (!items || !items.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:20px">결과가 없습니다. 다른 키워드로 검색해 보세요.</div>`;
      return;
    }
    grid.innerHTML = "";
    items.forEach(img => {
      const el = document.createElement("button");
      el.style.cssText = "padding:0;border:2px solid transparent;border-radius:6px;background:#000;cursor:pointer;aspect-ratio:1080/1350;overflow:hidden;position:relative";
      el.innerHTML = `
        <img src="${esc(img.proxy_url || img.url)}" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy" onerror="this.style.opacity=0.2;this.parentElement.style.background='#333'">
        <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);color:#fff;font-size:10px;text-align:left">${esc((img.source || "").replace("og_image","og:image"))}${img.credit ? " · " + esc(img.credit) : ""}</div>`;
      el.onmouseenter = () => el.style.borderColor = "var(--accent,#6ee7ff)";
      el.onmouseleave = () => el.style.borderColor = "transparent";
      el.onclick = () => applyUrl(img.proxy_url || img.url, { original: img.url, source: img.source });
      grid.appendChild(el);
    });
  };

  const doSearch = async (q) => {
    q = (q || "").trim();
    if (!q) return;
    loading("이미지 검색 중…");
    try {
      const r = await fetch(`/api/image-search?q=${encodeURIComponent(q)}&n=18`);
      const j = await r.json();
      if (!r.ok || j.error) throw new Error(j.error || `HTTP ${r.status}`);
      showItems(j.images || []);
    } catch (e) {
      grid.innerHTML = `<div style="grid-column:1/-1;color:var(--danger,#e11);padding:20px">검색 실패: ${esc(e.message)}</div>`;
    }
  };

  back.querySelector("#bg-img-search").onclick = () => doSearch(back.querySelector("#bg-img-q").value);
  back.querySelector("#bg-img-q").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); doSearch(e.target.value); } });
  back.querySelector("#bg-img-url-apply").onclick = () => applyUrl(back.querySelector("#bg-img-url").value.trim());
  back.querySelector("#bg-img-url").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); applyUrl(e.target.value.trim()); } });

  // 파일 직접 업로드 — 배경 업로드 라우트(/api/uploads/bg/<sid>) 재사용. 결과 URL 은 /uploads/ 로
  // 시작하므로 applyUrl 에서 외부 프록시를 우회하고 그대로 사용된다.
  const upDrop   = back.querySelector("#bg-img-upload-drop");
  const upInput  = back.querySelector("#bg-img-upload-input");
  const upPick   = back.querySelector("#bg-img-upload-pick");
  const uploadFile = async (f) => {
    if (!f) return;
    if (!/^image\//.test(f.type)) { toast("이미지 파일만 업로드할 수 있어요", "warning"); return; }
    const sid = (typeof getUploadSessionId === "function") ? getUploadSessionId() : ("studio_" + Date.now().toString(36));
    const fd = new FormData(); fd.append("file", f);
    const origPickText = upPick ? upPick.textContent : "";
    if (upPick) { upPick.disabled = true; upPick.textContent = "업로드 중…"; }
    const pt = (typeof persistentToast === "function") ? persistentToast("⏳ 이미지 업로드 중…", "info") : null;
    try {
      const r = await fetch(`/api/uploads/bg/${sid}`, { method: "POST", body: fd });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || `HTTP ${r.status}`);
      if (pt) pt.remove();
      applyUrl(j.url); // 모달 자동 닫힘 + 카드/오버레이 적용
    } catch (err) {
      if (pt) pt.remove();
      toast("업로드 실패: " + err.message, "error", 6000);
    } finally {
      if (upPick) { upPick.disabled = false; upPick.textContent = origPickText; }
      if (upInput) upInput.value = "";
    }
  };
  if (upPick)  upPick.onclick  = (e) => { e.stopPropagation(); upInput && upInput.click(); };
  if (upDrop)  upDrop.onclick  = () => upInput && upInput.click();
  if (upInput) upInput.addEventListener("change", () => uploadFile(upInput.files && upInput.files[0]));
  if (upDrop) {
    upDrop.addEventListener("dragover",  e => { e.preventDefault(); upDrop.style.borderColor = "var(--accent, #6ee7ff)"; });
    upDrop.addEventListener("dragleave", () => { upDrop.style.borderColor = ""; });
    upDrop.addEventListener("drop", e => {
      e.preventDefault(); upDrop.style.borderColor = "";
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) uploadFile(f);
    });
  }

  // 초기 로드: 클러스터 기사 이미지가 있으면 자동 표시, 없으면 검색 안내
  if (clusterId) {
    loading("기사 이미지 불러오는 중…");
    try {
      const r = await fetch(`/api/article-images?cluster_id=${clusterId}`);
      const j = await r.json();
      showItems(j.images || []);
    } catch (e) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:20px">기사 이미지 로드 실패. 위에서 키워드로 검색하세요.</div>`;
    }
  } else {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:30px">위 검색창에 키워드를 입력하거나 이미지 URL을 붙여넣으세요.</div>`;
  }
}

// ====================================================================
// 큰 숫자 자동 피팅 — .lo-highlight-stat .stat 가 한 줄에 들어오게 폰트 축소
// 호출 위치: renderPreview, exportAll 루프, server.py BOT_INTEGRATION 스크립트
// 함수는 window.autofitStat 으로도 노출 (인젝션 스크립트가 외부에서 호출).
// ====================================================================
function autofitStat(scope) {
  scope = scope || document;
  scope.querySelectorAll(".lo-highlight-stat").forEach(card => {
    const inner = card.querySelector(".card-inner");
    const stat = card.querySelector(".stat");
    const unit = card.querySelector(".stat-unit");
    if (!inner || !stat) return;

    // 초기화 (재호출 대비)
    stat.style.fontSize = "";
    if (unit) unit.style.fontSize = "";

    // span 자체에 nowrap + overflow-wrap normal — 줄바꿈 절대 안 일어나게.
    // 글로벌 .card * { overflow-wrap: anywhere } 를 이 두 element만 무력화.
    stat.style.whiteSpace = "nowrap";
    stat.style.overflowWrap = "normal";
    if (unit) {
      unit.style.whiteSpace = "nowrap";
      unit.style.overflowWrap = "normal";
    }

    const baseStat = parseFloat(getComputedStyle(stat).fontSize) || 380;
    const baseUnit = unit ? (parseFloat(getComputedStyle(unit).fontSize) || 80) : 0;

    // card-inner.clientWidth 는 padding 포함. 실제 사용 가능 폭 계산.
    const cs = getComputedStyle(inner);
    const padL = parseFloat(cs.paddingLeft) || 0;
    const padR = parseFloat(cs.paddingRight) || 0;
    const avail = inner.clientWidth - padL - padR - 8;
    if (avail <= 0) return;

    // 두 span 의 실제 렌더 폭 합 (nowrap 상태이므로 자연 폭).
    const measure = () => stat.offsetWidth + (unit ? unit.offsetWidth : 0);

    let size = baseStat;
    let safety = 40;
    while (measure() > avail && size > 80 && safety-- > 0) {
      size -= 12;
      stat.style.fontSize = size + "px";
      if (unit) unit.style.fontSize = (baseUnit * size / baseStat) + "px";
    }
  });
}
window.autofitStat = autofitStat;

function addCard(type) {
  const card = { id: uid(), type, layout: LAYOUTS[type][0].id, data: DEFAULTS[type]() };
  STATE.cards.push(card);
  STATE.activeId = card.id;
  renderAll(); autoSave();
}

function selectCard(id) { STATE.activeId = id; renderAll(); }

function deleteCard(id) {
  const idx = STATE.cards.findIndex(c => c.id === id);
  if (idx === -1) return;
  STATE.cards.splice(idx, 1);
  if (STATE.activeId === id) {
    STATE.activeId = STATE.cards[Math.max(0, idx - 1)]?.id || null;
  }
  renderAll(); autoSave();
}

function duplicateCard(id) {
  const idx = STATE.cards.findIndex(c => c.id === id);
  if (idx === -1) return;
  const orig = STATE.cards[idx];
  const dup = { id: uid(), type: orig.type, layout: orig.layout, data: JSON.parse(JSON.stringify(orig.data)) };
  STATE.cards.splice(idx + 1, 0, dup);
  STATE.activeId = dup.id;
  renderAll(); autoSave();
}

function moveCard(fromId, toId) {
  if (fromId === toId) return;
  const from = STATE.cards.findIndex(c => c.id === fromId);
  if (from === -1) return;
  const [moved] = STATE.cards.splice(from, 1);
  const to = STATE.cards.findIndex(c => c.id === toId);
  STATE.cards.splice(to, 0, moved);
  renderAll(); autoSave();
}

async function changeLayout(cardId, newLayout, chipEl) {
  const card = STATE.cards.find(c => c.id === cardId);
  if (!card || card.layout === newLayout) return;
  const oldFields = LAYOUT_FIELDS[`${card.type}/${card.layout}`];
  const newFields = LAYOUT_FIELDS[`${card.type}/${newLayout}`];
  const needsAI = newFields.some(f => !oldFields.includes(f));

  if (!needsAI) {
    card.layout = newLayout;
    renderAll(); autoSave();
    return;
  }

  // AI 호출 필요
  if (chipEl) chipEl.classList.add("loading");
  showPreviewLoading("AI가 새 레이아웃에 맞게 내용 재배치 중...");
  try {
    const newData = await aiAdaptLayout(card, newLayout);
    card.layout = newLayout;
    card.data = newData;
    autoSave();
    renderAll();
    toast("✓ 레이아웃이 새 구조로 재배치됐어요", "success");
  } catch (err) {
    toast("재배치 실패: " + err.message, "error");
    // 그래도 레이아웃은 바꿔주기 (사용자가 수동 수정 가능)
    card.layout = newLayout;
    renderAll();
  } finally {
    hidePreviewLoading();
    if (chipEl) chipEl.classList.remove("loading");
  }
}

function setTheme(t) {
  STATE.theme = t;
  applyTheme(t);
  document.querySelectorAll(".theme-chip").forEach(el => {
    el.classList.toggle("active", el.dataset.theme === t);
  });
  document.getElementById("preview-scaler").className = `preview-scaler theme-${t}`;
  document.getElementById("render-area").className = `render-area theme-${t}`;
  autoSave();
}

  renderCardList(); renderEditor(); renderPreview(); renderTabs();
}

async function exportAll() {
  if (STATE.cards.length === 0) { toast("내보낼 카드가 없습니다", "error"); return; }
  const btn = document.getElementById("btn-export");
  const orig = btn.textContent;
  btn.disabled = true;
  const zip = new JSZip();
  const renderArea = document.getElementById("render-area");
  renderArea.className = `render-area theme-${STATE.theme}`;
  for (let i = 0; i < STATE.cards.length; i++) {
    const card = STATE.cards[i];
    btn.textContent = `🎨 ${i + 1} / ${STATE.cards.length}`;
    renderArea.innerHTML = renderCard(card, i + 1, STATE.cards.length);
    await new Promise(r => setTimeout(r, 120));
    autofitStat(renderArea);
    // 배경 이미지가 있으면 휘도 분석 완료까지 대기 (밝은 배경 자동 감지)
    await applyBgLuminance(renderArea);
    // 이미지 로드 완료 대기 + CSS var() gradient 인라인 치환 (html2canvas 대응)
    await _waitForImagesLoaded(renderArea);
    const cardEl = renderArea.querySelector(".card");
    if (cardEl) _inlineBgOverlayForExport(cardEl);
    const canvas = await html2canvas(cardEl, { width:1080, height:1350, scale:1, useCORS:true, backgroundColor:null });
    const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
    const num = String(i + 1).padStart(2, "0");
    zip.file(`cardnews-${num}-${card.type}-${card.layout}.png`, blob);
  }
  btn.textContent = "📦 ZIP 생성 중...";
  const zipBlob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement("a");
  const today = new Date().toISOString().slice(0, 10);
  a.href = url; a.download = `cardnews_${today}.zip`; a.click();
  URL.revokeObjectURL(url);
  renderArea.innerHTML = "";
  btn.disabled = false;
  btn.textContent = orig;
  toast(`✓ ${STATE.cards.length}장 다운로드 완료`, "success");
}

// 발행 미리보기 — 실제 html2canvas 파이프라인으로 렌더한 결과를 모달에 표시

async function openPublishPreview() {
  if (STATE.cards.length === 0) { toast("미리볼 카드가 없습니다", "error"); return; }
  const btn = document.getElementById("btn-preview-publish");
  const orig = btn ? btn.textContent : "";
  if (btn) { btn.disabled = true; btn.textContent = "🔄 렌더링 중…"; }

  const renderArea = document.getElementById("render-area");
  renderArea.className = `render-area theme-${STATE.theme}`;
  const blobs = [];

  try {
    for (let i = 0; i < STATE.cards.length; i++) {

// 인스타 스토리 요약 카드 (여러 카드 → 1장, 하이라이트 보관용)
// ====================================================================
function cardPlainText(card) {
  const d = card.data || {};
  const out = [];
  const push = v => { if (typeof v === "string") { const s = v.replace(/\s*\n\s*/g, " ").trim(); if (s) out.push(s); } };
  const SKIP = new Set(["bgImage", "number", "account", "hashtag", "pron", "badge", "eyebrow"]);
  for (const k of Object.keys(d)) {
    if (SKIP.has(k)) continue;
    const v = d[k];
    if (typeof v === "string") push(v);
    else if (Array.isArray(v)) v.forEach(it => {
      if (typeof it === "string") push(it);
      else if (it && typeof it === "object") { push(it.title); push(it.desc); push(it.label); push(it.content); }
    });
  }
  return out.join(" · ");
}

function buildCardsCorpus() {
  return STATE.cards
    .map((c, i) => `[${i + 1}. ${TYPE_LABEL[c.type] || c.type}] ${cardPlainText(c)}`)
    .filter(line => line.replace(/\[[^\]]*\]/, "").trim())
    .join("\n");
}

async function summarizeToStory() {
  const corpus = buildCardsCorpus();
  const system = `당신은 인스타그램 스토리용 '1장 요약'을 만드는 카피라이터입니다. 여러 장의 카드뉴스를 단 1장으로 압축합니다. 인스타 스토리에 올려 하이라이트에 보관하는 용도라, 한눈에 핵심이 읽혀야 합니다.

규칙:
- title: 전체를 관통하는 핵심 헤드라인. 20자 이내. 임팩트 있게. 너무 길면 자연스러운 곳에서 \\n 한 번으로 2줄.
- points: 핵심 포인트 **6~8개** (내용이 많으면 8개까지 꽉 채워라). 각 28자 이내. 카드 순서대로 원문의 핵심 정보를 **하나도 빠뜨리지 말고** 최대한 많이 담아라. 명사형/체언 종결로 통일하되, 정보 손실보다 약간 길어지는 게 낫다.
- cta: 한 줄 행동유도(선택, 없으면 빈 문자열). 예: "자세한 내용은 피드에서". 14자 이내.
- 과장·이모지 금지, 원문 사실에 근거. 원문에 없는 숫자를 지어내지 말 것.
- 카드가 적어 내용이 부족하면 무리하게 늘리지 말고 있는 핵심만 정확히.

오직 JSON만 출력(마크다운 금지):
{"title":"...","points":["...","...","...","...","...","..."],"cta":"..."}`;
  const user = `브랜드: ${STATE.brand.name} (${STATE.brand.handle})\n\n아래 ${STATE.cards.length}장 카드뉴스를 스토리 1장으로 요약해줘. 빈 공간 없이 최대한 많은 핵심을 담아줘:\n\n${corpus}`;
  const raw = await callClaude(system, user, 1100);
  const parsed = extractJSON(raw);
  return {
    title: (parsed.title || "").trim(),
    points: Array.isArray(parsed.points) ? parsed.points.map(p => String(p).trim()).filter(Boolean).slice(0, 8) : [],
    cta: (parsed.cta || "").trim(),
  };
}

function renderStoryCard(data, opts) {
  const t = THEMES[opts.theme] || THEMES.navy;
  const c = opts.mode === "light" ? t.light : t.bold;
  const st = (opts && opts.style) || {};
  const isHex = v => typeof v === "string" && /^#[0-9a-f]{3,8}$/i.test(v);
  const v = [
    `--s-bg:${c.bg}`, `--s-text:${c.text}`, `--s-sub:${c.sub}`,
    `--s-accent:${isHex(st.accent) ? st.accent : c.accent}`, `--s-line:${c.line}`,
    `--s-fit:1`,
    `--u-title:${(typeof st.titleScale === "number" && st.titleScale > 0) ? st.titleScale : 1}`,
    `--u-points:${(typeof st.pointsScale === "number" && st.pointsScale > 0) ? st.pointsScale : 1}`,
  ];
  if (isHex(st.titleColor)) v.push(`--s-title-color:${st.titleColor}`);
  if (isHex(st.pointsColor)) v.push(`--s-tx-color:${st.pointsColor}`);
  const vars = v.join(";");
  const title = esc(data.title || "").replace(/\n/g, "<br>");
  const points = (data.points || [])
    .filter(p => String(p).trim())
    .map((p, i) => `<div class="s-point"><div class="s-n">${i + 1}</div><div class="s-tx">${esc(p)}</div></div>`)
    .join("");
  const brandName = esc(STATE.brand.name || "");
  const handle = esc(STATE.brand.handle || "");
  const cta = data.cta && data.cta.trim() ? `<div class="s-cta">${esc(data.cta)} →</div>` : "";
  return `<div class="story-card" style="${vars}">
    <div class="s-top"><span class="s-tag">SUMMARY</span><span class="s-brand">${brandName}</span></div>
    <h2 class="s-headline">${title || "요약 제목"}</h2>
    <div class="s-rule"></div>
    <div class="s-points">${points}</div>
    <div class="s-foot"><div class="s-handle">${handle}</div>${cta}</div>
  </div>`;
}

// 카드 높이에 맞춰 본문이 빈 공간 없이 꽉 차도록 자동 배율(--s-fit) 탐색
function fitStoryCard(el) {
  if (!el) return;
  const pts = el.querySelector(".s-points");
  if (!pts) return;
  const prevFlex = pts.style.flex;
  pts.style.flex = "0 0 auto"; // 자연 높이로 측정
  const fits = (k) => {
    el.style.setProperty("--s-fit", k);
    void el.offsetHeight; // 강제 reflow
    return el.scrollHeight <= el.clientHeight;
  };
  let lo = 0.55, hi = 1.6, best = lo;
  // hi 가 이미 맞으면 그대로(콘텐츠 매우 적음)
  if (fits(hi)) { best = hi; }
  else {
    for (let i = 0; i < 16; i++) {
      const mid = (lo + hi) / 2;
      if (fits(mid)) { best = mid; lo = mid; } else { hi = mid; }
    }
  }
  el.style.setProperty("--s-fit", best);
  pts.style.flex = prevFlex || ""; // 복원 → 남는 미세 공간은 균등 배치
}

function ensureStoryRenderArea() {
  let area = document.getElementById("story-render-area");
  if (!area) {
    area = document.createElement("div");
    area.id = "story-render-area";
    area.className = "story-render-area";
    document.body.appendChild(area);
  }
  return area;
}

async function downloadStoryPng(data, opts, btn) {
  const area = ensureStoryRenderArea();
  area.innerHTML = renderStoryCard(data, opts);
  await new Promise(r => setTimeout(r, 150));
  const el = area.querySelector(".story-card");
  if (!opts.style || opts.style.autofit !== false) fitStoryCard(el);
  const canvas = await html2canvas(el, { width: 1080, height: 1920, scale: 1, useCORS: true, backgroundColor: null });
  const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = new Date().toISOString().slice(0, 10);
  a.href = url; a.download = `story_summary_${today}.png`; a.click();
  URL.revokeObjectURL(url);
  area.innerHTML = "";
}

// ====================================================================
function setupImageUpload(modalEl, imagesRef) {
  const area = modalEl.querySelector("#upload-area");
  const input = modalEl.querySelector("#image-input");
  const btn = modalEl.querySelector("#upload-btn");
  const listEl = modalEl.querySelector("#upload-list");

  btn.onclick = () => input.click();
  input.onchange = e => handleFiles(e.target.files, imagesRef, listEl);

  area.addEventListener("dragover", e => { e.preventDefault(); area.classList.add("dragging"); });
  area.addEventListener("dragleave", e => { area.classList.remove("dragging"); });
  area.addEventListener("drop", e => {
    e.preventDefault();
    area.classList.remove("dragging");
    handleFiles(e.dataTransfer.files, imagesRef, listEl);
  });
}

async function handleFiles(fileList, imagesRef, listEl) {
  const MAX_IMAGES = 10;
  const arr = Array.from(fileList);
  const remaining = MAX_IMAGES - imagesRef.length;
  if (remaining <= 0) {
    toast(`이미지는 최대 ${MAX_IMAGES}장까지 첨부할 수 있어요`, "error");
    return;
  }
  if (arr.length > remaining) {
    toast(`${MAX_IMAGES}장 한도로 처음 ${remaining}장만 추가됩니다`, "error");
  }
  for (const file of arr.slice(0, remaining)) {
    if (!file.type.startsWith("image/")) {
      toast(`${file.name}: 이미지 파일이 아니에요`, "error");
      continue;
    }
    try {
      const { base64, mediaType } = await processImageFile(file);
      imagesRef.push({
        name: file.name,
        base64,
        mediaType,
        preview: `data:${mediaType};base64,${base64}`,
      });
      renderImageList(imagesRef, listEl);
    } catch (err) {
      toast(`${file.name} 처리 실패: ${err.message}`, "error");
    }
  }
}

function renderImageList(images, listEl) {
  listEl.innerHTML = "";
  images.forEach((img, i) => {
    const thumb = document.createElement("div");
    thumb.className = "upload-thumb";
    thumb.innerHTML = `
      <img src="${img.preview}" alt="${esc(img.name)}">
      <button class="remove" title="제거">×</button>
      <div class="name">${esc(img.name)}</div>`;
    thumb.querySelector(".remove").onclick = () => {
      images.splice(i, 1);
      renderImageList(images, listEl);
    };
    listEl.appendChild(thumb);
  });
}

async function processImageFile(file) {
  // 4MB 초과면 압축
  const needsCompress = file.size > 4 * 1024 * 1024;
  const blob = needsCompress ? await compressImage(file) : file;
  const mediaType = needsCompress ? "image/jpeg" : (file.type || "image/jpeg");
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const base64 = e.target.result.split(",")[1];
      resolve({ base64, mediaType });
    };
    reader.onerror = () => reject(new Error("파일 읽기 실패"));
    reader.readAsDataURL(blob);
  });
}

function compressImage(file, maxDim = 1600) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ratio = Math.min(maxDim / img.width, maxDim / img.height, 1);
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error("압축 실패")), "image/jpeg", 0.85);
    };
    img.onerror = () => reject(new Error("이미지 로드 실패"));
    img.src = URL.createObjectURL(file);
  });
}

// ====================================================================
// 저장/불러오기
// ====================================================================
// ---- 실행취소(Ctrl+Z) — '탭(프로젝트)별' 스택. 탭마다 자기 히스토리만 되돌림 ----
// (전역 단일 스택이면 탭 전환 시 다른 프로젝트 상태로 덮어쓰는 치명 버그 발생 → 프로젝트 id 로 버킷 분리)
const _undoStacks = {};      // pid -> [스냅샷...]
const _undoLast = {};        // pid -> 마지막 커밋 스냅샷
let _undoRestoring = false;  // 복원 중에는 스냅샷 누적 안 함
const _UNDO_MAX = 60;
function _undoPid() { return (typeof WORKSPACE !== "undefined" && WORKSPACE.activeId) ? WORKSPACE.activeId : "_"; }
function _undoSnap() {
  return JSON.stringify({ theme: STATE.theme, brand: STATE.brand, cards: STATE.cards, activeId: STATE.activeId, meta: STATE.meta });
}

function autoSave() {
  syncStateToProject();
  try {
    localStorage.setItem(LS_WS_KEY, JSON.stringify(WORKSPACE));
  } catch (err) {
    // 저장공간 초과 등 — 탭 수/카드 수가 많을 때
    console.warn("autoSave 실패:", err);
    toast("⚠️ 자동저장 실패(저장공간 초과 가능). 일부 탭을 파일로 저장 후 닫아주세요.", "error");
  }
  // 변경 직전 상태를 '현재 탭' 버킷에만 누적
  if (!_undoRestoring) {
    const pid = _undoPid();
    const cur = _undoSnap();
    if (_undoLast[pid] !== undefined && _undoLast[pid] !== cur) {
      (_undoStacks[pid] || (_undoStacks[pid] = [])).push(_undoLast[pid]);
      if (_undoStacks[pid].length > _UNDO_MAX) _undoStacks[pid].shift();
    }
    _undoLast[pid] = cur;
  }
}

// Ctrl+Z — 직전 액션 1단계 되돌리기 (현재 탭의 히스토리에서만)
function undoLastAction() {
  const pid = _undoPid();
  const stack = _undoStacks[pid];
  if (!stack || !stack.length) { if (typeof toast === "function") toast("더 되돌릴 작업이 없어요", "info"); return; }
  const prev = stack.pop();
  _undoRestoring = true;
  try {
    const s = JSON.parse(prev);
    STATE.theme = s.theme; STATE.brand = s.brand; STATE.cards = s.cards;
    STATE.activeId = s.activeId; STATE.meta = s.meta;
    _undoLast[pid] = prev;       // 복원된 상태가 곧 현재 커밋 상태
    SEL = null;                  // 선택은 무효화될 수 있으므로 해제
    syncStateToProject();
    try { localStorage.setItem(LS_WS_KEY, JSON.stringify(WORKSPACE)); } catch (e) {}
    if (typeof setTheme === "function") setTheme(STATE.theme);
    renderCardList(); renderEditor(); renderPreview();
  } finally {
    _undoRestoring = false;
  }
  if (typeof toast === "function") toast("↩ 실행취소", "success");
}

// 옛 기본 브랜드값을 새 기본값으로 한 번 올려줌(사용자가 직접 바꾼 값은 건드리지 않음)
const _OLD_BRAND_NAME = "AI ACADEMY SUPPORTERS";
const _OLD_BRAND_HANDLE = "@your_account";
const _NEW_BRAND_NAME = "인공지능사관학교 서포터즈";
const _NEW_BRAND_HANDLE = "@dailysync_ai";
function migrateProjectBrand(p) {
  if (!p) return;
  if (p.brand && typeof p.brand === "object") {
    if (p.brand.name === _OLD_BRAND_NAME) p.brand.name = _NEW_BRAND_NAME;
    if (p.brand.footer === _OLD_BRAND_NAME) p.brand.footer = _NEW_BRAND_NAME;
    if (p.brand.handle === _OLD_BRAND_HANDLE) p.brand.handle = _NEW_BRAND_HANDLE;
  }
  (p.cards || []).forEach(c => {
    if (!c || !c.data) return;
    if (c.data.account === _OLD_BRAND_HANDLE) c.data.account = _NEW_BRAND_HANDLE;
    if (c.data.eyebrow === _OLD_BRAND_NAME) c.data.eyebrow = _NEW_BRAND_NAME;
    if (c.data.footer === _OLD_BRAND_NAME) c.data.footer = _NEW_BRAND_NAME;
  });
}

function tryRestore() {
  // 1) 멀티 프로젝트 워크스페이스 복원
  const rawWs = localStorage.getItem(LS_WS_KEY);
  if (rawWs) {
    try {
      const ws = JSON.parse(rawWs);
      if (ws && Array.isArray(ws.projects) && ws.projects.length) {
        WORKSPACE.projects = ws.projects;
        WORKSPACE.projects.forEach(migrateProjectBrand);
        WORKSPACE.activeId = (ws.activeId && ws.projects.some(p => p.id === ws.activeId))
          ? ws.activeId : ws.projects[0].id;
        loadProjectToState(activeProject());
        return true;
      }
    } catch {}
  }
  // 2) (구) 단일 세션 → 프로젝트 1개로 마이그레이션
  const rawOld = localStorage.getItem(LS_KEY);
  if (rawOld) {
    try {
      const p = JSON.parse(rawOld);
      const proj = blankProjectData("카드뉴스 1");
      proj.theme = p.theme || "navy";
      proj.brand = p.brand || proj.brand;
      proj.cards = p.cards || [];
      proj.activeId = p.activeId || (proj.cards[0]?.id ?? null);
      proj.lastSourceText = p.lastSourceText || "";
      migrateProjectBrand(proj);
      WORKSPACE.projects = [proj];
      WORKSPACE.activeId = proj.id;
      loadProjectToState(proj);
      return true;
    } catch {}
  }
  return false;
}

  document.getElementById("btn-story").onclick = openStorySummaryModal;
  document.getElementById("btn-polish").onclick = openPolishModal;

  tryRestore();
  ensureAtLeastOneProject();
  setTheme(STATE.theme);
  renderTabs();
  renderAll();
  setPreviewZoom(0.42);

  // 봇 연동 스크립트(server.py 인젝션)가 init 완료 후 세션을 새 탭으로 열 수 있도록 신호
  window.__studioReady = true;
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
