# 인스타용 AI 툴 활용법 주제 풀.
# - tool: 도구 카테고리 식별자 (영어 소문자)
# - label: 사람이 읽는 라벨
# - subtopics: 해당 도구에서 다룰 세부 주제 리스트
#
# 게시 잡은 (오늘 KST 날짜의 ordinal % len(pool)) 으로 deterministic 하게 선택.
# 30일 안에 같은 (tool, subtopic) 재출연 회피. 추가는 끝에 append.
#
# 특수문자(@, --, ", : 등)로 시작하는 항목은 따옴표로 감싸야 함.

- tool: chatgpt
  label: ChatGPT
  subtopics:
    - 역할 부여 프롬프트로 답변 톤·전문성 끌어올리기
    - 출력 형식을 표·체크리스트·JSON으로 강제하는 법
    - 긴 문서 요약 시 단계별로 시키면 안 되는 이유
    - few-shot 예시 1~2개로 출력 품질 두 배 만들기
    - 같은 질문을 다른 페르소나로 3번 묻고 합치기
    - 이미지 업로드 후 표를 마크다운으로 변환하는 패턴
    - 음성 모드로 출퇴근길 영어 회화 30분
    - 시스템 메시지에 금지 규칙 넣어 환각 줄이기

- tool: claude
  label: Claude
  subtopics:
    - Projects 기능으로 컨텍스트 재사용하기
    - Artifacts로 코드·문서 우측 패널에서 바로 편집
    - 긴 컨텍스트(200K) 활용 — PDF 통째로 분석
    - '"단계별로 생각하기"보다 "사실과 가정을 분리해서" 가 효과적'
    - 헌법적 AI — 거절될 만한 요청을 우회하는 정당한 방식

- tool: cursor
  label: Cursor
  subtopics:
    - Cmd+K 인라인 편집 — 함수 안에서 부분 수정 지시
    - "@-mention 으로 특정 파일·심볼만 컨텍스트에 넣기"
    - ".cursorrules 로 프로젝트 규칙을 모델에 강제"
    - Tab 자동완성 비활성 시점 — 집중력 방어
    - 디버그 모드에서 스택트레이스 붙여넣고 원인 묻기

- tool: midjourney
  label: Midjourney
  subtopics:
    - "--ar, --s, --c 파라미터 한눈 정리"
    - "같은 인물 일관성 유지 — --cref 사용법"
    - 사진처럼 자연스러운 결과 — 부정 프롬프트 활용
    - 한국적 모티프 잘 뽑는 키워드 7가지

- tool: notebooklm
  label: NotebookLM
  subtopics:
    - PDF 10개 넣고 자동 팟캐스트 생성하기
    - 출처 표시 — 환각 검증의 가장 빠른 방법
    - 학습노트 자동화 — 강의 자료를 Q&A 카드로

- tool: perplexity
  label: Perplexity
  subtopics:
    - Pro Search 와 일반 검색의 차이
    - Focus 모드로 학술·뉴스·소셜 출처 좁히기
    - Spaces 로 주제별 컨텍스트 보존

- tool: gemini
  label: Gemini
  subtopics:
    - Google 워크스페이스 연동 — Gmail·Drive 자동 검색
    - 2M 토큰 컨텍스트로 영상 전체 분석
    - Deep Research — 30분 자료 조사 자동화

- tool: workflow
  label: 워크플로우 활용
  subtopics:
    - 회의록 흐름 — Otter 받아쓰기에서 Claude 요약, Notion 자동 저장
    - 블로그 1주 1편 — 주제 발굴부터 교정까지 분업
    - 기획서 만들기 — 마인드맵 → 슬라이드 → 디자인 자동화
    - 코딩 입문 — Cursor 와 Claude 로 첫 프로젝트 1주 안에
