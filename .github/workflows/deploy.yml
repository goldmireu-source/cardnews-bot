name: Deploy Cardnews Bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          set -e
          cd ~/cardnews_bot

          # .env 업데이트
          WEB_USERNAME="${{ secrets.WEB_USERNAME }}"
          WEB_PASSWORD="${{ secrets.WEB_PASSWORD }}"
          SECRET_KEY="${{ secrets.SECRET_KEY }}"
          for VAR in WEB_USERNAME WEB_PASSWORD SECRET_KEY; do
            VALUE="${!VAR}"
            if [ -z "$VALUE" ]; then continue; fi
            if grep -q "^${VAR}=" .env 2>/dev/null; then
              sed -i "s|^${VAR}=.*|${VAR}=${VALUE}|" .env
            else
              echo "${VAR}=${VALUE}" >> .env
            fi
          done

          if grep -q "^SERVER_URL=" .env 2>/dev/null; then
            sed -i "s|^SERVER_URL=.*|SERVER_URL=https://newscard.kro.kr|" .env
          else
            echo "SERVER_URL=https://newscard.kro.kr" >> .env
          fi

          # 코드 업데이트
          GIT_TERMINAL_PROMPT=0 timeout 30 git pull origin main

          # 의존성 설치
          pip3 install -q -r requirements.txt

          # systemd 서비스 생성/갱신 (heredoc 없이 printf 사용)
          WORK_DIR=$(pwd)
          PYTHON_BIN=$(which python3)
          printf '[Unit]\nDescription=Cardnews Bot Server\nAfter=network.target\n\n[Service]\nType=simple\nUser=ubuntu\nWorkingDirectory=%s\nExecStart=%s server.py\nRestart=always\nRestartSec=5\nEnvironmentFile=%s/.env\n\n[Install]\nWantedBy=multi-user.target\n' \
            "$WORK_DIR" "$PYTHON_BIN" "$WORK_DIR" \
            | sudo tee /etc/systemd/system/cardnews-bot.service > /dev/null

          sudo systemctl daemon-reload
          sudo systemctl enable cardnews-bot
          sudo systemctl restart cardnews-bot
          sudo systemctl is-active cardnews-bot

          # nginx 업로드 크기 제한 50MB
          if command -v nginx >/dev/null 2>&1; then
            echo "client_max_body_size 50m;" | sudo tee /etc/nginx/conf.d/cardnews_upload.conf > /dev/null
            sudo nginx -t && sudo systemctl reload nginx && echo "nginx reloaded" || echo "nginx reload failed (non-fatal)"
          fi

          echo "Deploy OK"
          ENDSSH
