name: Deploy Cardnews Bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          set -e
          cd ~/cardnews_bot
          WEB_USERNAME="${{ secrets.WEB_USERNAME }}"
          WEB_PASSWORD="${{ secrets.WEB_PASSWORD }}"
          SECRET_KEY="${{ secrets.SECRET_KEY }}"
          SERVER_URL="${{ secrets.SERVER_URL }}"
          for VAR in WEB_USERNAME WEB_PASSWORD SECRET_KEY SERVER_URL; do
            VALUE="${!VAR}"
            if [ -z "$VALUE" ]; then continue; fi
            if grep -q "^${VAR}=" .env 2>/dev/null; then
              sed -i "s|^${VAR}=.*|${VAR}=${VALUE}|" .env
            else
              echo "${VAR}=${VALUE}" >> .env
            fi
          done
          GIT_TERMINAL_PROMPT=0 timeout 30 git pull origin main
          sudo systemctl restart cardnews-bot

          # nginx 업로드 크기 제한 50MB로 설정
          if command -v nginx >/dev/null 2>&1; then
            echo "client_max_body_size 50m;" | sudo tee /etc/nginx/conf.d/cardnews_upload.conf > /dev/null
            sudo nginx -t && sudo systemctl reload nginx && echo "nginx reloaded" || echo "nginx reload failed (non-fatal)"
          fi

          echo "Deploy OK"
          ENDSSH
