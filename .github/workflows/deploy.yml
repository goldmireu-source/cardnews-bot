name: Deploy Cardnews Bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync code to server
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='sessions/' \
            --exclude='uploads/' \
            --exclude='cache/' \
            --exclude='data/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ubuntu@${{ secrets.DEPLOY_HOST }}:~/cardnews_bot/

      - name: Update .env and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: WEB_USERNAME,WEB_PASSWORD,SECRET_KEY
          script: |
            cd ~/cardnews_bot
            for VAR in WEB_USERNAME WEB_PASSWORD SECRET_KEY; do
              VALUE=$(eval echo \$$VAR)
              if grep -q "^${VAR}=" .env 2>/dev/null; then
                sed -i "s|^${VAR}=.*|${VAR}=${VALUE}|" .env
              else
                echo "${VAR}=${VALUE}" >> .env
              fi
            done
            sudo systemctl restart cardnews-bot
        env:
          WEB_USERNAME: ${{ secrets.WEB_USERNAME }}
          WEB_PASSWORD: ${{ secrets.WEB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
